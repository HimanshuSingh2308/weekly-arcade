<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#e94560" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#e94560" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#e94560" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#e94560" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="none" stroke="#e94560" stroke-width="1" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="none" stroke="#e94560" stroke-width="1" opacity="0.1"/>

  <!-- Game icons background -->
  <g opacity="0.15" font-size="80">
    <text x="80" y="150">🎮</text>
    <text x="1050" y="120">🐍</text>
    <text x="150" y="550">🔢</text>
    <text x="1000" y="520">🔤</text>
    <text x="950" y="280">🃏</text>
    <text x="100" y="350">👨‍🍳</text>
  </g>

  <!-- Main logo icon -->
  <text x="600" y="220" font-size="120" text-anchor="middle" filter="url(#glow)">🎮</text>

  <!-- Title -->
  <text x="600" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#accentGradient)" text-anchor="middle" filter="url(#glow)">Weekly Arcade</text>

  <!-- Tagline -->
  <text x="600" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" opacity="0.9">New Free Browser Games Every Week</text>

  <!-- Subtitle -->
  <text x="600" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#888888" text-anchor="middle">No downloads required • Play instantly</text>

  <!-- Game badges -->
  <g transform="translate(600, 520)">
    <!-- Wordle badge -->
    <g transform="translate(-280, 0)">
      <rect x="-60" y="-25" width="120" height="50" rx="25" fill="#16213e" stroke="#2a2a4a" stroke-width="2"/>
      <text x="0" y="8" font-family="system-ui" font-size="20" fill="#ffffff" text-anchor="middle">🔤 Wordle</text>
    </g>
    <!-- Snake badge -->
    <g transform="translate(-100, 0)">
      <rect x="-55" y="-25" width="110" height="50" rx="25" fill="#16213e" stroke="#2a2a4a" stroke-width="2"/>
      <text x="0" y="8" font-family="system-ui" font-size="20" fill="#ffffff" text-anchor="middle">🐍 Snake</text>
    </g>
    <!-- 2048 badge -->
    <g transform="translate(70, 0)">
      <rect x="-50" y="-25" width="100" height="50" rx="25" fill="#16213e" stroke="#2a2a4a" stroke-width="2"/>
      <text x="0" y="8" font-family="system-ui" font-size="20" fill="#ffffff" text-anchor="middle">🔢 2048</text>
    </g>
    <!-- More badge -->
    <g transform="translate(220, 0)">
      <rect x="-55" y="-25" width="110" height="50" rx="25" fill="#e94560" stroke="#e94560" stroke-width="2"/>
      <text x="0" y="8" font-family="system-ui" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="600">+ More</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accentGradient)"/>
</svg>
