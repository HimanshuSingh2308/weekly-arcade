  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { scrollbar-width: none; -ms-overflow-style: none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --card-bg: #16213e;
      --card-front: #e94560;
      --accent: #e94560;
      --accent-glow: rgba(233, 69, 96, 0.4);
      --gold: #ffd700;
      --text: #fff;
      --text-muted: #888;
      --correct: #4ade80;
      --wrong: #ef4444;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text);
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }

    /* Header */
    .header {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 0.8rem 1rem;
      padding-top: max(0.8rem, env(safe-area-inset-top));
      padding-left: max(1rem, env(safe-area-inset-left));
      padding-right: max(1rem, env(safe-area-inset-right));
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-secondary);
    }

    .back-btn {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--text); }

    .title-section { text-align: center; }

    .game-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #ff6b8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badges-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 0.3rem;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .combo-badge {
      background: linear-gradient(135deg, var(--gold), #ff8c00);
      color: #000;
      display: none;
    }

    .combo-badge.active { display: inline-block; }

    .streak-badge {
      background: linear-gradient(135deg, #e94560, #c73e54);
      color: #fff;
    }

    .header-right {
      display: flex;
      gap: 0.5rem;
    }

    .icon-btn {
      background: none;
      border: 2px solid rgba(255,255,255,0.2);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      background: rgba(233, 69, 96, 0.1);
    }

    .icon-btn.muted { opacity: 0.5; }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding: 0.8rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .timer-stat .stat-value {
      font-family: 'Courier New', monospace;
    }

    .timer-stat.warning .stat-value { color: #f59e0b; }
    .timer-stat.danger .stat-value { color: #ef4444; animation: pulse 0.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Power-ups Bar */
    .powerups-bar {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 0.6rem;
      background: rgba(0,0,0,0.2);
    }

    .powerup-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: linear-gradient(135deg, #374151, #1f2937);
      border: 2px solid rgba(255,255,255,0.1);
      color: var(--text);
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .powerup-btn:hover:not(:disabled) {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .powerup-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .powerup-btn.active {
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .powerup-icon { font-size: 1.2rem; }
    .powerup-count {
      background: var(--accent);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    /* Game Area */
    .game-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .game-board {
      display: grid;
      gap: 0.5rem;
      perspective: 1000px;
      max-width: 100%;
    }

    .game-board.easy { grid-template-columns: repeat(4, 1fr); }
    .game-board.medium { grid-template-columns: repeat(4, 1fr); }
    .game-board.hard { grid-template-columns: repeat(5, 1fr); }

    /* Card */
    .card {
      aspect-ratio: 1;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
    }

    .card.flipped { transform: rotateY(180deg); }
    .card.matched {
      animation: matchPop 0.4s ease;
    }

    .card.matched .card-front {
      background: linear-gradient(135deg, var(--correct), #22c55e);
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
    }

    .card.wrong {
      animation: shake 0.4s ease;
    }

    .card.wrong .card-front {
      background: linear-gradient(135deg, var(--wrong), #dc2626);
    }

    @keyframes matchPop {
      0%, 100% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.1); }
    }

    @keyframes shake {
      0%, 100% { transform: rotateY(180deg) translateX(0); }
      25% { transform: rotateY(180deg) translateX(-5px); }
      75% { transform: rotateY(180deg) translateX(5px); }
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-back {
      background: linear-gradient(135deg, var(--card-bg), #0e1628);
      border: 2px solid rgba(255,255,255,0.1);
    }

    .card-back::before {
      content: '?';
      font-size: 2rem;
      color: rgba(255,255,255,0.3);
      font-weight: 700;
    }

    .card-front {
      background: linear-gradient(135deg, var(--card-front), #c73e54);
      transform: rotateY(180deg);
      font-size: 2.5rem;
    }

    .card.peek .card-back {
      border-color: var(--gold);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
    }

    .card.frozen {
      filter: hue-rotate(180deg) brightness(1.2);
    }

    /* Combo Popup */
    .combo-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 3rem;
      font-weight: 900;
      text-shadow: 0 0 20px var(--accent-glow);
      pointer-events: none;
      z-index: 100;
      opacity: 0;
    }

    .combo-popup.show {
      animation: comboPopup 0.8s ease forwards;
    }

    @keyframes comboPopup {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -80%) scale(0.8); opacity: 0; }
    }

    /* Menu Screen */
    .menu-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      z-index: 200;
    }

    .menu-screen.hidden { display: none; }

    .menu-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .menu-header .back-btn {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .menu-header .back-btn:hover { color: var(--text); }

    .menu-header .logo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }

    .menu-title {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), #ff6b8a, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .menu-subtitle {
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .menu-section {
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .menu-section-title {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .mode-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      justify-content: center;
      max-width: 350px;
    }

    .mode-btn {
      background: var(--bg-secondary);
      border: 2px solid rgba(255,255,255,0.1);
      color: var(--text);
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 100px;
    }

    .mode-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .mode-btn.selected {
      border-color: var(--accent);
      background: rgba(233, 69, 96, 0.2);
    }

    .mode-btn .mode-icon { font-size: 1.5rem; display: block; margin-bottom: 0.3rem; }
    .mode-btn .mode-name { font-weight: 700; font-size: 0.9rem; }
    .mode-btn .mode-desc { font-size: 0.7rem; color: var(--text-muted); }

    .daily-challenge-btn {
      background: linear-gradient(135deg, var(--gold), #ff8c00);
      border: none;
      color: #000;
      padding: 1rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.2s;
    }

    .daily-challenge-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    }

    .daily-challenge-btn.completed {
      background: linear-gradient(135deg, #4ade80, #22c55e);
    }

    .start-btn {
      background: linear-gradient(135deg, var(--accent), #c73e54);
      border: none;
      color: var(--text);
      padding: 1rem 3rem;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: all 0.2s;
    }

    .start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* Results Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-secondary);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      max-width: 350px;
      width: 90%;
      transform: scale(0.9);
      transition: transform 0.3s;
    }

    .modal-overlay.show .modal {
      transform: scale(1);
    }

    .modal-icon { font-size: 4rem; margin-bottom: 1rem; }
    .modal-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .modal-subtitle { color: var(--text-muted); margin-bottom: 1.5rem; }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .result-item {
      background: rgba(0,0,0,0.2);
      padding: 0.8rem;
      border-radius: 10px;
    }

    .result-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .result-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .modal-buttons {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }

    .modal-btn {
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-btn.primary {
      background: linear-gradient(135deg, var(--accent), #c73e54);
      border: none;
      color: var(--text);
    }

    .modal-btn.secondary {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.2);
      color: var(--text);
    }

    .modal-btn:hover { transform: translateY(-2px); }

    /* Responsive - Mobile Full Screen */
    @media (max-width: 600px) {
      .header {
        padding: 0.5rem;
      }

      .stats-bar {
        padding: 0.5rem;
        gap: 0.8rem;
      }

      .stat-value { font-size: 1rem; }

      .powerups-bar {
        padding: 0.4rem;
        gap: 0.5rem;
      }

      .powerup-btn {
        padding: 0.4rem 0.6rem;
        font-size: 0.7rem;
      }

      .game-container {
        padding: 0.5rem;
        min-height: calc(100vh - 150px);
        justify-content: flex-start;
        padding-top: 1rem;
      }

      .game-board {
        width: 100%;
        max-width: calc(100vw - 1rem);
      }

      .card-front { font-size: 1.8rem; }
      .card-back::before { font-size: 1.5rem; }
    }

    @media (max-width: 480px) {
      .game-container {
        padding: 0.25rem;
        min-height: calc(100vh - 140px);
      }

      .stats-bar { gap: 0.6rem; }
      .stat-value { font-size: 0.95rem; }
      .stat-label { font-size: 0.6rem; }
    }

    /* Large screens - scale up */
    @media (min-width: 1200px) {
      .game-container {
        padding: 2rem;
      }

      .game-board {
        gap: 0.8rem;
      }

      .game-board.easy {
        width: 500px;
      }

      .game-board.medium {
        width: 560px;
      }

      .game-board.hard {
        width: 650px;
      }

      .card-front { font-size: 3rem; }
      .card-back::before { font-size: 2.5rem; }

      .stats-bar {
        gap: 3rem;
        padding: 1.2rem;
      }

      .stat-value { font-size: 1.8rem; }
      .stat-label { font-size: 0.85rem; }

      .powerups-bar {
        gap: 1.5rem;
        padding: 1rem;
      }

      .powerup-btn {
        padding: 0.8rem 1.2rem;
        font-size: 1rem;
      }
    }

    /* Extra large screens (1920px+) */
    @media (min-width: 1600px) {
      .game-board.easy {
        width: 600px;
      }

      .game-board.medium {
        width: 680px;
      }

      .game-board.hard {
        width: 800px;
      }

      .game-board {
        gap: 1rem;
      }

      .card-front { font-size: 3.5rem; }
      .card-back::before { font-size: 3rem; }
    }

    /* Freeze effect */
    .game-board.frozen .card:not(.matched):not(.flipped) {
      pointer-events: none;
    }

    .game-board.frozen .card:not(.matched) .card-back {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      border-color: #38bdf8;
    }

    /* More Games Section */
    .more-games {
      background: var(--bg-secondary);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 1.5rem;
      margin-top: auto;
    }

    .more-games-title {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      text-align: center;
    }

    .more-games-grid {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .more-game-link {
      background: var(--bg-primary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      transition: transform 0.2s, border-color 0.2s;
    }

    .more-game-link:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .more-game-link span:first-child {
      font-size: 1.2rem;
    }

    @media (max-width: 768px) {
      .more-games { display: none; }
    }

    /* Accessibility: Respect reduced motion preferences */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>

<body>
  <!-- Menu Screen -->
  <div class="menu-screen" id="menuScreen">
    <div class="menu-header">
      <a href="/" class="back-btn">&larr; Back</a>
      <a href="/" class="logo">Weekly Arcade</a>
    </div>
    <div class="menu-title">Memory Match</div>
    <div class="menu-subtitle">Test your memory!</div>

    <div class="menu-section">
      <div class="menu-section-title">Difficulty</div>
      <div class="mode-buttons" id="difficultyButtons">
        <button class="mode-btn selected" data-difficulty="easy">
          <span class="mode-icon">3x4</span>
          <span class="mode-name">Easy</span>
          <span class="mode-desc">6 pairs</span>
        </button>
        <button class="mode-btn" data-difficulty="medium">
          <span class="mode-icon">4x4</span>
          <span class="mode-name">Medium</span>
          <span class="mode-desc">8 pairs</span>
        </button>
        <button class="mode-btn" data-difficulty="hard">
          <span class="mode-icon">5x4</span>
          <span class="mode-name">Hard</span>

  <script>
  (function() {
    'use strict';

    // HTML escape helper for safe rendering
    function escapeHTML(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    // Emoji sets for different themes
    const EMOJI_SETS = {
      animals: ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵'],
      food: ['🍎', '🍐', '🍊', '🍋', '🍌', '🍉', '🍇', '🍓', '🍒', '🍑', '🥝', '🍍', '🥥', '🍔', '🍕'],
      sports: ['⚽', '🏀', '🏈', '⚾', '🎾', '🏐', '🏉', '🎱', '🏓', '🏸', '🥊', '🎯', '⛳', '🎿', '🏂'],
      nature: ['🌸', '🌺', '🌻', '🌹', '🌷', '🌼', '🌴', '🌵', '🍀', '🍁', '🍂', '🌙', '⭐', '🌈', '❄️'],
      objects: ['🎮', '🎨', '🎭', '🎪', '🎢', '🚀', '⛵', '🚗', '✈️', '🏠', '💎', '🔮', '🎁', '🎈', '🎩']
    };

    // Game state
    let gameState = {
      difficulty: 'easy',
      mode: 'classic',
      cards: [],
      flippedCards: [],
      matchedPairs: 0,
      totalPairs: 0,
      moves: 0,
      score: 0,
      combo: 0,
      maxCombo: 0,
      timer: 0,
      timerInterval: null,
      isPlaying: false,
      soundEnabled: true,
      isDaily: false,
      powerups: {
        peek: 3,
        shuffle: 2,
        freeze: 1
      },
      frozen: false,
      lockBoard: false
    };

    // Difficulty configs
    const DIFFICULTY_CONFIG = {
      easy: { rows: 3, cols: 4, pairs: 6, time: 120, maxMoves: 20 },
      medium: { rows: 4, cols: 4, pairs: 8, time: 90, maxMoves: 24 },
      hard: { rows: 4, cols: 5, pairs: 10, time: 60, maxMoves: 28 }
    };

    // DOM Elements
    const menuScreen = document.getElementById('menuScreen');
    const gameBoard = document.getElementById('gameBoard');
    const scoreValue = document.getElementById('scoreValue');
    const matchesValue = document.getElementById('matchesValue');
    const movesValue = document.getElementById('movesValue');
    const timerValue = document.getElementById('timerValue');
    const timerStat = document.getElementById('timerStat');
    const comboBadge = document.getElementById('comboBadge');
    const streakBadge = document.getElementById('streakBadge');
    const comboPopup = document.getElementById('comboPopup');
    const resultsModal = document.getElementById('resultsModal');

    // Sound elements
    const flipSound = document.getElementById('flipSound');
    const matchSound = document.getElementById('matchSound');
    const comboSound = document.getElementById('comboSound');

    // Initialize menu
    function initMenu() {
      // Difficulty buttons
      document.querySelectorAll('#difficultyButtons .mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#difficultyButtons .mode-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          gameState.difficulty = btn.dataset.difficulty;
        });
      });

      // Mode buttons
      document.querySelectorAll('#modeButtons .mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#modeButtons .mode-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          gameState.mode = btn.dataset.mode;
        });
      });

      // Daily challenge
      const dailyBtn = document.getElementById('dailyChallengeBtn');
      const dailyData = getDailyChallenge();
      if (dailyData.completed) {
        dailyBtn.classList.add('completed');
        dailyBtn.innerHTML = '&#10004; Daily Complete!';
      }
      dailyBtn.addEventListener('click', startDailyChallenge);

      // Start button
      document.getElementById('startBtn').addEventListener('click', startGame);

      // Menu button
      document.getElementById('menuBtn').addEventListener('click', showMenu);

      // Sound button
      document.getElementById('soundBtn').addEventListener('click', toggleSound);

      // Power-up buttons
      document.getElementById('peekBtn').addEventListener('click', usePeek);
      document.getElementById('shuffleBtn').addEventListener('click', useShuffle);
      document.getElementById('freezeBtn').addEventListener('click', useFreeze);

      // Modal buttons
      document.getElementById('playAgainBtn').addEventListener('click', () => {
        resultsModal.classList.remove('show');
        startGame();
      });
      document.getElementById('menuModalBtn').addEventListener('click', () => {
        resultsModal.classList.remove('show');
        showMenu();
      });

      // Check for saved streak
      const savedStreak = localStorage.getItem('memory-match-streak') || '0';
      streakBadge.innerHTML = '&#128293; ' + escapeHTML(savedStreak);
    }

    // Get daily challenge data
    function getDailyChallenge() {
      const today = new Date().toDateString();
      const saved = JSON.parse(localStorage.getItem('memory-match-daily') || '{}');
      return {
        completed: saved.date === today && saved.completed,
        seed: hashCode(today)
      };
    }

    function hashCode(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return Math.abs(hash);
    }

    // Start daily challenge
    function startDailyChallenge() {
      const daily = getDailyChallenge();
      if (daily.completed) {
        alert('You already completed today\'s challenge! Come back tomorrow.');
        return;
      }
      gameState.isDaily = true;
      gameState.difficulty = 'hard';
      gameState.mode = 'timed';
      startGame(daily.seed);
    }

    // Show menu
    function showMenu() {
      stopTimer();
      gameState.isPlaying = false;
      menuScreen.classList.remove('hidden');
    }

    // Toggle sound
    function toggleSound() {
      gameState.soundEnabled = !gameState.soundEnabled;
      document.getElementById('soundBtn').classList.toggle('muted', !gameState.soundEnabled);
    }

    // Unlock audio for iOS - play/pause on user gesture
    let audioUnlocked = false;
    function unlockAudio() {
      if (audioUnlocked) return;
      const sounds = [flipSound, matchSound, comboSound];
      sounds.forEach(sound => {
        sound.play().then(() => {
          sound.pause();
          sound.currentTime = 0;
        }).catch(() => {});
      });
      audioUnlocked = true;
    }

    ['touchstart', 'mousedown', 'keydown'].forEach(event => {
      document.addEventListener(event, unlockAudio, { once: true });
    });

    // Play sound
    function playSound(sound) {
      if (!gameState.soundEnabled) return;
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }

    // Get shuffled emojis
    function getShuffledEmojis(count, seed = null) {
      // Combine all emoji sets for random theme
      const allEmojis = Object.values(EMOJI_SETS).flat();

      // Seeded random for daily challenge
      const random = seed !== null
        ? seededRandom(seed)
        : () => Math.random();

      // Shuffle and pick
      const shuffled = [...allEmojis].sort(() => random() - 0.5);
      const selected = shuffled.slice(0, count);

      // Create pairs and shuffle
      const pairs = [...selected, ...selected];
      return pairs.sort(() => random() - 0.5);
    }

    function seededRandom(seed) {
      return function() {
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
      };
    }

    // Start game
    function startGame(seed = null) {
      const config = DIFFICULTY_CONFIG[gameState.difficulty];

      // Reset state
      gameState.cards = [];
      gameState.flippedCards = [];
      gameState.matchedPairs = 0;
      gameState.totalPairs = config.pairs;
      gameState.moves = 0;
      gameState.maxMoves = (gameState.mode === 'classic') ? config.maxMoves : 0;
      gameState.score = 0;
      gameState.combo = 0;
      gameState.maxCombo = 0;
      gameState.timer = gameState.mode === 'timed' ? config.time : 0;
      gameState.isPlaying = true;
      gameState.frozen = false;
      gameState.lockBoard = false;
      gameState.powerups = { peek: 3, shuffle: 2, freeze: 1 };

      // Update power-up counts
      updatePowerupCounts();

      // Hide menu
      menuScreen.classList.add('hidden');

      // Create cards
      const emojis = getShuffledEmojis(config.pairs, seed);
      createBoard(config, emojis);

      // Update UI
      updateUI();

      // Start timer
      startTimer();

      // Quick peek at start
      setTimeout(() => {
        if (gameState.mode !== 'zen') {
          peekAllCards(1500);
        }
      }, 500);
    }

    // Create game board
    function createBoard(config, emojis) {
      gameBoard.innerHTML = '';
      gameBoard.className = `game-board ${gameState.difficulty}`;

      // Calculate card size
      const containerWidth = Math.min(window.innerWidth - 32, 500);
      const cardSize = Math.floor((containerWidth - (config.cols - 1) * 8) / config.cols);

      emojis.forEach((emoji, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = index;
        card.dataset.emoji = emoji;
        card.style.width = `${cardSize}px`;
        card.style.height = `${cardSize}px`;

        card.innerHTML = `
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${emoji}</div>
        `;

        card.addEventListener('click', () => flipCard(card));
        gameBoard.appendChild(card);
        gameState.cards.push(card);
      });
    }

    // Flip card
    function flipCard(card) {
      if (gameState.lockBoard) return;
      if (!gameState.isPlaying) return;
      if (card.classList.contains('flipped')) return;
      if (card.classList.contains('matched')) return;
      if (gameState.flippedCards.length >= 2) return;

      playSound(flipSound);
      card.classList.add('flipped');
      gameState.flippedCards.push(card);

      if (gameState.flippedCards.length === 2) {
        gameState.moves++;
        checkMatch();

        // Check move limit (Classic mode)
        if (gameState.maxMoves > 0 && gameState.moves >= gameState.maxMoves && gameState.matchedPairs < gameState.totalPairs) {
          setTimeout(() => {
            if (gameState.matchedPairs < gameState.totalPairs) {
              endGame(false);
            }
          }, 800); // Wait for match/mismatch animation to finish
        }
      }

      updateUI();
    }

    // Check for match
    function checkMatch() {
      gameState.lockBoard = true;
      const [card1, card2] = gameState.flippedCards;
      const match = card1.dataset.emoji === card2.dataset.emoji;

      if (match) {
        handleMatch(card1, card2);
      } else {
        handleMismatch(card1, card2);
      }
    }

    // Handle match
    function handleMatch(card1, card2) {
      gameState.matchedPairs++;
      gameState.combo++;

      if (gameState.combo > gameState.maxCombo) {
        gameState.maxCombo = gameState.combo;
      }

      // Calculate score with combo multiplier
      const baseScore = 100;
      const comboMultiplier = Math.min(gameState.combo, 5);
      const pointsEarned = baseScore * comboMultiplier;

      if (gameState.mode !== 'zen') {
        gameState.score += pointsEarned;
      }

      // Show combo popup
      if (gameState.combo >= 2) {
        showComboPopup(gameState.combo);
        playSound(comboSound);
      } else {
        playSound(matchSound);
      }

      // Update combo badge
      updateComboBadge();

      setTimeout(() => {
        card1.classList.add('matched');
        card2.classList.add('matched');
        gameState.flippedCards = [];
        gameState.lockBoard = false;
        updateUI();

        // Check win
        if (gameState.matchedPairs === gameState.totalPairs) {
          endGame(true);
        }
      }, 300);
    }

    // Handle mismatch
    function handleMismatch(card1, card2) {
      gameState.combo = 0;
      updateComboBadge();

      setTimeout(() => {
        card1.classList.add('wrong');
        card2.classList.add('wrong');

        setTimeout(() => {
          card1.classList.remove('flipped', 'wrong');
          card2.classList.remove('flipped', 'wrong');
          gameState.flippedCards = [];
          gameState.lockBoard = false;
        }, 500);
      }, 500);
    }

    // Show combo popup
    function showComboPopup(combo) {
      comboPopup.textContent = `x${combo} COMBO!`;
      comboPopup.style.color = combo >= 5 ? '#ffd700' : combo >= 3 ? '#ff6b8a' : '#e94560';
      comboPopup.classList.remove('show');
      void comboPopup.offsetWidth;
      comboPopup.classList.add('show');
    }

    // Update combo badge
    function updateComboBadge() {
      if (gameState.combo >= 2) {
        comboBadge.textContent = `x${gameState.combo} COMBO`;
        comboBadge.classList.add('active');
      } else {
        comboBadge.classList.remove('active');
      }
    }

    // Update UI
    function updateUI() {
      scoreValue.textContent = gameState.score;
      matchesValue.textContent = `${gameState.matchedPairs}/${gameState.totalPairs}`;
      movesValue.textContent = gameState.maxMoves > 0
        ? `${gameState.moves}/${gameState.maxMoves}`
        : gameState.moves;
    }

    // Timer
    function startTimer() {
      stopTimer();
      updateTimerDisplay();

      gameState.timerInterval = setInterval(() => {
        if (gameState.frozen) return;

        if (gameState.mode === 'timed') {
          gameState.timer--;
          if (gameState.timer <= 0) {
            endGame(false);
            return;
          }
          // Warning states
          if (gameState.timer <= 10) {
            timerStat.classList.add('danger');
            timerStat.classList.remove('warning');
          } else if (gameState.timer <= 30) {
            timerStat.classList.add('warning');
            timerStat.classList.remove('danger');
          }
        } else {
          gameState.timer++;
        }
        updateTimerDisplay();
      }, 1000);
    }

    function stopTimer() {
      if (gameState.timerInterval) {
        clearInterval(gameState.timerInterval);
        gameState.timerInterval = null;
      }
      timerStat.classList.remove('warning', 'danger');
    }

    function updateTimerDisplay() {
      const minutes = Math.floor(gameState.timer / 60);
      const seconds = gameState.timer % 60;
      timerValue.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    // Power-ups
    function updatePowerupCounts() {
      document.getElementById('peekCount').textContent = gameState.powerups.peek;
      document.getElementById('shuffleCount').textContent = gameState.powerups.shuffle;
      document.getElementById('freezeCount').textContent = gameState.powerups.freeze;

      document.getElementById('peekBtn').disabled = gameState.powerups.peek <= 0;
      document.getElementById('shuffleBtn').disabled = gameState.powerups.shuffle <= 0;
      document.getElementById('freezeBtn').disabled = gameState.powerups.freeze <= 0 || gameState.mode !== 'timed';
    }

    function usePeek() {
      if (gameState.powerups.peek <= 0 || gameState.lockBoard) return;
      gameState.powerups.peek--;
      updatePowerupCounts();
      peekAllCards(2000);
    }

    function peekAllCards(duration) {
      gameState.lockBoard = true;
      gameState.cards.forEach(card => {
        if (!card.classList.contains('matched')) {
          card.classList.add('flipped', 'peek');
        }
      });

      setTimeout(() => {
        gameState.cards.forEach(card => {
          if (!card.classList.contains('matched')) {
            card.classList.remove('flipped', 'peek');
          }
        });
        gameState.flippedCards = [];
        gameState.lockBoard = false;
      }, duration);
    }

    function useShuffle() {
      if (gameState.powerups.shuffle <= 0 || gameState.lockBoard) return;
      gameState.powerups.shuffle--;
      updatePowerupCounts();

      gameState.lockBoard = true;

      // Get unmatched cards
      const unmatchedCards = gameState.cards.filter(c => !c.classList.contains('matched'));
      const emojis = unmatchedCards.map(c => c.dataset.emoji);

      // Shuffle emojis
      for (let i = emojis.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [emojis[i], emojis[j]] = [emojis[j], emojis[i]];
      }

      // Flip all unmatched cards
      unmatchedCards.forEach(card => card.classList.add('flipped'));

      setTimeout(() => {
        // Reassign emojis
        unmatchedCards.forEach((card, index) => {
          card.dataset.emoji = emojis[index];
          card.querySelector('.card-front').textContent = emojis[index];
        });

        // Flip back
        setTimeout(() => {
          unmatchedCards.forEach(card => card.classList.remove('flipped'));
          gameState.flippedCards = [];
          gameState.lockBoard = false;
        }, 500);
      }, 500);
    }

    function useFreeze() {
      if (gameState.powerups.freeze <= 0 || gameState.mode !== 'timed') return;
      gameState.powerups.freeze--;
      updatePowerupCounts();

      gameState.frozen = true;
      gameBoard.classList.add('frozen');
      document.getElementById('freezeBtn').classList.add('active');

      setTimeout(() => {
        gameState.frozen = false;
        gameBoard.classList.remove('frozen');
        document.getElementById('freezeBtn').classList.remove('active');
      }, 10000);
    }

    // End game
    function endGame(won) {
      stopTimer();
      gameState.isPlaying = false;

      // Update streak
      let streak = parseInt(localStorage.getItem('memory-match-streak') || '0');
      if (won) {
        streak++;
        localStorage.setItem('memory-match-streak', streak);
      } else {
        localStorage.setItem('memory-match-streak', '0');
        streak = 0;
      }
      streakBadge.innerHTML = '&#128293; ' + escapeHTML(String(streak));

      // Daily challenge completion
      if (gameState.isDaily && won) {
        localStorage.setItem('memory-match-daily', JSON.stringify({
          date: new Date().toDateString(),
          completed: true,
          score: gameState.score,
          time: gameState.timer
        }));
        document.getElementById('dailyChallengeBtn').classList.add('completed');
        document.getElementById('dailyChallengeBtn').innerHTML = '&#10004; Daily Complete!';
      }

      // Submit score and save state
      submitScore(won);
      saveCloudState(won);

      // Show results modal
      setTimeout(() => {
        showResults(won);
      }, 500);
    }

    function showResults(won) {
      const outOfMoves = !won && gameState.maxMoves > 0 && gameState.moves >= gameState.maxMoves;
      document.getElementById('modalIcon').textContent = won ? '🏆' : (outOfMoves ? '🃏' : '⏰');
      document.getElementById('modalTitle').textContent = won ? 'Great Job!' : (outOfMoves ? 'Out of Moves!' : 'Time\'s Up!');
      document.getElementById('modalSubtitle').textContent = won
        ? 'You matched all pairs!'
        : `You found ${gameState.matchedPairs} of ${gameState.totalPairs} pairs`;

      document.getElementById('finalScore').textContent = gameState.score;
      document.getElementById('finalTime').textContent = timerValue.textContent;
      document.getElementById('finalMoves').textContent = gameState.moves;
      document.getElementById('finalCombo').textContent = `x${gameState.maxCombo}`;

      resultsModal.classList.add('show');
    }

    // Auth state management
    let currentUser = null;
    let cloudStateMemory = null;

    // Submit score via gameCloud (handles guest queueing automatically)
    async function submitScore(won) {
      if (gameState.mode === 'zen') return;

      const scoreData = {
        score: gameState.score,
        timeMs: Math.round(gameState.timer * 1000),
        metadata: {
          difficulty: gameState.difficulty,
          mode: gameState.mode,
          moves: gameState.moves,
          time: gameState.timer,
          maxCombo: gameState.maxCombo,
          won: won,
          isDaily: gameState.isDaily
        }
      };

      await window.gameCloud.submitOrQueue('memory-match', scoreData);
    }

    // Cloud state functions
    async function saveCloudState(won) {
      if (!currentUser) return;

      const prevGamesPlayed = cloudStateMemory?.gamesPlayed || 0;
      const prevGamesWon = cloudStateMemory?.gamesWon || 0;
      const prevBestStreak = cloudStateMemory?.bestStreak || 0;

      const state = {
        currentLevel: 1,
        currentStreak: 0,
        bestStreak: Math.max(prevBestStreak, gameState.maxCombo),
        gamesPlayed: prevGamesPlayed + 1,
        gamesWon: prevGamesWon + (won ? 1 : 0),
        lastPlayedDate: new Date().toISOString().split('T')[0],
        additionalData: {
          bestScore: Math.max(cloudStateMemory?.additionalData?.bestScore || 0, gameState.score),
          bestTime: Math.min(cloudStateMemory?.additionalData?.bestTime || 9999, gameState.timer),
          bestMoves: Math.min(cloudStateMemory?.additionalData?.bestMoves || 9999, gameState.moves)
        }
      };

      await window.gameCloud.saveState('memory-match', state);
      cloudStateMemory = state;

      // Check achievements
      checkAchievementsMemory(state);
    }

    async function loadCloudState() {
      cloudStateMemory = await window.gameCloud.loadState('memory-match');
    }

    async function checkAchievementsMemory(state) {
      if (!currentUser) return;
      if (state.gamesPlayed === 1) {
        await window.gameCloud.unlockAchievement('first_word', 'memory-match');
      }
      if (state.gamesWon >= 10) {
        await window.gameCloud.unlockAchievement('ten_wins', 'memory-match');
      }
    }

    function initAuth() {
      if (!window.gameCloud) return;
      window.gameCloud.initAuth({
        onSignIn: (user) => {
          currentUser = user;
          loadCloudState();
          window.gameCloud.syncGuestScores('memory-match');
        },
        onSignOut: () => {
          currentUser = null;
          cloudStateMemory = null;
        }
      });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      initMenu();
      initAuth();
    });
  })();
  </script>
