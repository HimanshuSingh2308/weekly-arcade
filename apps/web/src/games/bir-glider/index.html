  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { scrollbar-width: none; -ms-overflow-style: none; }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #0d1f35;
      --bg-card: #132840;
      --accent: #1a6b4a;
      --accent-light: #2d9b6f;
      --accent-bright: #4ecb8d;
      --text-primary: #f0f4f8;
      --text-secondary: #7a9bb5;
      --border: #1e3a54;
      --gold: #f4c430;
      --saffron: #e8821a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }

    /* Header */
    .header {
      background: rgba(10, 22, 40, 0.9);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      padding-top: max(0.75rem, env(safe-area-inset-top));
      padding-left: max(1rem, env(safe-area-inset-left));
      padding-right: max(1rem, env(safe-area-inset-right));
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      height: 50px;
      backdrop-filter: blur(8px);
    }

    .back-btn {
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      min-height: 44px; min-width: 44px;
      display: flex; align-items: center;
    }
    .back-btn:hover { color: var(--accent-bright); }

    .title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-bright);
    }

    .header-right {
      display: flex; gap: 0.5rem; align-items: center;
    }

    .auth-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
    }
    .auth-btn:hover { background: var(--accent-light); }

    .icon-btn {
      background: var(--bg-card);
      border: 2px solid var(--border);
      color: var(--text-primary);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.4rem;
      border-radius: 8px;
      min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { border-color: var(--accent-bright); }

    /* Canvas */
    #gameCanvas {
      display: block;
      position: fixed;
      top: 50px; left: 0; right: 0; bottom: 0;
      width: 100%;
      height: calc(100dvh - 50px);
      touch-action: none;
    }

    /* HUD Overlay */
    .hud {
      position: fixed;
      top: 58px; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 50;
    }

    .hud-distance {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      letter-spacing: 0.02em;
    }

    .hud-distance span {
      font-size: 1rem;
      font-weight: 400;
      opacity: 0.8;
    }

    .hud-best {
      position: absolute;
      top: 14px; right: 16px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      text-align: right;
    }

    .hud-combo {
      position: absolute;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--saffron);
      text-shadow: 0 0 12px rgba(232,130,26,0.8);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .hud-combo.active { opacity: 1; }

    /* Altitude bar */
    .altitude-bar {
      position: absolute;
      left: 12px;
      top: 8px; bottom: 8px;
      width: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .altitude-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, #4ecb8d, #0096c7, #caf0f8);
      border-radius: 3px;
      transition: height 0.2s;
    }
    .altitude-label {
      position: absolute;
      left: 24px; top: 8px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
    }

    /* Goals panel */
    .goals-panel {
      position: absolute;
      bottom: 16px; left: 12px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.8;
    }
    .goal-item { display: flex; align-items: center; gap: 6px; }
    .goal-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); flex-shrink: 0; }
    .goal-dot.done { background: var(--accent-bright); }

    /* Menu Screen */
    .menu-screen {
      position: fixed;
      top: 50px; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      text-align: center;
      padding: 2rem;
    }
    .menu-screen.hidden { display: none; }

    .menu-bg-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .menu-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .menu-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(78,203,141,0.4));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-12px) rotate(5deg); }
    }

    .menu-title {
      font-size: 3.2rem;
      font-weight: 800;
      color: white;
      margin-bottom: 0.3rem;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5);
    }

    .menu-tagline {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 0.5rem;
      font-style: italic;
    }

    .menu-best {
      font-size: 0.95rem;
      color: var(--accent-bright);
      margin-bottom: 2rem;
      font-weight: 600;
    }

    .play-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      border: none;
      padding: 1rem 3.5rem;
      border-radius: 30px;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(26,107,74,0.5);
    }
    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(26,107,74,0.7);
    }

    .zen-toggle {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      min-height: 44px;
      color: rgba(255,255,255,0.8);
      font-size: 0.95rem;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 1.5rem;
    }
    .zen-toggle:hover { background: rgba(255,255,255,0.14); }
    .zen-toggle.active {
      background: rgba(78,203,141,0.15);
      border-color: var(--accent-bright);
      color: var(--accent-bright);
    }

    .toggle-knob {
      width: 36px; height: 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      position: relative;
      transition: background 0.2s;
    }
    .zen-toggle.active .toggle-knob { background: var(--accent-bright); }
    .toggle-knob::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .zen-toggle.active .toggle-knob::after { transform: translateX(16px); }

    .controls-hint {
      color: rgba(255,255,255,0.5);
      font-size: 0.88rem;
      margin-top: 0.5rem;
    }

    /* Game Over Screen */
    .gameover-screen {
      position: fixed;
      top: 50px; left: 0; right: 0; bottom: 0;
      background: rgba(5, 15, 30, 0.97);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 2rem;
      text-align: center;
    }
    .gameover-screen.hidden { display: none; }

    .gameover-icon { font-size: 3rem; margin-bottom: 0.5rem; }

    .gameover-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--accent-bright);
      margin-bottom: 0.25rem;
    }

    .gameover-subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .gameover-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      width: 100%;
      max-width: 400px;
    }

    .gameover-stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 0.5rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-bright);
    }
    .stat-value.new-best { color: var(--gold); }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.2rem;
    }

    .biome-reached {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 1.5rem;
    }

    .gap-to-best {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    .gap-to-best strong { color: var(--accent-bright); }

    .gameover-buttons {
      display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center;
    }

    .retry-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white; border: none;
      padding: 0.75rem 2rem;
      border-radius: 25px; font-size: 1.1rem; font-weight: 600;
      cursor: pointer; transition: transform 0.2s;
    }
    .retry-btn:hover { transform: translateY(-2px); }

    .submit-btn {
      background: var(--bg-card);
      color: var(--accent-bright);
      border: 2px solid var(--accent);
      padding: 0.75rem 1.75rem;
      border-radius: 25px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .submit-btn:hover { background: var(--accent); color: white; }
    .submit-btn:disabled { opacity: 0.5; cursor: default; }

    .menu-btn-go {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
      padding: 0.75rem 1.5rem;
      border-radius: 25px; font-size: 0.9rem;
      cursor: pointer; transition: all 0.2s;
    }
    .menu-btn-go:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); }

    /* Zen mode gameover */
    .zen-end-screen {
      position: fixed;
      top: 50px; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 2rem;
      text-align: center;
    }
    .zen-end-screen.hidden { display: none; }

    /* Biome title card */
    .biome-card {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 1rem 2rem;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }
    .biome-card.show { opacity: 1; }
    .biome-card-name { font-size: 1.4rem; font-weight: 700; color: white; }
    .biome-card-sub { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 0.25rem; }

    /* Toast notifications */
    .toast-container {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      background: rgba(20,40,60,0.95);
      border: 1px solid var(--accent);
      border-radius: 24px;
      padding: 0.6rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: white;
      animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.7s forwards;
      white-space: nowrap;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* Screen flash */
    .screen-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 400;
      opacity: 0;
    }
    @media (prefers-reduced-motion: reduce) {
      .menu-icon { animation: none; }
      .toast { animation: none; opacity: 1; }
      .play-btn, .retry-btn { transition: none; }
      .biome-card { transition: none; }
      .altitude-fill { transition: none; }
    }

    :focus-visible {
      outline: 3px solid var(--accent-bright);
      outline-offset: 2px;
    }
    :focus:not(:focus-visible) {
      outline: none;
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="/" class="back-btn" aria-label="Back to home">&#8592; Games</a>
    <div class="title"><span aria-hidden="true">🪂</span> Bir Glider</div>
    <div class="header-right">
      <button class="auth-btn" id="authBtn" onclick="handleAuth()">Sign In</button>
      <button class="icon-btn" onclick="toggleMute()" id="muteBtn" aria-label="Sound on" aria-pressed="false"><span aria-hidden="true">🔊</span></button>
    </div>
  </header>

  <main id="gameMain" aria-label="Bir Glider game">
  <!-- Main canvas -->
  <canvas id="gameCanvas" role="application" aria-label="Bir Glider — paragliding game. Use Space or Arrow Up to rise, release to glide."></canvas>

  <!-- HUD (visible during play) -->
  <div class="hud" id="hud" style="display:none;">
    <div class="altitude-bar" id="altBar">
      <div class="altitude-fill" id="altFill" style="height:10%"></div>
    </div>
    <div class="altitude-label" id="altLabel">0m</div>
    <div class="hud-distance" id="hudDistance" role="status" aria-live="polite" aria-atomic="true">0 <span>m</span></div>
    <div class="hud-best" id="hudBest"></div>
    <div class="hud-combo" id="hudCombo"></div>
    <div class="goals-panel" id="goalsPanel"></div>
  </div>

  <!-- Menu Screen -->
  <div class="menu-screen" id="menuScreen">
    <canvas class="menu-bg-canvas" id="menuBgCanvas"></canvas>
    <div class="menu-content">
      <div class="menu-icon">🪂</div>
      <div class="menu-title">Bir Glider</div>
      <div class="menu-tagline">"Rise on the wind. Find your calm."</div>
      <div class="menu-best" id="menuBest"></div>
      <button class="play-btn" id="playBtn" onclick="startGame()">Fly</button>
      <button class="zen-toggle" id="zenToggle" onclick="toggleZenMode()" role="switch" aria-checked="false" aria-label="Zen Mode">
        <span aria-hidden="true">🧘</span> Zen Mode
        <div class="toggle-knob"></div>
      </button>
      <div class="controls-hint">Hold anywhere to rise &bull; Release to glide</div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div class="gameover-screen hidden" id="gameoverScreen">
    <div class="gameover-icon">🏔️</div>
    <div class="gameover-title" id="gameoverTitle" role="alert" aria-live="assertive">Landed</div>
    <div class="gameover-subtitle" id="gameoverSubtitle">The mountain is patient. Fly again.</div>
    <div class="gameover-stats">
      <div class="gameover-stat">
        <div class="stat-value" id="statDistance">0</div>
        <div class="stat-label">Distance</div>
      </div>
      <div class="gameover-stat">
        <div class="stat-value" id="statAltitude">0</div>
        <div class="stat-label">Max Alt.</div>
      </div>
      <div class="gameover-stat">
        <div class="stat-value" id="statFlags">0</div>
        <div class="stat-label">Flags</div>
      </div>
    </div>
    <div class="biome-reached" id="biomeReached"></div>
    <div class="gap-to-best" id="gapToBest"></div>
    <div class="gameover-buttons">
      <button class="retry-btn" onclick="startGame()">Fly Again</button>
      <button class="submit-btn" id="submitBtn" onclick="submitScore()">Submit Score</button>
      <button class="menu-btn-go" onclick="showMenu()">Menu</button>
    </div>
  </div>

  <!-- Biome card -->
  <div class="biome-card" id="biomeCard">
    <div class="biome-card-name" id="biomeCardName"></div>
    <div class="biome-card-sub" id="biomeCardSub"></div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="false"></div>
  </main>

  <!-- Screen flash -->
  <div class="screen-flash" id="screenFlash"></div>

<script>
// ================================================
// BIR GLIDER — Main Game Script
// ================================================

// ---- State ----
let currentUser = null;
let gameState = 'menu'; // menu | playing | gameover
let zenMode = false;
let muted = false;
let animFrameId = null;
let menuBgAnimId = null;

// Game vars
let canvas, ctx;
let W, H;
let distance = 0;
let score = 0;
let altitude = 200; // px from bottom ground surface (visual)
let altitudeM = 0;  // meters (computed from altitude)
let maxAltitudeM = 0;
let velocity = 0;   // vertical velocity (positive = up)
let isHolding = false;
let gliderX, gliderY;
let scrollSpeed = 0.25;
let gameTime = 0;
let runStartTime = 0;
let prayerFlagsCollected = 0;
let flagCombo = 0;
let flagComboTimer = 0;
let maxCombo = 0;
let eagleNearMisses = 0;
let thermalsCount = 0;
let inThermal = false;
let thermalTimer = 0;
let biomeIndex = 0;
let visitedBiomes = new Set();
let altitudeMilestonesHit = new Set();

// Score
let totalScore = 0;
let totalFlagScore = 0;
let totalNearMissBonus = 0;
let altitudeMilestoneBonus = 0;

// Personal best
let personalBest = 0;
let isNewBest = false;

// Goals
let goals = [];
let goalProgress = {};

// Terrain
let terrainPoints = [];
const TERRAIN_SEGMENT_W = 6;

let audioCtx = null;

const PENTATONIC = [261.63, 293.66, 329.63, 392.00, 440.00]; // C4 D4 E4 G4 A4

function initAudio() {
  if (audioCtx || muted) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Wind layer
    const bufferSize = audioCtx.sampleRate * 2;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = noiseBuffer;
    noiseSource.loop = true;
    windFilter = audioCtx.createBiquadFilter();
    windFilter.type = 'bandpass';
    windFilter.frequency.value = 800;
    windFilter.Q.value = 0.5;
    windGain = audioCtx.createGain();
    windGain.gain.value = 0;
    noiseSource.connect(windFilter);
    windFilter.connect(windGain);
    windGain.connect(audioCtx.destination);
    noiseSource.start();
  } catch(e) {}
}

function startWind() {
  if (!audioCtx || muted) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (windGain) {
    windGain.gain.cancelScheduledValues(audioCtx.currentTime);
    windGain.gain.setTargetAtTime(zenMode ? 0.07 : 0.04, audioCtx.currentTime, 0.5);
  }
}

function stopWind() {
  if (!windGain) return;
  windGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.8);
}

function updateWindPitch() {
  if (!windFilter || muted) return;
  const freq = 200 + (altitudeM / 4000) * 1800;
  windFilter.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.2);
}

function playNote(freq, duration = 0.3, volume = 0.15) {
  if (!audioCtx || muted) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playFlagSound(combo) {
  if (muted) return;
  const notes = PENTATONIC;
  const idx = (prayerFlagsCollected) % notes.length;
  playNote(notes[idx], 0.3, 0.15);
  if (combo >= 3) {
    setTimeout(() => playNote(notes[(idx + 2) % 5], 0.25, 0.1), 80);
    if (combo >= 5) setTimeout(() => playNote(notes[(idx + 4) % 5], 0.2, 0.08), 160);
  }
}

function playThermalSound() {
  if (muted) return;
  playNote(523.25, 0.4, 0.1); // C5 ascending chime
  setTimeout(() => playNote(659.25, 0.3, 0.07), 150);
}

function playCrashSound() {
  if (!audioCtx || muted) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.6);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.7);
  } catch(e) {}
}

function stopZenDrone() {
  zenDroneNodes.forEach(({ osc, gain }) => {
    try { osc.stop(); osc.disconnect(); gain.disconnect(); } catch(e) {}
  });
  zenDroneNodes = [];
  zenDroneStarted = false;
}

function startZenDrone() {
  if (!audioCtx || muted) return;
  stopZenDrone();
  zenDroneStarted = true;
  try {
    const droneFreqs = [65.41, 130.81, 196.00]; // C2 C3 G3
    droneFreqs.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.value = 0;
      gain.gain.setTargetAtTime(0.04 - i * 0.01, audioCtx.currentTime, 2);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start();
      zenDroneNodes.push({ osc, gain });
      zenDroneGain = gain;
    });
  } catch(e) {}
}

// ---- Perlin noise (simple 1D) ----
function fade(t) { return t*t*t*(t*(t*6-15)+10); }
function lerp(a,b,t) { return a+t*(b-a); }
const perm = new Uint8Array(512);
(function(){
  for(let i=0;i<256;i++) perm[i]=i;
  for(let i=255;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [perm[i],perm[j]]=[perm[j],perm[i]]; }
  for(let i=0;i<256;i++) perm[i+256]=perm[i];
})();
function grad(h,x){ const g=h&1?-1:1; return g*x; }
function noise1d(x){
  const X=Math.floor(x)&255;
  x-=Math.floor(x);
  const u=fade(x);
  return lerp(grad(perm[X],x),grad(perm[X+1],x-1),u)*2;
}
function fbm(x, octaves=4, persistence=0.5){
  let val=0, amp=1, freq=1, max=0;
  for(let i=0;i<octaves;i++){
    val+=noise1d(x*freq)*amp;
    max+=amp; amp*=persistence; freq*=2;
  }
  return val/max;
}

// ---- Terrain generation ----
function getTerrainY(xWorld, biome) {
  const b = Math.min(biome, 3);
  const amplitude = [80, 120, 160, 100][b];
  const freqMult = [0.003, 0.004, 0.005, 0.003][b];
  const base = H * 0.75;
  const n = fbm((xWorld + terrainSeed) * freqMult);
  return base + n * amplitude;
}

function generateTerrain() {
  terrainPoints = [];
  const numPoints = Math.ceil(W / TERRAIN_SEGMENT_W) + 10;
  for (let i = 0; i < numPoints; i++) {
    const xWorld = terrainOffset + i * TERRAIN_SEGMENT_W;
    terrainPoints.push(getTerrainY(xWorld, biomeIndex));
  }
}

function extendTerrain() {
  // Remove points that have scrolled off left
  while (terrainPoints.length > 0 && terrainOffset < -TERRAIN_SEGMENT_W) {
    terrainPoints.shift();
    terrainOffset += TERRAIN_SEGMENT_W;
  }
  // Add new points on the right
  const needed = Math.ceil(W / TERRAIN_SEGMENT_W) + 10;
  while (terrainPoints.length < needed) {
    const xWorld = terrainOffset + terrainPoints.length * TERRAIN_SEGMENT_W;
    terrainPoints.push(getTerrainY(xWorld, biomeIndex));
  }
}

function getSkyGradient(ctx, biome, distLocal) {
  const phase = (distLocal % 600) / 600; // slower day cycle
  const grad = ctx.createLinearGradient(0, 0, 0, H);

  let sky;
  if (biome === 0) {
    if (phase < 0.3) sky = BIR_PALETTE.dawn;
    else if (phase < 0.7) sky = BIR_PALETTE.midday;
    else sky = BIR_PALETTE.sunset;
  } else if (biome === 1) {
    sky = BIR_PALETTE.forest;
  } else if (biome === 2) {
    sky = BIR_PALETTE.alpine;
  } else {
    sky = BIR_PALETTE.cosmos;
  }

  grad.addColorStop(0, sky.top);
  grad.addColorStop(0.35, sky.mid);
  grad.addColorStop(0.7, sky.low);
  grad.addColorStop(1, sky.horizon);
  return grad;
}

function getTerrainColor(biome) {
  const t = BIR_PALETTE.terrain[Math.min(biome, 3)];
  return [t.top, t.bottom];
}

// ---- Drawing ----
function drawSky() {
  ctx.fillStyle = getSkyGradient(ctx, biomeIndex, distance);
  ctx.fillRect(0, 0, W, H);

  const phase = ((distance % 600) / 600);

  // Sun or moon
  if (biomeIndex < 3) {
    const sunX = W * (0.7 + phase * 0.2);
    const sunY = H * 0.12 + Math.sin(phase * Math.PI) * H * 0.08;
    if (phase > 0.7) {
      // Sunset sun — large warm glow
      const sunGrad = ctx.createRadialGradient(sunX, sunY + H*0.1, 10, sunX, sunY + H*0.1, 120);
      sunGrad.addColorStop(0, 'rgba(245,180,80,0.9)');
      sunGrad.addColorStop(0.3, 'rgba(245,130,58,0.4)');
      sunGrad.addColorStop(1, 'rgba(245,130,58,0)');
      ctx.fillStyle = sunGrad;
      ctx.fillRect(0, 0, W, H);
    } else {
      // Daytime sun glow
      const sunGrad = ctx.createRadialGradient(sunX, sunY, 8, sunX, sunY, 80);
      sunGrad.addColorStop(0, 'rgba(255,255,230,0.6)');
      sunGrad.addColorStop(0.5, 'rgba(255,255,200,0.15)');
      sunGrad.addColorStop(1, 'rgba(255,255,200,0)');
      ctx.fillStyle = sunGrad;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // Stars (above clouds biome)
  if (biomeIndex === 3) {
    for (let i = 0; i < 120; i++) {
      const sx = ((i * 137.5 + distance * 0.01) % W);
      const sy = (i * 97.3) % (H * 0.55);
      const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(distance * 0.005 + i));
      const r = 0.4 + (i % 4) * 0.4;
      ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
    }
  }

  // Atmospheric haze band at horizon (Kangra Valley haze)
  if (biomeIndex <= 1) {
    const hazeGrad = ctx.createLinearGradient(0, H * 0.6, 0, H);
    hazeGrad.addColorStop(0, 'rgba(168,196,216,0)');
    hazeGrad.addColorStop(0.5, 'rgba(168,196,216,0.12)');
    hazeGrad.addColorStop(1, 'rgba(168,196,216,0.25)');
    ctx.fillStyle = hazeGrad;
    ctx.fillRect(0, 0, W, H);
  }

  // Floating clouds (biomes 0-2)
  if (biomeIndex < 3) {
    drawClouds();
  }
}

function drawClouds() {
  ctx.save();
  for (let i = 0; i < 6; i++) {
    const cx = ((i * W * 0.4 + 200 - distance * 0.05) % (W * 2.5) + W * 2.5) % (W * 2.5) - W * 0.3;
    const cy = H * 0.08 + (i % 3) * H * 0.1;
    const scale = 0.6 + (i % 3) * 0.3;
    const alpha = biomeIndex === 2 ? 0.8 : 0.35;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#F0F4FF';

    // Soft cloud shape (3 overlapping ellipses)
    ctx.beginPath();
    ctx.ellipse(cx, cy, 60 * scale, 20 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx - 30 * scale, cy + 5 * scale, 40 * scale, 15 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 35 * scale, cy + 3 * scale, 45 * scale, 17 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawBackMountains() {
  const mp = BIR_PALETTE.mountains;

  // Layer 1: Far Dhauladhar range (slowest parallax — majestic backdrop)
  const scrollFar = distance * 0.05;
  ctx.save();
  for (const m of farMountains) {
    const mx = ((m.x - scrollFar) % (W * 2.5) + W * 2.5) % (W * 2.5) - W * 0.3;

    // Mountain body (dark slate rock)
    const rockGrad = ctx.createLinearGradient(0, m.peakY, 0, H * 0.75);
    rockGrad.addColorStop(0, mp.far.shadow);
    rockGrad.addColorStop(1, mp.far.fill);
    ctx.fillStyle = rockGrad;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(mx - m.width, H * 0.75);
    // Jagged peak shape (not just triangle)
    ctx.lineTo(mx - m.width * 0.6, m.peakY + m.height * 0.3);
    ctx.lineTo(mx - m.width * 0.2, m.peakY + m.height * 0.08);
    ctx.lineTo(mx, m.peakY);
    ctx.lineTo(mx + m.width * 0.25, m.peakY + m.height * 0.12);
    ctx.lineTo(mx + m.width * 0.5, m.peakY + m.height * 0.25);
    ctx.lineTo(mx + m.width, H * 0.75);
    ctx.closePath();
    ctx.fill();

    // Snow cap on peaks (biome 0-2 only, above clouds has no visible snow)
    if (biomeIndex < 3) {
      ctx.fillStyle = biomeIndex === 0 && ((distance % 600) / 600) > 0.7
        ? '#E8906A' // sunset glow on snow
        : mp.far.snow;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.moveTo(mx - m.width * 0.3, m.peakY + m.height * 0.2);
      ctx.lineTo(mx - m.width * 0.2, m.peakY + m.height * 0.08);
      ctx.lineTo(mx, m.peakY);
      ctx.lineTo(mx + m.width * 0.25, m.peakY + m.height * 0.12);
      ctx.lineTo(mx + m.width * 0.35, m.peakY + m.height * 0.22);
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.restore();

  // Layer 2: Mid mountains (closer range, faster parallax)
  const scrollMid = distance * 0.12;
  ctx.save();
  for (const m of backMountains) {
    const mx = ((m.x - scrollMid) % (W * 2) + W * 2) % (W * 2) - W * 0.4;
    const baseY = H * 0.65;

    // Mountain body with gradient
    const bodyGrad = ctx.createLinearGradient(0, m.peakY, 0, baseY);
    if (biomeIndex === 0) {
      bodyGrad.addColorStop(0, '#2D5A27'); // deodar forest green
      bodyGrad.addColorStop(1, '#3A8C3F');
    } else if (biomeIndex === 1) {
      bodyGrad.addColorStop(0, '#1A3A17');
      bodyGrad.addColorStop(1, '#2D5A27');
    } else if (biomeIndex === 2) {
      bodyGrad.addColorStop(0, '#5A6070');
      bodyGrad.addColorStop(1, '#7A8090');
    } else {
      bodyGrad.addColorStop(0, '#3A3050');
      bodyGrad.addColorStop(1, '#5A4070');
    }
    ctx.fillStyle = bodyGrad;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(mx - m.width, baseY);
    ctx.lineTo(mx - m.width * 0.4, m.peakY + (baseY - m.peakY) * 0.4);
    ctx.lineTo(mx, m.peakY);
    ctx.lineTo(mx + m.width * 0.35, m.peakY + (baseY - m.peakY) * 0.35);
    ctx.lineTo(mx + m.width, baseY);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawMidLayer() {
  const scrollMid = distance * 0.3;
  ctx.save();

  if (biomeIndex === 0) {
    // Bir Valley: Deodar cedars + tea garden patches
    for (const t of midTrees) {
      const tx = ((t.x - scrollMid) % (W * 3) + W * 3) % (W * 3);
      if (tx > W + 30 || tx < -30) continue;
      const baseY = H * 0.68;

      // Deodar cedar — pyramidal shape with drooping tips
      const h = t.height;
      const darkGreen = '#2D5A27';
      const midGreen = '#3D6B35';

      // Trunk
      ctx.fillStyle = '#5C4A2A';
      ctx.fillRect(tx - 1.5, baseY, 3, h * 0.3);

      // Layered canopy (3 tiers, getting wider)
      ctx.fillStyle = darkGreen;
      ctx.globalAlpha = 0.8;
      for (let tier = 0; tier < 3; tier++) {
        const ty = baseY - h * (0.3 + tier * 0.25);
        const tw = 5 + (2 - tier) * 5;
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(tx - tw, ty + h * 0.3);
        // Drooping tip
        ctx.quadraticCurveTo(tx - tw - 3, ty + h * 0.32, tx - tw - 2, ty + h * 0.35);
        ctx.lineTo(tx + tw + 2, ty + h * 0.35);
        ctx.quadraticCurveTo(tx + tw + 3, ty + h * 0.32, tx + tw, ty + h * 0.3);
        ctx.closePath();
        ctx.fillStyle = tier === 0 ? midGreen : darkGreen;
        ctx.fill();
      }
    }

    // Tea garden strips (horizontal green bands on terrain)
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#4CAF50';
    for (let i = 0; i < 4; i++) {
      const sx = ((i * W * 0.6 + 100 - scrollMid * 0.8) % (W * 2.5) + W * 2.5) % (W * 2.5) - W * 0.2;
      ctx.fillRect(sx, H * 0.78 + i * 8, W * 0.15, 4);
      ctx.fillRect(sx + 5, H * 0.78 + i * 8 + 5, W * 0.14, 3);
    }

  } else if (biomeIndex === 1) {
    // Dense pine forest — darker, thicker
    ctx.globalAlpha = 0.75;
    for (const t of midTrees) {
      const tx = ((t.x - scrollMid) % (W * 3) + W * 3) % (W * 3);
      if (tx > W + 20 || tx < -20) continue;
      const baseY = H * 0.65;
      const h = t.height * 1.3;

      // Dense triangular pines
      ctx.fillStyle = '#1A3A17';
      ctx.beginPath();
      ctx.moveTo(tx, baseY - h);
      ctx.lineTo(tx - 8, baseY);
      ctx.lineTo(tx + 8, baseY);
      ctx.closePath();
      ctx.fill();

      // Second layer slightly offset
      ctx.fillStyle = '#243F20';
      ctx.beginPath();
      ctx.moveTo(tx, baseY - h * 0.85);
      ctx.lineTo(tx - 10, baseY - h * 0.1);
      ctx.lineTo(tx + 10, baseY - h * 0.1);
      ctx.closePath();
      ctx.fill();
    }

  } else if (biomeIndex === 2) {
    // Snow peaks: rocky outcrops
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#5A5E68';
    for (let i = 0; i < 8; i++) {
      const rx = ((i * W * 0.35 - scrollMid * 0.6) % (W * 3) + W * 3) % (W * 3);
      const rh = 15 + (i % 3) * 12;
      ctx.beginPath();
      ctx.moveTo(rx, H * 0.72);
      ctx.lineTo(rx + 8, H * 0.72 - rh);
      ctx.lineTo(rx + 18, H * 0.72 - rh * 0.7);
      ctx.lineTo(rx + 25, H * 0.72);
      ctx.closePath();
      ctx.fill();
    }

  } else {
    // Above clouds: cloud floor below
    ctx.globalAlpha = 0.6;
    for (let i = 0; i < 10; i++) {
      const cx = ((i * W * 0.28 - distance * 0.08) % (W * 3) + W * 3) % (W * 3);
      const cy = H * 0.78 + (i % 3) * 10;
      ctx.fillStyle = 'rgba(200,180,220,0.4)';
      ctx.beginPath();
      ctx.ellipse(cx, cy, 80, 15, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + 40, cy + 5, 50, 12, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawTerrain() {
  const t = BIR_PALETTE.terrain[Math.min(biomeIndex, 3)];

  // Main terrain fill
  ctx.beginPath();
  ctx.moveTo(-10, H);
  for (let i = 0; i < terrainPoints.length; i++) {
    ctx.lineTo(i * TERRAIN_SEGMENT_W, terrainPoints[i]);
  }
  ctx.lineTo(W + 20, H);
  ctx.closePath();
  const tGrad = ctx.createLinearGradient(0, H * 0.55, 0, H);
  tGrad.addColorStop(0, t.top);
  tGrad.addColorStop(0.6, t.bottom);
  tGrad.addColorStop(1, t.top);
  ctx.fillStyle = tGrad;
  ctx.fill();

  // Terrain detail overlay (terracing for Bir, snow patches for peaks)
  if (biomeIndex === 0) {
    // Terrace lines (horizontal stripes suggesting tea garden rows)
    ctx.strokeStyle = 'rgba(139,105,20,0.15)'; // ochre
    ctx.lineWidth = 1;
    for (let y = H * 0.82; y < H; y += 6) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y + Math.sin(y * 0.1) * 2);
      ctx.stroke();
    }
  } else if (biomeIndex === 2) {
    // Snow patches on terrain ridges
    ctx.fillStyle = 'rgba(240,244,248,0.4)';
    for (let i = 0; i < terrainPoints.length; i += 8) {
      const sx = i * TERRAIN_SEGMENT_W;
      const sy = terrainPoints[i];
      if (sy < H * 0.85) {
        ctx.beginPath();
        ctx.ellipse(sx, sy + 2, 12, 4, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Terrain edge highlight (subtle light on ridgeline)
  ctx.strokeStyle = biomeIndex === 2 ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < terrainPoints.length; i++) {
    const x = i * TERRAIN_SEGMENT_W;
    if (i === 0) ctx.moveTo(x, terrainPoints[i]);
    else ctx.lineTo(x, terrainPoints[i]);
  }
  ctx.stroke();
}

function drawThermals() {
  for (const t of thermals) {
    if (!t.active) continue;
    t.phase += 0.03;
    const grd = ctx.createRadialGradient(t.x, t.y + t.height/2, 5, t.x, t.y + t.height/2, t.width);
    grd.addColorStop(0, 'rgba(255,180,50,0.25)');
    grd.addColorStop(1, 'rgba(255,180,50,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(t.x, t.y + t.height/2, t.width * (0.8 + 0.2*Math.sin(t.phase)), t.height/2, 0, 0, Math.PI*2);
    ctx.fill();

    // Shimmer lines
    ctx.strokeStyle = 'rgba(255,200,80,0.15)';
    ctx.lineWidth = 1;
    for (let l = 0; l < 3; l++) {
      const phase2 = t.phase + l * 0.8;
      ctx.beginPath();
      ctx.moveTo(t.x + Math.sin(phase2) * t.width * 0.3, t.y + t.height);
      ctx.bezierCurveTo(
        t.x + Math.sin(phase2 + 1) * t.width * 0.5, t.y + t.height * 0.5,
        t.x + Math.sin(phase2 + 2) * t.width * 0.3, t.y + t.height * 0.3,
        t.x + Math.sin(phase2 + 3) * t.width * 0.1, t.y,
      );
      ctx.stroke();
    }
  }
}

function drawPrayerFlags() {
  const flagColors = BIR_PALETTE.flags; // Blue, White, Red, Green, Yellow

  for (const f of prayerFlags) {
    if (f.collected) continue;
    f.phase += 0.05;

    const groundY = getTerrainY(f.x + distance, biomeIndex);
    const poleTop = f.y;

    // Bamboo pole (warm brown)
    ctx.strokeStyle = '#8B7355';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(f.x, groundY);
    ctx.lineTo(f.x, poleTop - 5);
    ctx.stroke();

    // String line (catenary curve between invisible poles)
    const stringStartX = f.x - 38;
    const stringEndX = f.x + 42;
    const stringY = poleTop + 4;
    ctx.strokeStyle = 'rgba(180,160,120,0.6)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(stringStartX, stringY);
    ctx.quadraticCurveTo(f.x, stringY + 8 + Math.sin(f.phase) * 2, stringEndX, stringY + 2);
    ctx.stroke();

    // 5 prayer flags (authentic Tibetan order: blue, white, red, green, yellow)
    const flagW = 13, flagH = 9;
    for (let i = 0; i < 5; i++) {
      const t = i / 4;
      const fx = stringStartX + t * (stringEndX - stringStartX);
      const sag = Math.sin(t * Math.PI) * 8 + Math.sin(f.phase) * 2;
      const fy = stringY + sag;
      const wave = Math.sin(f.phase + i * 0.6) * 3;

      // Flag body (slight wave distortion)
      ctx.save();
      ctx.translate(fx, fy);
      ctx.rotate(wave * 0.02);
      ctx.fillStyle = flagColors[i];
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(flagW, wave * 0.3);
      ctx.lineTo(flagW + wave, flagH + wave * 0.2);
      ctx.lineTo(0, flagH);
      ctx.closePath();
      ctx.fill();

      // Subtle fabric texture lines
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.lineWidth = 0.3;
      ctx.beginPath();
      ctx.moveTo(2, flagH * 0.3); ctx.lineTo(flagW - 2, flagH * 0.3 + wave * 0.1);
      ctx.moveTo(2, flagH * 0.6); ctx.lineTo(flagW - 2, flagH * 0.6 + wave * 0.15);
      ctx.stroke();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
}

function drawEagles() {
  for (const e of eagles) {
    e.wingPhase += 0.06;
    const wing = Math.sin(e.wingPhase) * 10;
    const soar = Math.cos(e.wingPhase * 0.5) * 3;

    ctx.save();
    ctx.translate(e.x, e.y + soar);

    // Shadow underneath (subtle ground shadow effect)
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.beginPath();
    ctx.ellipse(0, 30, 18, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wings — curved, raptor-like with finger feathers
    ctx.fillStyle = '#2A1A0A'; // dark brown (Himalayan griffon coloring)
    ctx.beginPath();
    // Left wing
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-12, -3 + wing * 0.5, -28, wing);
    // Finger feathers at tip
    ctx.lineTo(-30, wing + 2);
    ctx.lineTo(-26, wing - 1);
    ctx.lineTo(-24, wing + 3);
    ctx.quadraticCurveTo(-12, wing * 0.3 + 2, 0, 3);
    ctx.closePath();
    ctx.fill();

    // Right wing
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(12, -3 + wing * 0.5, 28, wing);
    ctx.lineTo(30, wing + 2);
    ctx.lineTo(26, wing - 1);
    ctx.lineTo(24, wing + 3);
    ctx.quadraticCurveTo(12, wing * 0.3 + 2, 0, 3);
    ctx.closePath();
    ctx.fill();

    // Wing highlight
    ctx.fillStyle = '#4A3520';
    ctx.beginPath();
    ctx.moveTo(-3, 0);
    ctx.quadraticCurveTo(-10, -1 + wing * 0.3, -20, wing * 0.8);
    ctx.quadraticCurveTo(-10, wing * 0.3 + 3, -3, 2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(3, 0);
    ctx.quadraticCurveTo(10, -1 + wing * 0.3, 20, wing * 0.8);
    ctx.quadraticCurveTo(10, wing * 0.3 + 3, 3, 2);
    ctx.closePath();
    ctx.fill();

    // Body
    ctx.fillStyle = '#1A0E05';
    ctx.beginPath();
    ctx.ellipse(0, 1, 6, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Head + beak
    ctx.fillStyle = '#F5F5E0'; // white head (like bearded vulture)
    ctx.beginPath();
    ctx.arc(0, -7, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // Hooked beak
    ctx.fillStyle = '#D4A030';
    ctx.beginPath();
    ctx.moveTo(0, -5);
    ctx.lineTo(2, -4);
    ctx.lineTo(0, -2.5);
    ctx.closePath();
    ctx.fill();

    // Tail
    ctx.fillStyle = '#2A1A0A';
    ctx.beginPath();
    ctx.moveTo(-3, 8);
    ctx.lineTo(0, 14);
    ctx.lineTo(3, 8);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }
}

function drawGlider() {
  const gx = gliderX;
  const gy = gliderY;

  const tilt = Math.max(-0.35, Math.min(0.35, -velocity * 0.035));
  const thermal_glow = inThermal;

  ctx.save();
  ctx.translate(gx, gy);
  ctx.rotate(tilt);

  // Thermal amber glow
  if (thermal_glow) {
    const glowPhase = Date.now() * 0.004;
    const glowGrad = ctx.createRadialGradient(0, -5, 10, 0, -5, 50);
    glowGrad.addColorStop(0, `rgba(255,180,50,${0.2 + Math.sin(glowPhase) * 0.1})`);
    glowGrad.addColorStop(1, 'rgba(255,180,50,0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(-55, -35, 110, 70);
  }

  // Canopy — curved paraglider wing (not a trapezoid)
  // Main canopy arc
  ctx.beginPath();
  ctx.moveTo(-32, -6);
  ctx.quadraticCurveTo(-20, -26, 0, -28);
  ctx.quadraticCurveTo(20, -26, 32, -6);
  ctx.quadraticCurveTo(20, -10, 0, -11);
  ctx.quadraticCurveTo(-20, -10, -32, -6);
  ctx.closePath();

  // Canopy gradient (Indian tricolor inspired — saffron, white, green)
  const canopyGrad = ctx.createLinearGradient(-32, -28, 32, -6);
  canopyGrad.addColorStop(0, '#FF6F00'); // saffron edge
  canopyGrad.addColorStop(0.2, '#FF8F00');
  canopyGrad.addColorStop(0.45, '#FFF3E0'); // white center
  canopyGrad.addColorStop(0.55, '#FFF3E0');
  canopyGrad.addColorStop(0.8, '#2E7D32'); // green edge
  canopyGrad.addColorStop(1, '#1B5E20');
  ctx.fillStyle = canopyGrad;
  ctx.fill();

  // Canopy cell lines (the ribs of a paraglider)
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 0.6;
  for (let i = -3; i <= 3; i++) {
    const ribX = i * 8;
    const ribTopY = -27 + Math.abs(i) * 2.5;
    const ribBotY = -9 + Math.abs(i) * 0.5;
    ctx.beginPath();
    ctx.moveTo(ribX, ribTopY);
    ctx.lineTo(ribX, ribBotY);
    ctx.stroke();
  }

  // Canopy edge highlight (light catching top surface)
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-30, -8);
  ctx.quadraticCurveTo(-18, -25, 0, -27);
  ctx.quadraticCurveTo(18, -25, 30, -8);
  ctx.stroke();

  // Brake/control lines (4 lines from canopy to harness)
  ctx.strokeStyle = 'rgba(80,60,40,0.6)';
  ctx.lineWidth = 0.6;
  const lineAnchors = [[-20, -8], [-8, -10], [8, -10], [20, -8]];
  const harnessPts = [[-5, 6], [-2, 7], [2, 7], [5, 6]];
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(lineAnchors[i][0], lineAnchors[i][1]);
    ctx.lineTo(harnessPts[i][0], harnessPts[i][1]);
    ctx.stroke();
  }

  // Pilot in harness (seated position)
  // Harness/body
  ctx.fillStyle = '#2C3E50';
  ctx.beginPath();
  ctx.ellipse(0, 11, 6, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs (dangling)
  ctx.fillStyle = '#1A2A3A';
  ctx.beginPath();
  ctx.moveTo(-4, 16); ctx.lineTo(-5, 24); ctx.lineTo(-2, 24); ctx.lineTo(-2, 16);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(2, 16); ctx.lineTo(2, 24); ctx.lineTo(5, 24); ctx.lineTo(4, 16);
  ctx.fill();

  // Helmet (red — visible from below, standard safety color)
  ctx.fillStyle = '#E63946';
  ctx.beginPath();
  ctx.arc(0, 5, 4.5, 0, Math.PI * 2);
  ctx.fill();
  // Helmet shine
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(-1.5, 3.5, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) { particles[i] = particles[particles.length - 1]; particles.pop(); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.alpha ? p.color + p.life + ')' : p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---- Collision ----
function getTerrainYAtX(screenX) {
  const idx = Math.floor(screenX / TERRAIN_SEGMENT_W);
  if (idx < 0 || idx >= terrainPoints.length - 1) return H * 0.8;
  const frac = (screenX % TERRAIN_SEGMENT_W) / TERRAIN_SEGMENT_W;
  return terrainPoints[idx] * (1 - frac) + terrainPoints[idx + 1] * frac;
}

function checkCollisions() {
  const terrainY = getTerrainYAtX(gliderX);

  // Ground collision
  if (gliderY + 12 >= terrainY) {
    if (zenMode) {
      // Auto-recover: bounce up
      velocity = 8;
      gliderY = terrainY - 20;
      zenRecovering = true;
      return;
    }
    endGame();
    return;
  }

  // Prayer flags
  for (let i = prayerFlags.length - 1; i >= 0; i--) {
    const f = prayerFlags[i];
    if (f.collected) continue;
    const dx = gliderX - f.x;
    const dy = gliderY - f.y;
    if (Math.abs(dx) < 30 && Math.abs(dy) < 30) {
      f.collected = true;
      prayerFlagsCollected++;
      flagCombo++;
      flagComboTimer = 180; // 3 seconds at 60fps
      maxCombo = Math.max(maxCombo, flagCombo);

      // Score — PRD combo tiers: x1(1-2), x2(3-4), x3(5-7), x5(8+)
      const mult = flagCombo <= 2 ? 1 : flagCombo <= 4 ? 2 : flagCombo <= 7 ? 3 : 5;
      const pts = 100 * mult;
      totalFlagScore += pts;
      totalScore += pts;

      playFlagSound(flagCombo);
      spawnFlagParticles(f.x, f.y, f.colors);

      // HUD combo
      updateComboDisplay();
      checkAchievements();
    }
  }

  // Eagles
  for (const e of eagles) {
    const dx = gliderX - e.x;
    const dy = gliderY - e.y;
    const dist2 = dx*dx + dy*dy;

    // Near miss range (60px) but not collision (20px)
    if (!e.nearMissed && dist2 < 60*60 && dist2 > 20*20) {
      e.nearMissed = true;
      eagleNearMisses++;
      totalNearMissBonus += 250;
      totalScore += 250;
      flashScreen('rgba(255,255,255,0.25)');
    }

    // Collision
    if (!zenMode && dist2 < 22*22) {
      endGame();
      return;
    }
  }

  // Thermals
  inThermal = false;
  for (const t of thermals) {
    if (!t.active) continue;
    const dx = Math.abs(gliderX - t.x);
    const dy = gliderY - t.y;
    if (dx < t.width && dy > 0 && dy < t.height) {
      inThermal = true;
      if (thermalTimer === 0) {
        thermalsCount++;
        playThermalSound();
        spawnThermalParticles(gliderX, gliderY);
        checkAchievements();
      }
      thermalTimer = 30;
    }
  }
  if (thermalTimer > 0) thermalTimer--;
}

// ---- Physics ----
const GRAVITY = 0.18;
const RISE_FORCE = 0.5;
const THERMAL_BOOST = 0.25;
const MAX_RISE = 8;
const MAX_FALL = -6;

function updatePhysics(dt) {
  if (isHolding) {
    velocity += RISE_FORCE;
  } else {
    velocity -= GRAVITY;
  }

  if (inThermal) velocity += THERMAL_BOOST;

  velocity = Math.max(MAX_FALL, Math.min(MAX_RISE, velocity));
  gliderY -= velocity;

  // Altitude clamp (don't go above screen)
  if (gliderY < 60) {
    gliderY = 60;
    velocity = Math.min(velocity, 0);
  }
}

// ---- Game Update ----
let lastTime = 0;
function gameLoop(ts) {
  animFrameId = requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  if (gameState !== 'playing') return;

  gameTime += dt;
  distance += scrollSpeed * dt;
  totalScore = Math.floor(distance) + totalFlagScore + totalNearMissBonus + altitudeMilestoneBonus;

  // Update biome
  let newBiome = 0;
  for (let i = BIOMES.length - 1; i >= 0; i--) {
    if (distance >= BIOMES[i].minDist) { newBiome = i; break; }
  }
  if (newBiome !== biomeIndex) {
    biomeIndex = newBiome;
    if (!visitedBiomes.has(biomeIndex)) {
      visitedBiomes.add(biomeIndex);
      showBiomeCard(BIOMES[biomeIndex]);
    }
  }

  // Altitude in meters (scale: canvas bottom ~= 0m, top ~= 4000m)
  altitudeM = Math.max(0, Math.floor((1 - gliderY / H) * 4000));
  maxAltitudeM = Math.max(maxAltitudeM, altitudeM);

  // Altitude milestones
  [1000, 2000, 3000, 4000].forEach(m => {
    if (altitudeM >= m && !altitudeMilestonesHit.has(m)) {
      altitudeMilestonesHit.add(m);
      const bonus = {1000:500, 2000:1500, 3000:3000, 4000:5000}[m];
      altitudeMilestoneBonus += bonus;
      totalScore += bonus;
      flashScreen('rgba(255,255,255,0.15)');
    }
  });

  // Flag combo timer
  if (flagComboTimer > 0) {
    flagComboTimer -= dt;
    if (flagComboTimer <= 0) {
      flagCombo = 0;
      updateComboDisplay();
    }
  }

  // Scroll difficulty
  scrollSpeed = Math.min(0.75, 0.25 + distance * 0.00003);

  // Scroll terrain
  terrainOffset -= scrollSpeed * dt;
  extendTerrain();

  // Scroll objects
  for (const f of prayerFlags) f.x -= scrollSpeed * dt;
  for (const e of eagles) { e.x -= (scrollSpeed + e.speed) * dt; e.y += e.vy * dt; }
  for (const t of thermals) t.x -= scrollSpeed * dt;

  // Remove off-screen objects
  prayerFlags = prayerFlags.filter(f => f.x > -60);
  eagles = eagles.filter(e => e.x > -60);
  thermals = thermals.filter(t => t.x > -100);

  // Spawn new objects
  spawnObjects();

  updatePhysics(dt);
  checkCollisions();
  checkGoals();
  updateWindPitch();

  // Draw
  draw();
  updateHUD();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();           // Layer 0: sky + sun/moon + haze + clouds
  drawBackMountains(); // Layer 1-2: far Dhauladhar peaks + mid range
  drawMidLayer();      // Layer 3: trees / rocks / cloud floor
  drawThermals();      // Layer 4: thermal shimmer
  drawPrayerFlags();   // Layer 5: prayer flags on poles
  drawEagles();        // Layer 6: eagles (can be above or below glider)
  drawTerrain();       // Layer 7: foreground terrain (Perlin)
  drawGlider();        // Layer 8: player paraglider
  drawParticles();     // Layer 9: particles (flag sparkles, thermal wisps)
}

// ---- HUD ----
function updateHUD() {
  document.getElementById('hudDistance').innerHTML = Math.floor(distance) + ' <span>m</span>';
  if (personalBest > 0) {
    document.getElementById('hudBest').textContent = 'Best: ' + personalBest + 'm';
  }
  const altPct = Math.min(100, (altitudeM / 4000) * 100);
  document.getElementById('altFill').style.height = altPct + '%';
  document.getElementById('altLabel').textContent = altitudeM + 'm';
}

function updateComboDisplay() {
  const el = document.getElementById('hudCombo');
  if (flagCombo >= 2) {
    const mult = flagCombo <= 2 ? 1 : flagCombo <= 4 ? 2 : flagCombo <= 7 ? 3 : 5;
    el.textContent = 'x' + mult + ' Combo!';
    el.classList.add('active');
  } else {
    el.classList.remove('active');
  }
}

// ---- Goals ----
const GOAL_POOL_ACTIVE = [
  { id: 'thermals3', text: 'Catch 3 thermals', check: () => thermalsCount >= 3 },
  { id: 'flags10',   text: 'Collect 10 flags',  check: () => prayerFlagsCollected >= 10 },
  { id: 'dist1000',  text: 'Fly 1000m',          check: () => distance >= 1000 },
];

function pickGoals() {
  goals = GOAL_POOL_ACTIVE.slice(0, 3);
  renderGoals();
}

function checkGoals() {
  let changed = false;
  for (const g of goals) {
    const was = goalProgress[g.id];
    const now = g.check();
    if (now && !was) { goalProgress[g.id] = true; changed = true; }
  }
  if (changed) renderGoals();
}

function renderGoals() {
  const panel = document.getElementById('goalsPanel');
  if (!panel) return;
  panel.innerHTML = goals.map(g => {
    const done = goalProgress[g.id];
    return `<div class="goal-item"><div class="goal-dot ${done?'done':''}"></div>${g.text}</div>`;
  }).join('');
}

// ---- Biome card ----
let biomeCardTimeout = null;
function showBiomeCard(biome) {
  const card = document.getElementById('biomeCard');
  document.getElementById('biomeCardName').textContent = biome.name;
  document.getElementById('biomeCardSub').textContent = biome.sub;
  card.classList.add('show');
  clearTimeout(biomeCardTimeout);
  biomeCardTimeout = setTimeout(() => card.classList.remove('show'), 2500);
}

// ---- Screen flash ----
function flashScreen(color) {
  const el = document.getElementById('screenFlash');
  el.style.background = color;
  el.style.opacity = '1';
  setTimeout(() => { el.style.transition = 'opacity 0.5s'; el.style.opacity = '0'; }, 50);
  setTimeout(() => { el.style.transition = ''; }, 600);
}

// ---- Toast ----
function showToast(icon, text) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<span>${icon}</span><span>${text}</span>`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3200);
}

// ---- Game Flow ----
function startGame() {
  // Reset state
  distance = 0;
  score = 0;
  totalScore = 0;
  totalFlagScore = 0;
  totalNearMissBonus = 0;
  altitudeMilestoneBonus = 0;
  altitude = 200;
  velocity = 2;
  gliderX = W * 0.3;
  gliderY = H * 0.45;
  scrollSpeed = 0.25;
  prayerFlagsCollected = 0;
  flagCombo = 0;
  flagComboTimer = 0;
  maxCombo = 0;
  eagleNearMisses = 0;
  thermalsCount = 0;
  inThermal = false;
  thermalTimer = 0;
  biomeIndex = 0;
  altitudeM = 0;
  maxAltitudeM = 0;
  visitedBiomes = new Set([0]);
  altitudeMilestonesHit = new Set();
  isNewBest = false;
  zenRecovering = false;
  zenTimer = 0;
  zenDroneStarted = false;

  prayerFlags = [];
  eagles = [];
  thermals = [];
  particles = [];
  goals = [];
  goalProgress = {};

  terrainOffset = 0;
  terrainSeed = Math.random() * 10000;
  generateTerrain();
  generateBackMountains();
  generateMidTrees();

  pickGoals();

  runStartTime = Date.now();
  gameTime = 0;

  // Hide/show UI
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('gameoverScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'block';

  // Cancel any existing game loop to prevent duplicate rAF chains
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  if (menuBgAnimId) { cancelAnimationFrame(menuBgAnimId); menuBgAnimId = null; }

  gameState = 'playing';

  initAudio();
  startWind();
  stopZenDrone();
  if (zenMode) startZenDrone();

  animFrameId = requestAnimationFrame(gameLoop);
}

function endGame() {
  if (gameState !== 'playing') return;
  gameState = 'gameover';

  stopWind();
  stopZenDrone();
  playCrashSound();

  // Check personal best
  if (distance > personalBest) {
    personalBest = Math.floor(distance);
    isNewBest = true;
    localStorage.setItem('bir-glider-best', personalBest);
  }

  document.getElementById('hud').style.display = 'none';
  showGameOver();
}

function showMenu() {
  gameState = 'menu';
  document.getElementById('gameoverScreen').classList.add('hidden');
  document.getElementById('menuScreen').classList.remove('hidden');
  document.getElementById('hud').style.display = 'none';
  updateMenuBest();
}

function showGameOver() {
  const screen = document.getElementById('gameoverScreen');
  screen.classList.remove('hidden');

  document.getElementById('statDistance').textContent = Math.floor(distance) + 'm';
  document.getElementById('statAltitude').textContent = maxAltitudeM + 'm';
  document.getElementById('statFlags').textContent = prayerFlagsCollected;

  if (isNewBest) {
    document.getElementById('statDistance').classList.add('new-best');
    document.getElementById('gameoverTitle').textContent = 'New Record!';
    document.getElementById('gameoverSubtitle').textContent = 'You soared further than ever before.';
  } else {
    document.getElementById('statDistance').classList.remove('new-best');
    document.getElementById('gameoverTitle').textContent = 'Landed';
    document.getElementById('gameoverSubtitle').textContent = 'The mountain is patient. Fly again.';
    const gap = personalBest - Math.floor(distance);
    if (gap > 0) {
      document.getElementById('gapToBest').innerHTML = `You were <strong>${gap}m</strong> from your record`;
    } else {
      document.getElementById('gapToBest').textContent = '';
    }
  }

  const biomeName = BIOMES[biomeIndex].name;
  document.getElementById('biomeReached').textContent = 'Reached: ' + biomeName;

  // Unlock achievements
  checkAndUnlockAchievements();

  // Submit score button
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = false;
  submitBtn.textContent = 'Submit Score';
  if (!currentUser) {
    submitBtn.textContent = 'Sign in to Submit';
  }
}

// ---- Achievements ----
function checkAchievements() {
  // In-game quick checks (lightweight)
}

async function checkAndUnlockAchievements() {
  if (!currentUser || !window.apiClient) return;

  const toUnlock = [];

  // First flight (only unlock once)
  if (!localStorage.getItem('bir-glider-first-flight')) {
    toUnlock.push('bir_first_flight');
    localStorage.setItem('bir-glider-first-flight', '1');
  }

  // Flag collector (10 in one run)
  if (prayerFlagsCollected >= 10) toUnlock.push('bir_flag_collector');

  // Altitude 1000
  if (maxAltitudeM >= 1000) toUnlock.push('bir_altitude_1000');

  // Eagle dodger
  if (eagleNearMisses >= 10) toUnlock.push('bir_eagle_dodger');

  // Himalayan explorer (Snow Peaks = biome index 2, distance 2500m)
  if (distance >= 2500) toUnlock.push('bir_himalayan_explorer');

  // Thermal rider (20 thermals)
  if (thermalsCount >= 20) toUnlock.push('bir_thermal_rider');

  // Legend (10k score)
  if (totalScore >= 10000) toUnlock.push('bir_legend');

  // Zen master (5 min = 300s) — gameTime is in dt units (~60/sec at 60fps)
  // gameTime/60 converts to real seconds
  const zenPlaytimeSeconds = gameTime / 60;
  if (zenMode && zenPlaytimeSeconds >= 300) toUnlock.push('bir_zen_master');

  for (const id of toUnlock) {
    try {
      await window.apiClient.unlockAchievement(id, 'bir-glider');
    } catch(e) {}
  }
}

// ---- Score submission ----
let lastSubmitTime = 0;
const SUBMIT_COOLDOWN_MS = 10_000;

async function submitScore() {
  if (gameState !== 'gameover') return;
  if (!currentUser) {
    if (window.authManager) window.authManager.signIn();
    return;
  }
  if (!window.apiClient) return;
  if (Date.now() - lastSubmitTime < SUBMIT_COOLDOWN_MS) return;
  lastSubmitTime = Date.now();

  // Re-derive score from components
  const derivedScore = Math.floor(distance) + totalFlagScore + totalNearMissBonus + altitudeMilestoneBonus;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    await window.apiClient.submitScore('bir-glider', {
      score: derivedScore,
      level: biomeIndex,
      timeMs: Date.now() - runStartTime,
      metadata: {
        distance: Math.floor(distance),
        maxAltitude: maxAltitudeM,
        prayerFlags: prayerFlagsCollected,
        maxCombo: maxCombo,
        eagleNearMisses: eagleNearMisses,
        biome: BIOMES[biomeIndex].name,
        goalsCompleted: goals.filter(g => goalProgress[g.id]).length,
        zenMode: zenMode,
      }
    });
    btn.textContent = 'Submitted!';
    showToast('✅', 'Score submitted!');
  } catch(err) {
    console.error('Score submit failed:', err);
    btn.disabled = false;
    btn.textContent = 'Retry Submit';
  }
}

// ---- Controls ----
function onHoldStart(e) {
  e.preventDefault();
  if (gameState !== 'playing') return;
  isHolding = true;
}
function onHoldEnd(e) {
  isHolding = false;
}

function setupControls() {
  canvas.addEventListener('mousedown', onHoldStart);
  canvas.addEventListener('mouseup', onHoldEnd);
  canvas.addEventListener('mouseleave', onHoldEnd);
  canvas.addEventListener('touchstart', onHoldStart, { passive: false });
  canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  canvas.addEventListener('touchend', onHoldEnd);
  canvas.addEventListener('touchcancel', onHoldEnd);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); onHoldStart(e); }
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') onHoldEnd(e);
  });
  window.addEventListener('blur', () => { isHolding = false; });
}

// ---- Zen mode ----
function toggleZenMode() {
  zenMode = !zenMode;
  const toggle = document.getElementById('zenToggle');
  toggle.classList.toggle('active', zenMode);
  toggle.setAttribute('aria-checked', zenMode ? 'true' : 'false');
  localStorage.setItem('bir-glider-zen', zenMode ? '1' : '0');
}

// ---- Sound toggle ----
function toggleMute() {
  muted = !muted;
  const btn = document.getElementById('muteBtn');
  btn.querySelector('span').textContent = muted ? '🔇' : '🔊';
  btn.setAttribute('aria-label', muted ? 'Sound off' : 'Sound on');
  btn.setAttribute('aria-pressed', muted ? 'true' : 'false');
  if (windGain) windGain.gain.value = muted ? 0 : 0.04;
  localStorage.setItem('bir-glider-muted', muted ? '1' : '0');
}

// ---- Auth ----
function handleAuth() {
  if (currentUser) {
    window.location.href = '/profile/';
  } else if (window.authManager) {
    window.authManager.signIn();
  }
}

function setupAuth() {
  if (window.authManager) {
    window.authManager.onAuthStateChanged(user => {
      currentUser = user;
      const btn = document.getElementById('authBtn');
      if (user) {
        btn.textContent = user.displayName || 'Profile';
        btn.onclick = () => window.location.href = '/profile/';
      } else {
        btn.textContent = 'Sign In';
        btn.onclick = () => window.authManager.signIn();
      }
    });
  }
}

// ---- Menu background animation ----
let menuBgOffset = 0;
function animateMenuBg() {
  if (gameState !== 'menu') return;
  const mbCanvas = document.getElementById('menuBgCanvas');
  if (!mbCanvas) return;
  const mc = mbCanvas.getContext('2d');
  const mw = mbCanvas.width;
  const mh = mbCanvas.height;
  menuBgOffset += 0.5;

  // Golden hour sunset sky (Bir's famous sunset)
  const grad = mc.createLinearGradient(0, 0, 0, mh);
  grad.addColorStop(0, '#7A4A9E');   // violet upper sky
  grad.addColorStop(0.25, '#D4608A'); // rose mid
  grad.addColorStop(0.5, '#F5813A');  // deep orange
  grad.addColorStop(0.75, '#E8A845'); // golden horizon
  grad.addColorStop(1, '#A8C4D8');    // valley haze
  mc.fillStyle = grad;
  mc.fillRect(0, 0, mw, mh);

  // Sun glow near horizon
  const sunGrad = mc.createRadialGradient(mw * 0.7, mh * 0.45, 20, mw * 0.7, mh * 0.45, mw * 0.3);
  sunGrad.addColorStop(0, 'rgba(245,200,100,0.5)');
  sunGrad.addColorStop(1, 'rgba(245,130,58,0)');
  mc.fillStyle = sunGrad;
  mc.fillRect(0, 0, mw, mh);

  // Far Dhauladhar peaks (snow-capped, sunset glow)
  for (let i = 0; i < 4; i++) {
    const mx = ((i * mw/3 + mw*0.1) - menuBgOffset * 0.05 + mw * 3) % (mw * 2);
    const peakY = mh * 0.2 + Math.sin(i * 1.7) * mh * 0.08;
    const w = mw * 0.2 + i * mw * 0.03;

    // Dark rock body
    mc.fillStyle = 'rgba(58,62,72,0.5)';
    mc.beginPath();
    mc.moveTo(mx - w, mh * 0.7);
    mc.lineTo(mx - w * 0.3, peakY + (mh * 0.7 - peakY) * 0.3);
    mc.lineTo(mx, peakY);
    mc.lineTo(mx + w * 0.4, peakY + (mh * 0.7 - peakY) * 0.25);
    mc.lineTo(mx + w, mh * 0.7);
    mc.closePath();
    mc.fill();

    // Sunset-glow snow cap
    mc.fillStyle = 'rgba(232,144,106,0.6)';
    mc.beginPath();
    mc.moveTo(mx - w * 0.25, peakY + (mh * 0.7 - peakY) * 0.18);
    mc.lineTo(mx, peakY);
    mc.lineTo(mx + w * 0.3, peakY + (mh * 0.7 - peakY) * 0.15);
    mc.closePath();
    mc.fill();
  }

  // Mid-range green mountains (deodar forest)
  mc.fillStyle = 'rgba(45,90,39,0.6)';
  for (let i = 0; i < 6; i++) {
    const mx = ((i * mw/4.5) - menuBgOffset * 0.15 + mw * 2.5) % (mw * 2);
    mc.beginPath();
    mc.moveTo(mx - mw*0.12, mh);
    mc.lineTo(mx, mh * 0.45 + Math.sin(i*1.3)*mh*0.08);
    mc.lineTo(mx + mw*0.12, mh);
    mc.closePath();
    mc.fill();
  }

  // Valley floor haze
  const hazeGrad = mc.createLinearGradient(0, mh * 0.7, 0, mh);
  hazeGrad.addColorStop(0, 'rgba(168,196,216,0)');
  hazeGrad.addColorStop(1, 'rgba(168,196,216,0.3)');
  mc.fillStyle = hazeGrad;
  mc.fillRect(0, 0, mw, mh);

  menuBgAnimId = requestAnimationFrame(animateMenuBg);
}

// ---- Resize ----
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight - 50;
  gliderX = W * 0.3;
  if (gameState === 'menu') {
    const mb = document.getElementById('menuBgCanvas');
    mb.width = mb.parentElement.offsetWidth;
    mb.height = mb.parentElement.offsetHeight;
  }
}

// ---- Init ----
function updateMenuBest() {
  const el = document.getElementById('menuBest');
  if (personalBest > 0) {
    el.textContent = 'Personal Best: ' + personalBest + 'm';
  } else {
    el.textContent = 'First flight awaits';
  }
}

function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  setupControls();
  resize();
  window.addEventListener('resize', resize);

  // Load saved data
  try {
    personalBest = parseInt(localStorage.getItem('bir-glider-best') || '0') || 0;
    zenMode = localStorage.getItem('bir-glider-zen') === '1';
    muted = localStorage.getItem('bir-glider-muted') === '1';
  } catch(e) {
    personalBest = 0; zenMode = false; muted = false;
  }

  if (zenMode) {
    document.getElementById('zenToggle').classList.add('active');
    document.getElementById('zenToggle').setAttribute('aria-checked', 'true');
  }
  if (muted) {
    const btn = document.getElementById('muteBtn');
    btn.querySelector('span').textContent = '🔇';
    btn.setAttribute('aria-label', 'Sound off');
    btn.setAttribute('aria-pressed', 'true');
  }

  updateMenuBest();
  setupAuth();

  // Start menu bg animation
  const mb = document.getElementById('menuBgCanvas');
  mb.width = window.innerWidth;
  mb.height = window.innerHeight - 50;
  animateMenuBg();

  // Start animation loop
  animFrameId = requestAnimationFrame(ts => {
    lastTime = ts;
    animFrameId = requestAnimationFrame(gameLoop);
  });
}

// Start when DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
