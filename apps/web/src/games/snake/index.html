<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake | Weekly Arcade - Classic Arcade Game</title>

  <!-- SEO -->
  <meta name="description" content="Play Snake free online. Classic arcade game - eat food, grow longer, don't hit the walls! No download required.">
  <meta name="keywords" content="snake game, arcade game, classic snake, browser game, free game, retro game">
  <link rel="canonical" href="https://weekly-arcade.web.app/games/snake/">

  <!-- Open Graph -->
  <meta property="og:title" content="Snake | Weekly Arcade">
  <meta property="og:description" content="Classic Snake game. Eat, grow, survive!">
  <meta property="og:type" content="website">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1a1a1a;
      --bg-card: #141414;
      --accent: #4ade80;
      --accent-dark: #22c55e;
      --danger: #ef4444;
      --warning: #fbbf24;
      --text-primary: #fff;
      --text-secondary: #888;
      --border: #333;
      --snake-head: #4ade80;
      --snake-body: #22c55e;
      --food: #ef4444;
      --grid-line: #1a1a1a;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-btn {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-btn:hover { color: var(--text-primary); }

    .title-container { text-align: center; }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .header-right {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .auth-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.25rem;
    }

    .icon-btn:hover { color: var(--text-primary); }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 0.75rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Game Container */
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      height: calc(100vh - 140px);
    }

    /* Canvas */
    #gameCanvas {
      box-sizing: content-box; /* Override to prevent border affecting canvas size */
      border: 2px solid var(--accent);
      border-radius: 8px;
      background: var(--bg-card);
      max-width: calc(100% - 4px); /* Account for border */
      touch-action: none;
    }

    /* Start Screen Overlay */
    .game-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .game-overlay.hidden { display: none; }

    .overlay-content {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }

    .overlay-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .overlay-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--accent);
    }

    .overlay-subtitle {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .overlay-score {
      font-size: 3rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .overlay-high-score {
      color: var(--warning);
      margin-bottom: 1.5rem;
    }

    .play-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 1rem 3rem;
      border-radius: 30px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .play-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(74, 222, 128, 0.4);
    }

    .controls-hint {
      margin-top: 1.5rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }


    /* Pause indicator */
    .pause-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      padding: 1rem 2rem;
      border-radius: 8px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--warning);
      z-index: 90;
      display: none;
    }

    .pause-indicator.show { display: block; }

    /* Auth Modal */
    .auth-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .auth-modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .auth-modal {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      text-align: center;
      position: relative;
    }

    .auth-modal h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .auth-modal p {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .auth-modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.875rem 1rem;
      background: white;
      color: #333;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .google-btn img {
      width: 20px;
      height: 20px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .game-container {
        height: calc(100vh - 140px);
        padding: 0.5rem;
      }

      .stats-bar { gap: 1rem; }
      .stat-value { font-size: 1.2rem; }

      .header { padding: 0.5rem 1rem; }
      .title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="/" class="back-btn">← Back</a>
    <div class="title-container">
      <h1 class="title">Snake</h1>
    </div>
    <div class="header-right">
      <button class="auth-btn" id="authBtn" onclick="showAuthModal()">Sign In</button>
      <button class="icon-btn" onclick="toggleSound()" id="soundBtn">🔊</button>
      <button class="icon-btn" onclick="togglePause()">⏸️</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="scoreDisplay">0</div>
      <div class="stat-label">Score</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="levelDisplay">1</div>
      <div class="stat-label">Level</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="highScoreDisplay">0</div>
      <div class="stat-label">Best</div>
    </div>
  </div>

  <div class="game-container">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div class="pause-indicator" id="pauseIndicator">PAUSED</div>

  <!-- Start Screen -->
  <div class="game-overlay" id="startOverlay">
    <div class="overlay-content">
      <div class="overlay-icon">🐍</div>
      <h2 class="overlay-title">Snake</h2>
      <p class="overlay-subtitle">Eat food, grow longer, don't crash!</p>
      <button class="play-btn" onclick="startGame()">Play</button>
      <p class="controls-hint">Swipe or use arrow keys to move</p>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div class="game-overlay hidden" id="gameOverOverlay">
    <div class="overlay-content">
      <div class="overlay-icon">💀</div>
      <h2 class="overlay-title">Game Over</h2>
      <div class="overlay-score" id="finalScore">0</div>
      <p class="overlay-high-score" id="newHighScore" style="display: none;">🎉 New High Score!</p>
      <p class="overlay-subtitle" id="gameOverSubtitle">You reached level 1</p>
      <button class="play-btn" onclick="startGame()">Play Again</button>
    </div>
  </div>

  <!-- Auth Modal -->
  <div class="auth-modal-overlay" id="authModal">
    <div class="auth-modal">
      <button class="auth-modal-close" onclick="hideAuthModal()">×</button>
      <h2>Save Your Score</h2>
      <p>Sign in to compete on the leaderboard!</p>
      <button class="google-btn" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continue with Google
      </button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

  <!-- API & Auth Scripts -->
  <script src="/js/api-client.js"></script>
  <script src="/js/auth.js"></script>

  <script>
    // ============ GAME CONSTANTS ============
    const GRID_SIZE = 20;
    const INITIAL_SPEED = 150; // ms per frame
    const SPEED_INCREASE = 10; // ms faster per level
    const MIN_SPEED = 50;
    const POINTS_PER_FOOD = 10;
    const FOOD_FOR_LEVEL_UP = 5;

    // ============ GAME STATE ============
    let canvas, ctx;
    let gridWidth, gridHeight;
    let snake = [];
    let food = { x: 0, y: 0 };
    let direction = 'right';
    let nextDirection = 'right';
    let score = 0;
    let level = 1;
    let highScore = 0;
    let foodEaten = 0;
    let gameLoop = null;
    let speed = INITIAL_SPEED;
    let isPaused = false;
    let isGameOver = false;
    let isPlaying = false;
    let soundEnabled = true;
    let currentUser = null;
    let gameStartTime = 0;

    // Touch handling
    let touchStartX = 0;
    let touchStartY = 0;

    // ============ INITIALIZATION ============
    function init() {
      canvas = document.getElementById('gameCanvas');
      ctx = canvas.getContext('2d');

      // Set canvas size
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // Load high score
      highScore = parseInt(localStorage.getItem('snake-high-score')) || 0;
      document.getElementById('highScoreDisplay').textContent = highScore;

      // Keyboard controls
      document.addEventListener('keydown', handleKeydown);

      // Touch controls
      canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
      canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
      document.addEventListener('touchstart', handleTouchStart, { passive: false });
      document.addEventListener('touchmove', handleTouchMove, { passive: false });

      // Auth state
      initAuth();
    }

    function resizeCanvas() {
      const container = document.querySelector('.game-container');
      const containerWidth = container.clientWidth || 320;
      const containerHeight = container.clientHeight || 320;
      const maxSize = Math.min(containerWidth - 24, containerHeight - 24, 500);

      // Ensure minimum playable size (at least 10x10 grid)
      const size = Math.max(Math.floor(maxSize / GRID_SIZE) * GRID_SIZE, GRID_SIZE * 10);

      canvas.width = size;
      canvas.height = size;

      gridWidth = Math.floor(canvas.width / GRID_SIZE);
      gridHeight = Math.floor(canvas.height / GRID_SIZE);

      // Validate grid dimensions
      if (gridWidth < 10) gridWidth = 10;
      if (gridHeight < 10) gridHeight = 10;

      if (isPlaying && !isGameOver) {
        // Check if snake is still within bounds after resize
        const outOfBounds = snake.some(seg =>
          seg.x < 0 || seg.x >= gridWidth || seg.y < 0 || seg.y >= gridHeight
        );
        if (outOfBounds) {
          gameOver();
          return;
        }
        draw();
      }
    }

    // ============ GAME LOGIC ============
    function startGame() {
      // Ensure canvas is properly sized before starting
      resizeCanvas();

      // Validate grid dimensions
      if (!gridWidth || !gridHeight || gridWidth < 10 || gridHeight < 10) {
        console.error('Invalid grid size:', gridWidth, gridHeight);
        return;
      }

      // Hide overlays
      document.getElementById('startOverlay').classList.add('hidden');
      document.getElementById('gameOverOverlay').classList.add('hidden');

      // Calculate safe starting position (center of grid)
      const startX = Math.floor(gridWidth / 2);
      const startY = Math.floor(gridHeight / 2);

      // Reset state
      snake = [
        { x: startX, y: startY },
        { x: startX - 1, y: startY },
        { x: startX - 2, y: startY }
      ];
      direction = 'right';
      nextDirection = 'right';
      score = 0;
      level = 1;
      foodEaten = 0;
      speed = INITIAL_SPEED;
      isPaused = false;
      isGameOver = false;
      isPlaying = true;
      gameStartTime = Date.now();

      updateDisplay();
      spawnFood();

      // Start game loop
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(gameStep, speed);
    }

    function gameStep() {
      if (isPaused || isGameOver) return;

      // Update direction
      direction = nextDirection;

      // Calculate new head position
      const head = { ...snake[0] };
      switch (direction) {
        case 'up': head.y--; break;
        case 'down': head.y++; break;
        case 'left': head.x--; break;
        case 'right': head.x++; break;
      }

      // Check wall collision
      if (head.x < 0 || head.x >= gridWidth || head.y < 0 || head.y >= gridHeight) {
        gameOver();
        return;
      }

      // Check self collision
      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        gameOver();
        return;
      }

      // Add new head
      snake.unshift(head);

      // Check food collision
      if (head.x === food.x && head.y === food.y) {
        eatFood();
      } else {
        // Remove tail if no food eaten
        snake.pop();
      }

      draw();
    }

    function eatFood() {
      score += POINTS_PER_FOOD * level;
      foodEaten++;
      playSound('eat');

      // Level up
      if (foodEaten >= FOOD_FOR_LEVEL_UP) {
        levelUp();
      }

      updateDisplay();
      spawnFood();
    }

    function levelUp() {
      level++;
      foodEaten = 0;
      speed = Math.max(MIN_SPEED, INITIAL_SPEED - (level - 1) * SPEED_INCREASE);

      // Restart game loop with new speed
      clearInterval(gameLoop);
      gameLoop = setInterval(gameStep, speed);

      playSound('levelup');
      updateDisplay();
    }

    function spawnFood() {
      let newFood;
      do {
        newFood = {
          x: Math.floor(Math.random() * gridWidth),
          y: Math.floor(Math.random() * gridHeight)
        };
      } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));

      food = newFood;
    }

    function gameOver() {
      isGameOver = true;
      isPlaying = false;
      clearInterval(gameLoop);
      playSound('gameover');

      // Check high score
      const isNewHighScore = score > highScore;
      if (isNewHighScore) {
        highScore = score;
        localStorage.setItem('snake-high-score', highScore);
        document.getElementById('highScoreDisplay').textContent = highScore;
      }

      // Show game over overlay
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverSubtitle').textContent = `You reached level ${level}`;
      document.getElementById('newHighScore').style.display = isNewHighScore ? 'block' : 'none';
      document.getElementById('gameOverOverlay').classList.remove('hidden');

      // Submit score to leaderboard
      submitScore();

      // Save cloud state
      saveCloudState();
    }

    // ============ DRAWING ============
    function draw() {
      // Clear canvas
      ctx.fillStyle = '#141414';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid (subtle)
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= canvas.width; x += GRID_SIZE) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += GRID_SIZE) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Draw food
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(
        food.x * GRID_SIZE + GRID_SIZE / 2,
        food.y * GRID_SIZE + GRID_SIZE / 2,
        GRID_SIZE / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();

      // Draw snake
      snake.forEach((segment, index) => {
        const isHead = index === 0;
        ctx.fillStyle = isHead ? '#4ade80' : '#22c55e';

        // Rounded rectangle for snake segments
        const x = segment.x * GRID_SIZE + 1;
        const y = segment.y * GRID_SIZE + 1;
        const size = GRID_SIZE - 2;
        const radius = isHead ? 6 : 4;

        ctx.beginPath();
        ctx.roundRect(x, y, size, size, radius);
        ctx.fill();

        // Draw eyes on head
        if (isHead) {
          ctx.fillStyle = '#000';
          const eyeSize = 3;
          const eyeOffset = 5;

          let eye1x, eye1y, eye2x, eye2y;
          switch (direction) {
            case 'right':
              eye1x = x + size - eyeOffset; eye1y = y + eyeOffset;
              eye2x = x + size - eyeOffset; eye2y = y + size - eyeOffset;
              break;
            case 'left':
              eye1x = x + eyeOffset; eye1y = y + eyeOffset;
              eye2x = x + eyeOffset; eye2y = y + size - eyeOffset;
              break;
            case 'up':
              eye1x = x + eyeOffset; eye1y = y + eyeOffset;
              eye2x = x + size - eyeOffset; eye2y = y + eyeOffset;
              break;
            case 'down':
              eye1x = x + eyeOffset; eye1y = y + size - eyeOffset;
              eye2x = x + size - eyeOffset; eye2y = y + size - eyeOffset;
              break;
          }

          ctx.beginPath();
          ctx.arc(eye1x, eye1y, eyeSize, 0, Math.PI * 2);
          ctx.arc(eye2x, eye2y, eyeSize, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function updateDisplay() {
      document.getElementById('scoreDisplay').textContent = score;
      document.getElementById('levelDisplay').textContent = level;
    }

    // ============ CONTROLS ============
    function handleKeydown(e) {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd'].includes(e.key)) {
        e.preventDefault();
      }

      // Start game on any arrow key if not playing
      if (!isPlaying && !isGameOver) {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
          startGame();
          return;
        }
      }

      // Pause toggle
      if (e.key === ' ' || e.key === 'Escape') {
        e.preventDefault();
        togglePause();
        return;
      }

      // Direction changes (prevent 180-degree turns)
      switch (e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
          if (direction !== 'down') nextDirection = 'up';
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          if (direction !== 'up') nextDirection = 'down';
          break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
          if (direction !== 'right') nextDirection = 'left';
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          if (direction !== 'left') nextDirection = 'right';
          break;
      }
    }

    function setDirection(dir) {
      if (!isPlaying) {
        startGame();
        return;
      }

      switch (dir) {
        case 'up': if (direction !== 'down') nextDirection = 'up'; break;
        case 'down': if (direction !== 'up') nextDirection = 'down'; break;
        case 'left': if (direction !== 'right') nextDirection = 'left'; break;
        case 'right': if (direction !== 'left') nextDirection = 'right'; break;
      }
    }

    function handleTouchStart(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }

    function handleTouchMove(e) {
      if (!touchStartX || !touchStartY) return;

      const touchEndX = e.touches[0].clientX;
      const touchEndY = e.touches[0].clientY;

      const dx = touchEndX - touchStartX;
      const dy = touchEndY - touchStartY;

      const minSwipe = 30;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (Math.abs(dx) > minSwipe) {
          if (dx > 0) setDirection('right');
          else setDirection('left');
          touchStartX = touchEndX;
          touchStartY = touchEndY;
        }
      } else {
        if (Math.abs(dy) > minSwipe) {
          if (dy > 0) setDirection('down');
          else setDirection('up');
          touchStartX = touchEndX;
          touchStartY = touchEndY;
        }
      }

      e.preventDefault();
    }

    function togglePause() {
      if (!isPlaying || isGameOver) return;
      isPaused = !isPaused;
      document.getElementById('pauseIndicator').classList.toggle('show', isPaused);
    }

    // ============ SOUND ============
    function playSound(type) {
      if (!soundEnabled) return;
      // Simple beep sounds using Web Audio API
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        switch (type) {
          case 'eat':
            oscillator.frequency.value = 600;
            gainNode.gain.value = 0.1;
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
            break;
          case 'levelup':
            oscillator.frequency.value = 800;
            gainNode.gain.value = 0.1;
            oscillator.start();
            setTimeout(() => oscillator.frequency.value = 1000, 100);
            oscillator.stop(audioCtx.currentTime + 0.2);
            break;
          case 'gameover':
            oscillator.frequency.value = 200;
            gainNode.gain.value = 0.1;
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
            break;
        }
      } catch (e) {
        // Audio not supported
      }
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
    }

    // ============ AUTH & CLOUD ============
    function initAuth() {
      const checkAuth = setInterval(() => {
        if (window.authManager?.isInitialized) {
          clearInterval(checkAuth);
          window.authManager.onAuthStateChanged(user => {
            currentUser = user;
            updateAuthUI();
            if (user) loadCloudState();
          });
        }
      }, 100);
    }

    function updateAuthUI() {
      const authBtn = document.getElementById('authBtn');
      if (currentUser) {
        authBtn.textContent = currentUser.displayName?.split(' ')[0] || 'Player';
        authBtn.onclick = null;
      } else {
        authBtn.textContent = 'Sign In';
        authBtn.onclick = showAuthModal;
      }
    }

    function showAuthModal() {
      document.getElementById('authModal').classList.add('show');
    }

    function hideAuthModal() {
      document.getElementById('authModal').classList.remove('show');
    }

    async function signInWithGoogle() {
      try {
        await window.authManager.signInWithGoogle();
        hideAuthModal();
      } catch (error) {
        console.error('Sign in failed:', error);
      }
    }

    document.getElementById('authModal').addEventListener('click', (e) => {
      if (e.target.id === 'authModal') hideAuthModal();
    });

    async function submitScore() {
      if (!currentUser || !window.apiClient) return;

      try {
        const timeMs = Date.now() - gameStartTime;
        await window.apiClient.submitScore('snake', {
          score: score,
          level: level,
          timeMs: timeMs,
          metadata: {
            foodEaten: foodEaten + (level - 1) * FOOD_FOR_LEVEL_UP,
            finalLength: snake.length
          }
        });
        console.log('Score submitted');
      } catch (error) {
        console.error('Failed to submit score:', error);
      }
    }

    async function loadCloudState() {
      if (!currentUser || !window.apiClient) return;

      try {
        const state = await window.apiClient.getGameState('snake');
        if (state && state.additionalData?.highScore) {
          const cloudHighScore = state.additionalData.highScore;
          if (cloudHighScore > highScore) {
            highScore = cloudHighScore;
            localStorage.setItem('snake-high-score', highScore);
            document.getElementById('highScoreDisplay').textContent = highScore;
          }
        }
      } catch (error) {
        console.log('Could not load cloud state');
      }
    }

    async function saveCloudState() {
      if (!currentUser || !window.apiClient) return;

      try {
        await window.apiClient.saveGameState('snake', {
          currentLevel: level,
          currentStreak: 0,
          bestStreak: 0,
          gamesPlayed: 1,
          gamesWon: 0,
          lastPlayedDate: new Date().toISOString(),
          additionalData: {
            highScore: highScore,
            lastScore: score
          }
        });
      } catch (error) {
        console.log('Could not save cloud state');
      }
    }

    // ============ START ============
    window.addEventListener('load', init);
  </script>
</body>
</html>
