<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="memoryBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#memoryBg)"/>

  <!-- Card grid -->
  <!-- Row 1 -->
  <rect x="50" y="30" width="55" height="70" rx="8" fill="url(#cardBack)"/>
  <text x="77" y="75" font-size="12" fill="white" text-anchor="middle">?</text>

  <rect x="115" y="30" width="55" height="70" rx="8" fill="#fef3c7"/>
  <text x="142" y="78" font-size="35" text-anchor="middle">⭐</text>

  <rect x="180" y="30" width="55" height="70" rx="8" fill="#fef3c7"/>
  <text x="207" y="78" font-size="35" text-anchor="middle">⭐</text>

  <rect x="245" y="30" width="55" height="70" rx="8" fill="url(#cardBack)"/>
  <text x="272" y="75" font-size="12" fill="white" text-anchor="middle">?</text>

  <rect x="310" y="30" width="55" height="70" rx="8" fill="url(#cardBack)"/>
  <text x="337" y="75" font-size="12" fill="white" text-anchor="middle">?</text>

  <!-- Row 2 -->
  <rect x="50" y="110" width="55" height="70" rx="8" fill="#dcfce7"/>
  <text x="77" y="158" font-size="35" text-anchor="middle">🎮</text>

  <rect x="115" y="110" width="55" height="70" rx="8" fill="url(#cardBack)"/>
  <text x="142" y="155" font-size="12" fill="white" text-anchor="middle">?</text>

  <rect x="180" y="110" width="55" height="70" rx="8" fill="#fce7f3"/>
  <text x="207" y="158" font-size="35" text-anchor="middle">❤️</text>

  <rect x="245" y="110" width="55" height="70" rx="8" fill="#dcfce7"/>
  <text x="272" y="158" font-size="35" text-anchor="middle">🎮</text>

  <rect x="310" y="110" width="55" height="70" rx="8" fill="url(#cardBack)"/>
  <text x="337" y="155" font-size="12" fill="white" text-anchor="middle">?</text>

  <!-- Match effect -->
  <circle cx="142" cy="65" r="40" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.6"/>
  <circle cx="207" cy="65" r="40" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.6"/>
</svg>