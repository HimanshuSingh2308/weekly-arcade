<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wordleBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#wordleBg)"/>

  <!-- Letter tiles row 1 -->
  <rect x="75" y="50" width="50" height="50" rx="6" fill="#538d4e"/>
  <text x="100" y="85" font-family="Arial Black" font-size="28" fill="white" text-anchor="middle">W</text>

  <rect x="130" y="50" width="50" height="50" rx="6" fill="#538d4e"/>
  <text x="155" y="85" font-family="Arial Black" font-size="28" fill="white" text-anchor="middle">O</text>

  <rect x="185" y="50" width="50" height="50" rx="6" fill="#b59f3b"/>
  <text x="210" y="85" font-family="Arial Black" font-size="28" fill="white" text-anchor="middle">R</text>

  <rect x="240" y="50" width="50" height="50" rx="6" fill="#3a3a3c"/>
  <text x="265" y="85" font-family="Arial Black" font-size="28" fill="white" text-anchor="middle">D</text>

  <rect x="295" y="50" width="50" height="50" rx="6" fill="#538d4e"/>
  <text x="320" y="85" font-family="Arial Black" font-size="28" fill="white" text-anchor="middle">S</text>

  <!-- Letter tiles row 2 -->
  <rect x="75" y="105" width="50" height="50" rx="6" fill="#3a3a3c"/>
  <text x="100" y="140" font-family="Arial Black" font-size="28" fill="white" text-anchor="middle">G</text>

  <rect x="130" y="105" width="50" height="50" rx="6" fill="#538d4e"/>
  <text x="155" y="140" font-family="Arial Black" font-size="28" fill="white" text-anchor="middle">A</text>

  <rect x="185" y="105" width="50" height="50" rx="6" fill="#538d4e"/>
  <text x="210" y="140" font-family="Arial Black" font-size="28" fill="white" text-anchor="middle">M</text>

  <rect x="240" y="105" width="50" height="50" rx="6" fill="#538d4e"/>
  <text x="265" y="140" font-family="Arial Black" font-size="28" fill="white" text-anchor="middle">E</text>

  <rect x="295" y="105" width="50" height="50" rx="6" fill="#538d4e"/>
  <text x="320" y="140" font-family="Arial Black" font-size="28" fill="white" text-anchor="middle">S</text>

  <!-- Empty row 3 -->
  <rect x="75" y="160" width="50" height="50" rx="6" fill="#3a3a3c" opacity="0.5"/>
  <rect x="130" y="160" width="50" height="50" rx="6" fill="#3a3a3c" opacity="0.5"/>
  <rect x="185" y="160" width="50" height="50" rx="6" fill="#3a3a3c" opacity="0.5"/>
  <rect x="240" y="160" width="50" height="50" rx="6" fill="#3a3a3c" opacity="0.5"/>
  <rect x="295" y="160" width="50" height="50" rx="6" fill="#3a3a3c" opacity="0.5"/>
</svg>