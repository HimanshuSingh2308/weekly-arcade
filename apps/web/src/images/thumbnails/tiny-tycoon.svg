<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#F5E6D3"/>
    </linearGradient>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#B8895A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Wall -->
  <rect x="0" y="0" width="400" height="140" fill="#F0E0CC" opacity="0.6"/>

  <!-- Menu board -->
  <rect x="140" y="15" width="120" height="70" rx="6" fill="#5C3D2E"/>
  <text x="200" y="42" text-anchor="middle" font-size="11" fill="#FFF8F0" font-weight="700">MENU</text>
  <text x="170" y="58" font-size="10" fill="#F5C542">&#x1F375; 5</text>
  <text x="220" y="58" font-size="10" fill="#F5C542">&#x1F9CB; 10</text>
  <text x="170" y="74" font-size="10" fill="#F5C542">&#x2615; 8</text>
  <text x="220" y="74" font-size="10" fill="#F5C542">&#x1F964; 15</text>

  <!-- Shelves with cups -->
  <rect x="30" y="40" width="80" height="6" rx="2" fill="#D4A574"/>
  <rect x="290" y="40" width="80" height="6" rx="2" fill="#D4A574"/>
  <text x="50" y="38" font-size="16">&#x1F9CB;</text>
  <text x="75" y="38" font-size="16">&#x1F9CB;</text>
  <text x="310" y="38" font-size="16">&#x2615;</text>
  <text x="335" y="38" font-size="16">&#x1F375;</text>

  <!-- Floor -->
  <rect x="0" y="140" width="400" height="160" fill="#C4A882" opacity="0.3"/>

  <!-- Counter -->
  <rect x="20" y="150" width="360" height="12" rx="4" fill="url(#counter)"/>
  <rect x="20" y="160" width="360" height="4" fill="#B8895A"/>

  <!-- Barista area (serving) -->
  <rect x="60" y="105" width="20" height="35" rx="6" fill="#7DB87D"/>
  <circle cx="70" cy="97" r="10" fill="#FFDAB9"/>
  <text x="70" y="101" text-anchor="middle" font-size="8" fill="#5C3D2E">:)</text>

  <!-- Customer 1 (being served, at counter) -->
  <rect x="100" y="175" width="24" height="32" rx="6" fill="#8B9DC3"/>
  <circle cx="112" cy="167" r="10" fill="#FFDAB9"/>
  <text x="112" y="160" text-anchor="middle" font-size="14">&#x1F9CB;</text>
  <!-- Patience bar (green) -->
  <rect x="98" y="155" width="28" height="3" rx="1" fill="#333" opacity="0.2"/>
  <rect x="98" y="155" width="24" height="3" rx="1" fill="#7DB87D"/>

  <!-- Customer 2 (waiting) -->
  <rect x="155" y="175" width="24" height="32" rx="6" fill="#FFB347"/>
  <circle cx="167" cy="167" r="10" fill="#FFDAB9"/>
  <text x="167" y="160" text-anchor="middle" font-size="14">&#x1F375;</text>
  <rect x="153" y="155" width="28" height="3" rx="1" fill="#333" opacity="0.2"/>
  <rect x="153" y="155" width="20" height="3" rx="1" fill="#F5C542"/>

  <!-- Customer 3 (waiting) -->
  <rect x="210" y="175" width="24" height="32" rx="6" fill="#708090"/>
  <circle cx="222" cy="167" r="10" fill="#FFDAB9"/>
  <text x="222" y="160" text-anchor="middle" font-size="14">&#x2615;</text>
  <rect x="208" y="155" width="28" height="3" rx="1" fill="#333" opacity="0.2"/>
  <rect x="208" y="155" width="10" height="3" rx="1" fill="#E8736A"/>

  <!-- Customer 4 (entering from right) -->
  <rect x="280" y="175" width="24" height="32" rx="6" fill="#DDA0DD"/>
  <circle cx="292" cy="167" r="10" fill="#FFDAB9"/>
  <text x="292" y="160" text-anchor="middle" font-size="14">&#x1F964;</text>
  <rect x="278" y="155" width="28" height="3" rx="1" fill="#333" opacity="0.2"/>
  <rect x="278" y="155" width="28" height="3" rx="1" fill="#7DB87D"/>

  <!-- Floating coins from served customer -->
  <circle cx="80" cy="130" r="6" fill="#F5C542" opacity="0.8"/>
  <text x="80" y="133" text-anchor="middle" font-size="7" fill="#5C3D2E" font-weight="700">$</text>
  <circle cx="95" cy="120" r="6" fill="#F5C542" opacity="0.6"/>
  <text x="95" y="123" text-anchor="middle" font-size="7" fill="#5C3D2E" font-weight="700">$</text>
  <circle cx="65" cy="122" r="6" fill="#F5C542" opacity="0.7"/>
  <text x="65" y="125" text-anchor="middle" font-size="7" fill="#5C3D2E" font-weight="700">$</text>

  <!-- Combo text -->
  <text x="340" y="130" text-anchor="middle" font-size="16" font-weight="900" fill="#E8736A" opacity="0.9">x2.3!</text>

  <!-- HUD area -->
  <rect x="0" y="260" width="400" height="40" fill="rgba(92,61,46,0.85)"/>
  <text x="60" y="284" text-anchor="middle" font-size="13" fill="#F5C542" font-weight="700">342</text>
  <text x="200" y="284" text-anchor="middle" font-size="14" fill="#FFF8F0" font-weight="700" font-family="monospace">0:47</text>
  <text x="340" y="284" text-anchor="middle" font-size="12" fill="#F2B5B5" font-weight="700">Day 5</text>

  <!-- Title -->
  <text x="200" y="290" text-anchor="middle" font-size="1" fill="transparent">Tiny Tycoon</text>
</svg>
