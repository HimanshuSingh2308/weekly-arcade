<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="towerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#1A252F"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#E85A5A"/>
    </linearGradient>
    <linearGradient id="movingBlock" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8A8A"/>
      <stop offset="100%" style="stop-color:#FF6B6B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#towerBg)"/>

  <!-- Ground -->
  <rect x="0" y="220" width="400" height="30" fill="#1A252F"/>

  <!-- Tower base -->
  <rect x="100" y="200" width="200" height="20" rx="2" fill="url(#blockGrad)"/>
  <rect x="100" y="200" width="200" height="3" fill="rgba(255,255,255,0.2)"/>

  <!-- Stacked blocks (getting narrower) -->
  <rect x="110" y="180" width="180" height="20" rx="2" fill="url(#blockGrad)"/>
  <rect x="110" y="180" width="180" height="3" fill="rgba(255,255,255,0.2)"/>

  <rect x="115" y="160" width="170" height="20" rx="2" fill="url(#blockGrad)"/>
  <rect x="115" y="160" width="170" height="3" fill="rgba(255,255,255,0.2)"/>

  <rect x="125" y="140" width="150" height="20" rx="2" fill="url(#blockGrad)"/>
  <rect x="125" y="140" width="150" height="3" fill="rgba(255,255,255,0.2)"/>

  <rect x="140" y="120" width="120" height="20" rx="2" fill="url(#blockGrad)"/>
  <rect x="140" y="120" width="120" height="3" fill="rgba(255,255,255,0.2)"/>

  <rect x="155" y="100" width="90" height="20" rx="2" fill="url(#blockGrad)"/>
  <rect x="155" y="100" width="90" height="3" fill="rgba(255,255,255,0.2)"/>

  <!-- Moving block (above tower) -->
  <rect x="220" y="70" width="90" height="20" rx="2" fill="url(#movingBlock)"/>
  <rect x="220" y="70" width="90" height="3" fill="rgba(255,255,255,0.3)"/>

  <!-- Motion indicator arrows -->
  <path d="M320 80 L340 80 L335 75 M340 80 L335 85" stroke="#4ECDC4" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Perfect indicator particles -->
  <circle cx="155" cy="95" r="3" fill="#FFE66D" opacity="0.8"/>
  <circle cx="175" cy="90" r="2" fill="#FFE66D" opacity="0.6"/>
  <circle cx="235" cy="92" r="3" fill="#FFE66D" opacity="0.8"/>
  <circle cx="250" cy="88" r="2" fill="#FFE66D" opacity="0.6"/>

  <!-- Combo text -->
  <text x="330" y="130" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFE66D">5x</text>

  <!-- Glow effect on tower -->
  <rect x="155" y="100" width="90" height="20" rx="2" fill="none" stroke="#FFE66D" stroke-width="2" opacity="0.5"/>
</svg>
