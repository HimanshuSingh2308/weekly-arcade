<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kitchenBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12"/>
      <stop offset="100%" style="stop-color:#431407"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#kitchenBg)"/>

  <!-- Counter -->
  <rect x="0" y="160" width="400" height="90" fill="#78716c"/>
  <rect x="0" y="160" width="400" height="8" fill="#a8a29e"/>

  <!-- Stove -->
  <rect x="140" y="100" width="120" height="60" rx="8" fill="#1c1917"/>
  <circle cx="170" cy="130" r="18" fill="#292524" stroke="#ef4444" stroke-width="3"/>
  <circle cx="230" cy="130" r="18" fill="#292524" stroke="#f97316" stroke-width="3"/>

  <!-- Pan -->
  <ellipse cx="170" cy="100" rx="30" ry="10" fill="#27272a"/>
  <rect x="195" y="95" width="40" height="8" rx="3" fill="#27272a"/>

  <!-- Burger -->
  <ellipse cx="80" cy="190" rx="35" ry="12" fill="#ca8a04"/>
  <ellipse cx="80" cy="185" rx="30" ry="8" fill="#22c55e"/>
  <ellipse cx="80" cy="180" rx="32" ry="9" fill="#ef4444"/>
  <ellipse cx="80" cy="175" rx="35" ry="10" fill="#92400e"/>
  <ellipse cx="80" cy="168" rx="35" ry="12" fill="#ca8a04"/>

  <!-- Pizza -->
  <circle cx="320" cy="185" r="40" fill="#fbbf24"/>
  <circle cx="305" cy="175" r="8" fill="#dc2626"/>
  <circle cx="330" cy="190" r="8" fill="#dc2626"/>
  <circle cx="315" cy="200" r="6" fill="#dc2626"/>
  <circle cx="335" cy="175" r="5" fill="#15803d"/>
  <circle cx="310" cy="188" r="4" fill="#15803d"/>

  <!-- Fire effect -->
  <text x="170" y="80" font-size="30">🔥</text>
  <text x="220" y="85" font-size="25">🔥</text>

  <!-- Chef hat -->
  <text x="290" y="60" font-size="50">👨‍🍳</text>
</svg>