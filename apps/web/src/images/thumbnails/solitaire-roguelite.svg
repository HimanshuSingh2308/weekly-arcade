<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="feltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5c2a"/>
      <stop offset="100%" style="stop-color:#145222"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Felt background -->
  <rect width="400" height="300" fill="url(#feltGrad)"/>

  <!-- Subtle felt texture dots -->
  <g fill="#1b6330" opacity="0.3">
    <circle cx="30" cy="25" r="1.5"/>
    <circle cx="90" cy="55" r="1"/>
    <circle cx="160" cy="20" r="1.2"/>
    <circle cx="250" cy="45" r="1"/>
    <circle cx="340" cy="30" r="1.5"/>
    <circle cx="50" cy="120" r="1"/>
    <circle cx="370" cy="100" r="1.2"/>
    <circle cx="120" cy="180" r="1"/>
    <circle cx="300" cy="200" r="1.5"/>
    <circle cx="200" cy="240" r="1"/>
  </g>

  <!-- Card stack (face-down, back row) -->
  <g filter="url(#cardShadow)">
    <rect x="58" y="48" width="64" height="90" rx="6" fill="#1a3a4a" stroke="#2a5a6a" stroke-width="1.5"/>
    <rect x="60" y="52" width="58" height="82" rx="4" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="64" y="44" width="64" height="90" rx="6" fill="#1a3a4a" stroke="#2a5a6a" stroke-width="1.5"/>
    <rect x="66" y="48" width="58" height="82" rx="4" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  </g>

  <!-- Main card: Ace of Spades -->
  <g filter="url(#cardShadow)">
    <rect x="70" y="40" width="64" height="90" rx="6" fill="url(#cardGrad)" stroke="#ddd" stroke-width="1"/>
    <text x="80" y="60" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1a1a2e">A</text>
    <text x="80" y="73" font-family="Georgia, serif" font-size="12" fill="#1a1a2e">&#9824;</text>
    <text x="102" y="92" font-family="Georgia, serif" font-size="32" fill="#1a1a2e" text-anchor="middle" opacity="0.2">&#9824;</text>
  </g>

  <!-- Second card: Queen of Hearts (overlapping) -->
  <g filter="url(#cardShadow)">
    <rect x="115" y="55" width="64" height="90" rx="6" fill="url(#cardGrad)" stroke="#ddd" stroke-width="1"/>
    <text x="125" y="75" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#d32f2f">Q</text>
    <text x="125" y="88" font-family="Georgia, serif" font-size="12" fill="#d32f2f">&#9829;</text>
    <text x="147" y="107" font-family="Georgia, serif" font-size="32" fill="#d32f2f" text-anchor="middle" opacity="0.2">&#9829;</text>
  </g>

  <!-- Joker card (the star of the show) — tilted with gold border -->
  <g transform="translate(240, 95) rotate(8)" filter="url(#glow)">
    <!-- Gold glow border -->
    <rect x="-38" y="-52" width="76" height="104" rx="8" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.6"/>
    <!-- Card body -->
    <rect x="-35" y="-49" width="70" height="98" rx="6" fill="#1a1a2e" stroke="#ffd700" stroke-width="2"/>
    <!-- Joker icon -->
    <text x="0" y="-12" font-family="system-ui, sans-serif" font-size="32" text-anchor="middle">&#127183;</text>
    <!-- Joker label -->
    <text x="0" y="16" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffd700" text-anchor="middle">JOKER</text>
    <!-- Stars -->
    <text x="-18" y="34" font-size="8" fill="#ffd700" opacity="0.7">&#9733;</text>
    <text x="0" y="34" font-size="8" fill="#ffd700" opacity="0.7">&#9733;</text>
    <text x="18" y="34" font-size="8" fill="#ffd700" opacity="0.7">&#9733;</text>
  </g>

  <!-- Foundation pile indicators (top right) -->
  <g opacity="0.4">
    <rect x="310" y="40" width="30" height="42" rx="4" fill="none" stroke="rgba(255,215,0,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="325" y="68" font-family="Georgia, serif" font-size="16" fill="rgba(255,215,0,0.5)" text-anchor="middle">&#9824;</text>
    <rect x="348" y="40" width="30" height="42" rx="4" fill="none" stroke="rgba(255,215,0,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="363" y="68" font-family="Georgia, serif" font-size="16" fill="rgba(255,215,0,0.5)" text-anchor="middle">&#9829;</text>
  </g>

  <!-- Score pop effect -->
  <g filter="url(#glow)">
    <text x="175" y="35" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#ffd700" text-anchor="middle" opacity="0.8">+100</text>
  </g>

  <!-- Sparkle particles around Joker -->
  <g fill="#ffd700" opacity="0.6">
    <circle cx="215" cy="55" r="2.5"/>
    <circle cx="285" cy="50" r="2"/>
    <circle cx="270" cy="145" r="2"/>
    <circle cx="210" cy="135" r="1.5"/>
  </g>

  <!-- Multiplier badge -->
  <g transform="translate(330, 120)">
    <rect x="-28" y="-12" width="56" height="24" rx="12" fill="#e94560" opacity="0.9"/>
    <text x="0" y="5" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#fff" text-anchor="middle">x1.5</text>
  </g>

  <!-- Title -->
  <text x="200" y="220" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="url(#goldGrad)" text-anchor="middle" filter="url(#glow)">SOLITAIRE</text>
  <text x="200" y="248" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#fff" text-anchor="middle" opacity="0.7">ROGUELITE</text>
</svg>
