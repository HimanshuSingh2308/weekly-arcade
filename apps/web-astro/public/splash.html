<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Weekly Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .splash-logo { font-size: 48px; margin-bottom: 16px; }
  .splash-title {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .splash-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 40px;
  }

  /* Assembling animation — balls dropping into a tube */
  .splash-anim {
    position: relative;
    width: 60px;
    height: 200px;
    margin-bottom: 24px;
  }

  .splash-tube {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 60px;
    height: 180px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top: none;
    border-radius: 0 0 28px 28px;
    background: rgba(255,255,255,0.04);
  }

  .splash-ball {
    position: absolute;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    left: 10px;
    opacity: 0;
    animation: dropBall 0.5s ease-in forwards;
  }

  .splash-ball:nth-child(2) { bottom: 10px; background: radial-gradient(circle at 35% 35%, #a78bfa, #7c3aed); animation-delay: 0.3s; }
  .splash-ball:nth-child(3) { bottom: 52px; background: radial-gradient(circle at 35% 35%, #60a5fa, #2563eb); animation-delay: 0.7s; }
  .splash-ball:nth-child(4) { bottom: 94px; background: radial-gradient(circle at 35% 35%, #34d399, #059669); animation-delay: 1.1s; }
  .splash-ball:nth-child(5) { bottom: 136px; background: radial-gradient(circle at 35% 35%, #fbbf24, #d97706); animation-delay: 1.5s; }

  @keyframes dropBall {
    0% { opacity: 1; transform: translateY(-120px); }
    60% { transform: translateY(8px); }
    80% { transform: translateY(-4px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Progress bar */
  .splash-progress {
    width: 200px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .splash-progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #8B5CF6, #F7B731);
    border-radius: 2px;
    animation: fillBar 2.5s ease-out forwards;
  }

  @keyframes fillBar {
    0% { width: 0%; }
    30% { width: 40%; }
    60% { width: 70%; }
    90% { width: 90%; }
    100% { width: 100%; }
  }

  .splash-status {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px;
    animation: statusText 2.5s steps(1) forwards;
  }

  @keyframes statusText {
    0% { content: "Loading games..."; }
    33% { content: "Preparing puzzles..."; }
    66% { content: "Almost ready..."; }
  }

  /* Fade out when done */
  .splash-fade {
    animation: fadeOut 0.4s ease-out 2.8s forwards;
  }

  @keyframes fadeOut {
    to { opacity: 0; pointer-events: none; }
  }
</style>
</head>
<body class="splash-fade">
  <div class="splash-anim">
    <div class="splash-tube"></div>
    <div class="splash-ball"></div>
    <div class="splash-ball"></div>
    <div class="splash-ball"></div>
    <div class="splash-ball"></div>
  </div>

  <div class="splash-logo">🎮</div>
  <div class="splash-title">Weekly Arcade</div>
  <div class="splash-tagline">New games every week</div>

  <div class="splash-progress">
    <div class="splash-progress-bar"></div>
  </div>
  <div class="splash-status" id="splashStatus">Loading games...</div>

  <script>
    var msgs = ['Loading games...', 'Preparing puzzles...', 'Setting up leaderboards...', 'Almost ready...'];
    var el = document.getElementById('splashStatus');
    var i = 0;
    var timer = setInterval(function() {
      i++;
      if (i < msgs.length) {
        el.textContent = msgs[i];
      } else {
        clearInterval(timer);
      }
    }, 700);

    // After animation completes, redirect to main app
    setTimeout(function() {
      window.location.href = '/';
    }, 3000);
  </script>
</body>
</html>
