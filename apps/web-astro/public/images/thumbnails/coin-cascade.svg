<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
    <radialGradient id="gold" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <radialGradient id="silver" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#909090"/>
    </radialGradient>
    <radialGradient id="bronze" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#E8A050"/>
      <stop offset="100%" stop-color="#8B5A2B"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Side walls -->
  <rect x="0" y="0" width="30" height="300" fill="#1a1a3a"/>
  <rect x="370" y="0" width="30" height="300" fill="#1a1a3a"/>
  <line x1="30" y1="0" x2="30" y2="300" stroke="#2a2a5a" stroke-width="2"/>
  <line x1="370" y1="0" x2="370" y2="300" stroke="#2a2a5a" stroke-width="2"/>

  <!-- Pusher bar -->
  <rect x="80" y="120" width="200" height="10" rx="3" fill="#6a6aaa" stroke="#8a8acc" stroke-width="1"/>

  <!-- Score zone line -->
  <line x1="30" y1="270" x2="370" y2="270" stroke="#39ff14" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Coins on platform -->
  <circle cx="100" cy="160" r="14" fill="url(#bronze)"/>
  <circle cx="135" cy="155" r="14" fill="url(#bronze)"/>
  <circle cx="170" cy="162" r="14" fill="url(#silver)"/>
  <text x="170" y="167" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">5</text>
  <circle cx="200" cy="150" r="16" fill="url(#gold)"/>
  <text x="200" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">25</text>
  <circle cx="235" cy="158" r="14" fill="url(#bronze)"/>
  <circle cx="265" cy="155" r="14" fill="url(#bronze)"/>
  <circle cx="300" cy="160" r="14" fill="url(#silver)"/>
  <text x="300" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">5</text>

  <!-- Lower coins -->
  <circle cx="120" cy="200" r="14" fill="url(#bronze)"/>
  <circle cx="155" cy="195" r="14" fill="url(#bronze)"/>
  <circle cx="190" cy="205" r="14" fill="url(#gold)"/>
  <text x="190" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">25</text>
  <circle cx="230" cy="198" r="14" fill="url(#bronze)"/>
  <circle cx="265" cy="202" r="14" fill="url(#silver)"/>
  <text x="265" y="207" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">5</text>
  <circle cx="300" cy="195" r="14" fill="url(#bronze)"/>

  <!-- Prize star -->
  <text x="160" y="240" text-anchor="middle" font-size="24">&#x2B50;</text>

  <!-- Falling coin from drop -->
  <circle cx="200" cy="60" r="14" fill="url(#gold)" opacity="0.8"/>
  <line x1="200" y1="30" x2="200" y2="110" stroke="#FFD700" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Combo text -->
  <text x="320" y="90" text-anchor="middle" font-size="18" font-weight="900" fill="#f472b6" opacity="0.9">Triple!</text>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-size="16" font-weight="800" fill="#FFD700">COIN CASCADE</text>
</svg>
