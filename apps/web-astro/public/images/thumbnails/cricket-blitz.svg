<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0520"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#a08050"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="200" height="200" fill="url(#sky)" rx="16"/>
  <!-- Ground -->
  <ellipse cx="100" cy="160" rx="90" ry="35" fill="#2d6a1e"/>
  <!-- Pitch -->
  <rect x="85" y="80" width="30" height="75" fill="url(#pitch)" rx="2"/>
  <!-- Stumps -->
  <line x1="96" y1="82" x2="96" y2="72" stroke="#D4A87C" stroke-width="1.5"/>
  <line x1="100" y1="82" x2="100" y2="72" stroke="#D4A87C" stroke-width="1.5"/>
  <line x1="104" y1="82" x2="104" y2="72" stroke="#D4A87C" stroke-width="1.5"/>
  <!-- Batsman (simplified) -->
  <circle cx="100" cy="130" r="6" fill="#004BA0"/>
  <rect x="96" y="136" width="8" height="14" fill="#004BA0" rx="2"/>
  <line x1="107" y1="134" x2="114" y2="120" stroke="#D4A87C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ball -->
  <circle cx="100" cy="100" r="4" fill="#cc0000"/>
  <line x1="97" y1="100" x2="103" y2="100" stroke="white" stroke-width="0.8"/>
  <!-- Stars -->
  <circle cx="30" cy="20" r="1" fill="white" opacity="0.7"/>
  <circle cx="60" cy="15" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="150" cy="25" r="1" fill="white" opacity="0.6"/>
  <circle cx="170" cy="10" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="120" cy="18" r="1" fill="white" opacity="0.5"/>
  <!-- Title -->
  <text x="100" y="50" text-anchor="middle" fill="#FFD700" font-family="system-ui" font-weight="900" font-size="18">CRICKET</text>
  <text x="100" y="66" text-anchor="middle" fill="#FFD700" font-family="system-ui" font-weight="900" font-size="14">BLITZ</text>
  <!-- Emoji -->
  <text x="100" y="195" text-anchor="middle" font-size="20">🏏</text>
</svg>
