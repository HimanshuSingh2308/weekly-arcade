<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="snakeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#snakeBg)"/>

  <!-- Grid pattern -->
  <g opacity="0.15">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#4ade80" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#4ade80" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#4ade80" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#4ade80" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="250" stroke="#4ade80" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="250" stroke="#4ade80" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="250" stroke="#4ade80" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="250" stroke="#4ade80" stroke-width="1"/>
    <line x1="250" y1="0" x2="250" y2="250" stroke="#4ade80" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="250" stroke="#4ade80" stroke-width="1"/>
    <line x1="350" y1="0" x2="350" y2="250" stroke="#4ade80" stroke-width="1"/>
  </g>

  <!-- Snake body -->
  <rect x="100" y="100" width="40" height="40" rx="8" fill="#22c55e"/>
  <rect x="140" y="100" width="40" height="40" rx="8" fill="#22c55e"/>
  <rect x="180" y="100" width="40" height="40" rx="8" fill="#22c55e"/>
  <rect x="220" y="100" width="40" height="40" rx="8" fill="#22c55e"/>
  <rect x="220" y="140" width="40" height="40" rx="8" fill="#22c55e"/>
  <rect x="220" y="180" width="40" height="40" rx="8" fill="#16a34a"/>

  <!-- Snake head -->
  <rect x="260" y="100" width="45" height="40" rx="10" fill="#4ade80"/>
  <circle cx="290" cy="112" r="5" fill="#0a1628"/>
  <circle cx="290" cy="128" r="5" fill="#0a1628"/>

  <!-- Apple -->
  <circle cx="330" cy="120" r="18" fill="#ef4444"/>
  <rect x="328" y="95" width="4" height="10" fill="#854d0e"/>
  <ellipse cx="338" cy="100" rx="6" ry="4" fill="#22c55e"/>
</svg>