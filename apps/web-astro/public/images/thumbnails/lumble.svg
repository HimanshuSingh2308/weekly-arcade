<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lumbleSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <linearGradient id="platform" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="250" fill="url(#lumbleSky)"/>

  <!-- Clouds -->
  <ellipse cx="80" cy="50" rx="40" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="110" cy="45" rx="30" ry="18" fill="white" opacity="0.8"/>
  <ellipse cx="320" cy="70" rx="35" ry="18" fill="white" opacity="0.6"/>

  <!-- Floating platforms -->
  <rect x="30" y="180" width="100" height="25" rx="5" fill="url(#platform)"/>
  <rect x="30" y="175" width="100" height="8" fill="#4ade80"/>

  <rect x="160" y="140" width="80" height="25" rx="5" fill="url(#platform)"/>
  <rect x="160" y="135" width="80" height="8" fill="#4ade80"/>

  <rect x="280" y="100" width="90" height="25" rx="5" fill="url(#platform)"/>
  <rect x="280" y="95" width="90" height="8" fill="#4ade80"/>

  <!-- Character (blob) -->
  <ellipse cx="200" cy="115" rx="25" ry="22" fill="#a855f7"/>
  <ellipse cx="200" cy="112" rx="22" ry="18" fill="#c084fc"/>
  <circle cx="192" cy="108" r="5" fill="white"/>
  <circle cx="208" cy="108" r="5" fill="white"/>
  <circle cx="193" cy="109" r="2.5" fill="#1e1b4b"/>
  <circle cx="209" cy="109" r="2.5" fill="#1e1b4b"/>
  <path d="M195 118 Q200 122 205 118" fill="none" stroke="#1e1b4b" stroke-width="2" stroke-linecap="round"/>

  <!-- Sparks/collectibles -->
  <circle cx="325" cy="75" r="10" fill="#fbbf24"/>
  <text x="325" y="80" font-size="12" text-anchor="middle" fill="#92400e">✦</text>

  <circle cx="100" cy="155" r="10" fill="#fbbf24"/>
  <text x="100" y="160" font-size="12" text-anchor="middle" fill="#92400e">✦</text>

  <circle cx="350" cy="130" r="10" fill="#fbbf24"/>
  <text x="350" y="135" font-size="12" text-anchor="middle" fill="#92400e">✦</text>

  <!-- Latch point -->
  <circle cx="130" cy="120" r="12" fill="#f97316" stroke="#fb923c" stroke-width="3"/>
</svg>