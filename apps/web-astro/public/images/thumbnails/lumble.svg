<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lumbleSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="lPlatform" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="30%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="lLatch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="lSpark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="lGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <filter id="lShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="400" height="250" fill="url(#lumbleSky)" rx="12"/>

  <!-- Sun -->
  <circle cx="350" cy="40" r="25" fill="#fde047" opacity="0.4"/>
  <circle cx="350" cy="40" r="18" fill="#fbbf24" opacity="0.6"/>

  <!-- Clouds -->
  <g opacity="0.85">
    <ellipse cx="70" cy="40" rx="40" ry="16" fill="white"/>
    <ellipse cx="95" cy="35" rx="30" ry="14" fill="white"/>
    <ellipse cx="50" cy="38" rx="25" ry="12" fill="white"/>
  </g>
  <g opacity="0.6">
    <ellipse cx="280" cy="55" rx="35" ry="14" fill="white"/>
    <ellipse cx="305" cy="50" rx="25" ry="12" fill="white"/>
  </g>
  <g opacity="0.4">
    <ellipse cx="180" cy="30" rx="25" ry="10" fill="white"/>
  </g>

  <!-- Distant mountains -->
  <polygon points="0,200 60,140 120,180 180,130 240,170 300,120 360,160 400,135 400,200" fill="#86efac" opacity="0.3"/>

  <!-- Platform 1 (bottom left) -->
  <g filter="url(#lShadow)">
    <rect x="20" y="185" width="110" height="22" rx="6" fill="url(#lPlatform)"/>
    <rect x="20" y="183" width="110" height="6" rx="3" fill="#86efac"/>
    <!-- Grass tufts -->
    <path d="M35 183 L38 175 L41 183" fill="#4ade80"/>
    <path d="M65 183 L68 176 L71 183" fill="#4ade80"/>
    <path d="M100 183 L103 177 L106 183" fill="#4ade80"/>
  </g>

  <!-- Platform 2 (middle) -->
  <g filter="url(#lShadow)">
    <rect x="155" y="140" width="90" height="22" rx="6" fill="url(#lPlatform)"/>
    <rect x="155" y="138" width="90" height="6" rx="3" fill="#86efac"/>
    <path d="M170 138 L173 130 L176 138" fill="#4ade80"/>
    <path d="M210 138 L213 131 L216 138" fill="#4ade80"/>
  </g>

  <!-- Platform 3 (top right) -->
  <g filter="url(#lShadow)">
    <rect x="280" y="95" width="100" height="22" rx="6" fill="url(#lPlatform)"/>
    <rect x="280" y="93" width="100" height="6" rx="3" fill="#86efac"/>
    <path d="M300 93 L303 85 L306 93" fill="#4ade80"/>
    <path d="M345 93 L348 86 L351 93" fill="#4ade80"/>
  </g>

  <!-- Small floating platform -->
  <g filter="url(#lShadow)">
    <rect x="120" y="110" width="40" height="14" rx="4" fill="url(#lPlatform)"/>
    <rect x="120" y="108" width="40" height="4" rx="2" fill="#86efac"/>
  </g>

  <!-- Latch points (grapple hooks) -->
  <g>
    <circle cx="145" cy="85" r="10" fill="url(#lLatch)" stroke="#fdba74" stroke-width="2"/>
    <circle cx="145" cy="85" r="10" fill="url(#lLatch)" filter="url(#lGlow)" opacity="0.5"/>
    <circle cx="145" cy="85" r="4" fill="#fff7ed" opacity="0.6"/>
  </g>
  <g>
    <circle cx="260" cy="65" r="10" fill="url(#lLatch)" stroke="#fdba74" stroke-width="2"/>
    <circle cx="260" cy="65" r="10" fill="url(#lLatch)" filter="url(#lGlow)" opacity="0.5"/>
    <circle cx="260" cy="65" r="4" fill="#fff7ed" opacity="0.6"/>
  </g>

  <!-- Latch line (rope from character to latch) -->
  <line x1="200" y1="118" x2="145" y2="85" stroke="#f97316" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Sparks / Collectibles -->
  <g>
    <circle cx="330" cy="75" r="9" fill="url(#lSpark)"/>
    <circle cx="330" cy="75" r="9" fill="url(#lSpark)" filter="url(#lGlow)" opacity="0.4"/>
    <text x="330" y="79" font-size="11" text-anchor="middle" fill="#92400e" font-weight="bold">✦</text>
  </g>
  <g>
    <circle cx="90" cy="160" r="9" fill="url(#lSpark)"/>
    <circle cx="90" cy="160" r="9" fill="url(#lSpark)" filter="url(#lGlow)" opacity="0.4"/>
    <text x="90" y="164" font-size="11" text-anchor="middle" fill="#92400e" font-weight="bold">✦</text>
  </g>
  <g>
    <circle cx="365" cy="130" r="9" fill="url(#lSpark)"/>
    <circle cx="365" cy="130" r="9" fill="url(#lSpark)" filter="url(#lGlow)" opacity="0.4"/>
    <text x="365" y="134" font-size="11" text-anchor="middle" fill="#92400e" font-weight="bold">✦</text>
  </g>
  <g>
    <circle cx="185" cy="115" r="7" fill="url(#lSpark)"/>
    <text x="185" y="119" font-size="9" text-anchor="middle" fill="#92400e" font-weight="bold">✦</text>
  </g>
  <g>
    <circle cx="50" cy="130" r="7" fill="url(#lSpark)"/>
    <text x="50" y="134" font-size="9" text-anchor="middle" fill="#92400e" font-weight="bold">✦</text>
  </g>

  <!-- Character (Lumble blob) -->
  <g filter="url(#lShadow)">
    <!-- Body -->
    <ellipse cx="200" cy="120" rx="22" ry="20" fill="#a855f7"/>
    <ellipse cx="200" cy="117" rx="19" ry="16" fill="#c084fc"/>
    <!-- Shine -->
    <ellipse cx="193" cy="110" rx="6" ry="4" fill="#e9d5ff" opacity="0.4"/>
    <!-- Eyes -->
    <circle cx="191" cy="113" r="5" fill="white"/>
    <circle cx="209" cy="113" r="5" fill="white"/>
    <circle cx="192" cy="114" r="2.5" fill="#1e1b4b"/>
    <circle cx="210" cy="114" r="2.5" fill="#1e1b4b"/>
    <!-- Eye shine -->
    <circle cx="193" cy="112" r="1" fill="white"/>
    <circle cx="211" cy="112" r="1" fill="white"/>
    <!-- Smile -->
    <path d="M194 121 Q200 126 206 121" fill="none" stroke="#1e1b4b" stroke-width="2" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="192" cy="137" rx="7" ry="4" fill="#7c3aed"/>
    <ellipse cx="208" cy="137" rx="7" ry="4" fill="#7c3aed"/>
  </g>

  <!-- Spark counter HUD -->
  <rect x="10" y="10" width="80" height="24" rx="12" fill="rgba(0,0,0,0.4)"/>
  <circle cx="28" cy="22" r="7" fill="#fbbf24"/>
  <text x="28" y="26" font-size="8" text-anchor="middle" fill="#92400e" font-weight="bold">✦</text>
  <text x="55" y="26" font-family="system-ui" font-weight="800" font-size="12" fill="white">23/50</text>

  <!-- Title -->
  <text x="200" y="240" text-anchor="middle" fill="#7c3aed" font-family="system-ui" font-weight="900" font-size="16" letter-spacing="3">LUMBLE</text>
</svg>
