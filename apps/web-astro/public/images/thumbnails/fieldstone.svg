<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fieldstoneBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#fieldstoneBg)"/>

  <!-- Game board outline -->
  <rect x="120" y="20" width="160" height="210" rx="4" fill="#0f3460" stroke="#2a2a4a" stroke-width="2"/>

  <!-- Terrain tiles - bottom rows filled -->
  <!-- Row 1 (bottom) -->
  <rect x="124" y="194" width="24" height="24" fill="#228B22"/><text x="136" y="212" font-size="14" text-anchor="middle">🌲</text>
  <rect x="150" y="194" width="24" height="24" fill="#228B22"/><text x="162" y="212" font-size="14" text-anchor="middle">🌲</text>
  <rect x="176" y="194" width="24" height="24" fill="#DAA520"/><text x="188" y="212" font-size="14" text-anchor="middle">🌾</text>
  <rect x="202" y="194" width="24" height="24" fill="#708090"/><text x="214" y="212" font-size="14" text-anchor="middle">⛰️</text>
  <rect x="228" y="194" width="24" height="24" fill="#4169E1"/><text x="240" y="212" font-size="14" text-anchor="middle">💧</text>
  <rect x="254" y="194" width="24" height="24" fill="#CD853F"/><text x="266" y="212" font-size="14" text-anchor="middle">🏠</text>

  <!-- Row 2 -->
  <rect x="124" y="168" width="24" height="24" fill="#DAA520"/><text x="136" y="186" font-size="14" text-anchor="middle">🌾</text>
  <rect x="150" y="168" width="24" height="24" fill="#DAA520"/><text x="162" y="186" font-size="14" text-anchor="middle">🌾</text>
  <rect x="176" y="168" width="24" height="24" fill="#228B22"/><text x="188" y="186" font-size="14" text-anchor="middle">🌲</text>
  <rect x="202" y="168" width="24" height="24" fill="#708090"/><text x="214" y="186" font-size="14" text-anchor="middle">⛰️</text>
  <rect x="228" y="168" width="24" height="24" fill="#708090"/><text x="240" y="186" font-size="14" text-anchor="middle">⛰️</text>
  <rect x="254" y="168" width="24" height="24" fill="#4169E1"/><text x="266" y="186" font-size="14" text-anchor="middle">💧</text>

  <!-- Falling piece (T-piece) -->
  <rect x="176" y="90" width="24" height="24" fill="#CD853F" opacity="0.9"/><text x="188" y="108" font-size="14" text-anchor="middle">🏠</text>
  <rect x="150" y="116" width="24" height="24" fill="#CD853F" opacity="0.9"/><text x="162" y="134" font-size="14" text-anchor="middle">🏠</text>
  <rect x="176" y="116" width="24" height="24" fill="#CD853F" opacity="0.9"/><text x="188" y="134" font-size="14" text-anchor="middle">🏠</text>
  <rect x="202" y="116" width="24" height="24" fill="#CD853F" opacity="0.9"/><text x="214" y="134" font-size="14" text-anchor="middle">🏠</text>

  <!-- Resources panel -->
  <rect x="300" y="40" width="80" height="100" rx="8" fill="#16213e" stroke="#2a2a4a"/>
  <text x="340" y="65" font-size="16" text-anchor="middle">🪵 12</text>
  <text x="340" y="90" font-size="16" text-anchor="middle">🌾 8</text>
  <text x="340" y="115" font-size="16" text-anchor="middle">🪨 5</text>
  <text x="340" y="140" font-size="16" text-anchor="middle">💰 3</text>

  <!-- Castle icon -->
  <text x="50" y="140" font-size="60">🏰</text>

  <!-- Wave indicator -->
  <rect x="300" y="160" width="80" height="50" rx="8" fill="#16213e" stroke="#e94560"/>
  <text x="340" y="180" font-size="11" fill="#e94560" text-anchor="middle">WAVE</text>
  <text x="340" y="202" font-size="22" fill="#e94560" text-anchor="middle" font-weight="bold">3</text>
</svg>