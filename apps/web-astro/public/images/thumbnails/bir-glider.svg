<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="50%" style="stop-color:#87ceeb"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="mountGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8f0"/>
      <stop offset="40%" style="stop-color:#8b9dc3"/>
      <stop offset="100%" style="stop-color:#1a6b4a"/>
    </linearGradient>
    <linearGradient id="canopyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="400" height="300" fill="url(#skyGrad)"/>

  <!-- Clouds -->
  <g fill="#fff" opacity="0.6">
    <ellipse cx="60" cy="60" rx="40" ry="14"/>
    <ellipse cx="45" cy="55" rx="25" ry="10"/>
    <ellipse cx="320" cy="80" rx="35" ry="12"/>
    <ellipse cx="340" cy="75" rx="20" ry="8"/>
  </g>

  <!-- Far mountains (Dhauladhar range) -->
  <polygon points="0,220 50,140 100,170 160,120 220,150 280,110 340,145 400,130 400,220" fill="#8b9dc3"/>
  <!-- Snow caps -->
  <polygon points="150,125 160,120 170,128" fill="#e8e8f0"/>
  <polygon points="270,115 280,110 290,118" fill="#e8e8f0"/>

  <!-- Near mountains -->
  <polygon points="0,220 80,175 140,200 200,165 260,190 330,170 400,185 400,240 0,240" fill="#2d7a4f"/>

  <!-- Valley floor -->
  <rect x="0" y="220" width="400" height="80" fill="#1a6b4a"/>

  <!-- Trees (deodar cedars) -->
  <g fill="#1a5a3a">
    <polygon points="30,220 35,195 40,220"/>
    <polygon points="55,220 60,190 65,220"/>
    <polygon points="130,220 136,188 142,220"/>
    <polygon points="300,220 306,192 312,220"/>
    <polygon points="350,220 355,198 360,220"/>
    <polygon points="380,220 384,200 388,220"/>
  </g>

  <!-- Prayer flags (string between poles) -->
  <line x1="70" y1="210" x2="180" y2="205" stroke="#8b6914" stroke-width="1"/>
  <g>
    <rect x="80" y="205" width="8" height="12" fill="#ff4444" transform="rotate(3,84,211)"/>
    <rect x="95" y="204" width="8" height="12" fill="#4488ff" transform="rotate(-2,99,210)"/>
    <rect x="110" y="203" width="8" height="12" fill="#ffffff" transform="rotate(2,114,209)"/>
    <rect x="125" y="204" width="8" height="12" fill="#44bb44" transform="rotate(-3,129,210)"/>
    <rect x="140" y="204" width="8" height="12" fill="#ffcc00" transform="rotate(1,144,210)"/>
    <rect x="155" y="205" width="8" height="12" fill="#ff4444" transform="rotate(-2,159,211)"/>
  </g>

  <!-- Paraglider canopy -->
  <g transform="translate(200, 95)" filter="url(#glow)">
    <!-- Canopy arc -->
    <path d="M-50,0 C-50,-30 -25,-42 0,-42 C25,-42 50,-30 50,0" fill="url(#canopyGrad)" stroke="#cc3344" stroke-width="1.5"/>
    <!-- Canopy cells -->
    <path d="M-35,-10 C-35,-32 -17,-40 0,-40 C17,-40 35,-32 35,-10" fill="none" stroke="#cc3344" stroke-width="0.8" opacity="0.5"/>
    <!-- Lines -->
    <line x1="-45" y1="-2" x2="-4" y2="38" stroke="#666" stroke-width="0.8"/>
    <line x1="-25" y1="-12" x2="-2" y2="38" stroke="#666" stroke-width="0.8"/>
    <line x1="0" y1="-14" x2="0" y2="38" stroke="#666" stroke-width="0.8"/>
    <line x1="25" y1="-12" x2="2" y2="38" stroke="#666" stroke-width="0.8"/>
    <line x1="45" y1="-2" x2="4" y2="38" stroke="#666" stroke-width="0.8"/>

    <!-- Pilot -->
    <circle cx="0" cy="42" r="5" fill="#333"/>
    <rect x="-3" y="46" width="6" height="8" rx="2" fill="#555"/>
  </g>

  <!-- Thermal indicator -->
  <g opacity="0.3" stroke="#ff9900" fill="none" stroke-width="1.5">
    <path d="M280,180 C280,170 290,165 290,155"/>
    <path d="M286,182 C286,172 296,167 296,157"/>
  </g>

  <!-- Eagle silhouette -->
  <g transform="translate(330, 130)">
    <path d="M-12,0 C-8,-6 -3,-4 0,-1 C3,-4 8,-6 12,0 C8,-2 3,0 0,2 C-3,0 -8,-2 -12,0Z" fill="#333" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="200" y="272" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#fff" text-anchor="middle" stroke="#1a6b4a" stroke-width="3" paint-order="stroke">BIR GLIDER</text>
</svg>
