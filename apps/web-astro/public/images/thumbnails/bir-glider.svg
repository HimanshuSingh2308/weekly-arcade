<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1028"/>
      <stop offset="40%" stop-color="#2d1b4e"/>
      <stop offset="70%" stop-color="#4a2040"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bgTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffaa44"/>
    </linearGradient>
    <linearGradient id="bgCanopy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d00"/>
      <stop offset="40%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="bgMountFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4a8a"/>
      <stop offset="100%" stop-color="#3a2a5a"/>
    </linearGradient>
    <linearGradient id="bgMountNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6b4a"/>
      <stop offset="100%" stop-color="#0d3a28"/>
    </linearGradient>
    <linearGradient id="bgSunGlow" cx="50%" cy="80%" r="50%" fx="50%" fy="80%">
      <stop offset="0%" stop-color="#ff8844" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff8844" stop-opacity="0"/>
    </linearGradient>
    <filter id="bgGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bgSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (dusk sky) -->
  <rect width="400" height="250" fill="url(#bgBg)" rx="12"/>

  <!-- Sun glow on horizon -->
  <ellipse cx="200" cy="210" rx="180" ry="60" fill="#ff6b35" opacity="0.08" filter="url(#bgSoft)"/>
  <ellipse cx="200" cy="220" rx="100" ry="25" fill="#ffaa44" opacity="0.1"/>

  <!-- Stars -->
  <circle cx="40" cy="25" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="110" cy="18" r="0.8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="200" cy="12" r="1.2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="310" cy="22" r="0.8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="370" cy="30" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="70" cy="50" r="0.6" fill="rgba(255,255,255,0.3)"/>
  <circle cx="340" cy="50" r="0.7" fill="rgba(255,255,255,0.3)"/>

  <!-- Clouds (wispy, dawn-lit) -->
  <ellipse cx="60" cy="80" rx="45" ry="8" fill="rgba(255,150,100,0.08)"/>
  <ellipse cx="330" cy="70" rx="40" ry="7" fill="rgba(255,150,100,0.06)"/>

  <!-- Far mountains (Dhauladhar — snow-capped, purple-blue) -->
  <polygon points="0,190 30,135 70,160 110,120 160,145 200,108 250,130 290,100 330,125 370,110 400,128 400,190" fill="url(#bgMountFar)"/>
  <!-- Snow caps -->
  <polygon points="105,125 110,120 115,126" fill="rgba(255,255,255,0.5)"/>
  <polygon points="195,112 200,108 205,114" fill="rgba(255,255,255,0.5)"/>
  <polygon points="285,105 290,100 296,107" fill="rgba(255,255,255,0.6)"/>
  <polygon points="365,114 370,110 376,116" fill="rgba(255,255,255,0.4)"/>

  <!-- Near mountains (green, forested) -->
  <polygon points="0,190 60,168 120,182 180,160 230,175 280,158 340,170 400,162 400,215 0,215" fill="url(#bgMountNear)"/>

  <!-- Valley floor -->
  <rect x="0" y="200" width="400" height="50" fill="#0d3a28" rx="0"/>

  <!-- Trees (deodar cedars, silhouettes) -->
  <g fill="#0a2e1e">
    <polygon points="25,200 30,178 35,200"/>
    <polygon points="42,200 48,172 54,200"/>
    <polygon points="105,200 111,176 117,200"/>
    <polygon points="280,200 286,174 292,200"/>
    <polygon points="320,200 325,180 330,200"/>
    <polygon points="355,200 359,182 363,200"/>
    <polygon points="375,200 379,186 383,200"/>
  </g>

  <!-- Prayer flags (iconic Himalayan element) -->
  <line x1="140" y1="192" x2="260" y2="188" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
  <g>
    <rect x="150" y="188" width="6" height="9" fill="#ff4444" opacity="0.7" transform="rotate(3,153,193)"/>
    <rect x="162" y="187" width="6" height="9" fill="#4488ff" opacity="0.7" transform="rotate(-2,165,192)"/>
    <rect x="174" y="186" width="6" height="9" fill="#ffffff" opacity="0.5" transform="rotate(2,177,191)"/>
    <rect x="186" y="186" width="6" height="9" fill="#44bb44" opacity="0.7" transform="rotate(-1,189,191)"/>
    <rect x="198" y="186" width="6" height="9" fill="#ffcc00" opacity="0.7" transform="rotate(2,201,191)"/>
    <rect x="210" y="187" width="6" height="9" fill="#ff4444" opacity="0.7" transform="rotate(-2,213,192)"/>
    <rect x="222" y="187" width="6" height="9" fill="#4488ff" opacity="0.7" transform="rotate(1,225,192)"/>
    <rect x="234" y="188" width="6" height="9" fill="#ffffff" opacity="0.5" transform="rotate(-2,237,193)"/>
    <rect x="246" y="188" width="6" height="9" fill="#44bb44" opacity="0.7" transform="rotate(3,249,193)"/>
  </g>

  <!-- Thermal currents (subtle) -->
  <g opacity="0.2" stroke="#ffaa44" fill="none" stroke-width="1.2">
    <path d="M310,175 C312,165 318,160 316,148"/>
    <path d="M316,177 C318,167 324,162 322,150"/>
    <path d="M80,172 C82,162 76,155 78,145"/>
    <path d="M86,174 C88,164 82,157 84,147"/>
  </g>

  <!-- Eagle silhouette (small, distant) -->
  <g transform="translate(340, 90)" opacity="0.5">
    <path d="M-10,0 C-7,-5 -2,-3 0,-1 C2,-3 7,-5 10,0 C7,-2 2,0 0,1.5 C-2,0 -7,-2 -10,0Z" fill="#1a1028"/>
  </g>
  <g transform="translate(55, 110)" opacity="0.35">
    <path d="M-8,0 C-5,-4 -2,-3 0,-1 C2,-3 5,-4 8,0 C5,-1.5 2,0 0,1 C-2,0 -5,-1.5 -8,0Z" fill="#1a1028"/>
  </g>

  <!-- Paraglider (hero element, center) -->
  <g transform="translate(200, 110)" filter="url(#bgGlow)">
    <!-- Canopy -->
    <path d="M-48,0 C-48,-28 -24,-40 0,-40 C24,-40 48,-28 48,0" fill="url(#bgCanopy)" stroke="#cc2244" stroke-width="1.2"/>
    <!-- Cell ribs -->
    <path d="M-36,-8 C-36,-30 -18,-38 0,-38 C18,-38 36,-30 36,-8" fill="none" stroke="#cc2244" stroke-width="0.6" opacity="0.4"/>
    <line x1="-16" y1="-14" x2="-16" y2="0" stroke="#cc2244" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="-16" x2="0" y2="0" stroke="#cc2244" stroke-width="0.5" opacity="0.3"/>
    <line x1="16" y1="-14" x2="16" y2="0" stroke="#cc2244" stroke-width="0.5" opacity="0.3"/>
    <!-- Suspension lines -->
    <line x1="-44" y1="-2" x2="-3" y2="32" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
    <line x1="-24" y1="-12" x2="-1" y2="32" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
    <line x1="0" y1="-14" x2="0" y2="32" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
    <line x1="24" y1="-12" x2="1" y2="32" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
    <line x1="44" y1="-2" x2="3" y2="32" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
    <!-- Pilot -->
    <circle cx="0" cy="36" r="4" fill="#2a2a3a"/>
    <rect x="-3" y="39" width="6" height="7" rx="2" fill="#3a3a4a"/>
    <!-- Legs -->
    <line x1="-2" y1="46" x2="-3" y2="52" stroke="#3a3a4a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="46" x2="3" y2="52" stroke="#3a3a4a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Golden prayer wheel (collectible, glowing) -->
  <g transform="translate(290, 135)" filter="url(#bgGlow)">
    <circle cx="0" cy="0" r="6" fill="#ffd700" opacity="0.3"/>
    <circle cx="0" cy="0" r="4" fill="#ffd700" opacity="0.8"/>
    <circle cx="0" cy="0" r="2" fill="#fff" opacity="0.6"/>
  </g>

  <!-- Combo indicator (floating near glider) -->
  <g transform="translate(240, 95)" opacity="0.7">
    <rect x="-14" y="-6" width="28" height="12" rx="6" fill="rgba(255,215,0,0.2)" stroke="#ffd700" stroke-width="0.8"/>
    <text x="0" y="3" text-anchor="middle" fill="#ffd700" font-family="system-ui" font-weight="700" font-size="7">x3</text>
  </g>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" fill="url(#bgTitle)" font-family="system-ui" font-weight="900" font-size="22" letter-spacing="3" filter="url(#bgGlow)">BIR GLIDER</text>
  <text x="200" y="44" text-anchor="middle" fill="#c0a0b8" font-family="system-ui" font-weight="600" font-size="8" letter-spacing="1">4 BIOMES · ZEN MODE · PRAYER FLAGS</text>

  <!-- Badge -->
  <rect x="148" y="48" width="104" height="14" rx="7" fill="#ff6b35" opacity="0.15"/>
  <rect x="148" y="48" width="104" height="14" rx="7" fill="none" stroke="#ff6b35" stroke-width="0.8" opacity="0.4"/>
  <text x="200" y="58" text-anchor="middle" fill="#ff6b35" font-family="system-ui" font-weight="700" font-size="7">RISE · GLIDE · SOAR</text>

  <!-- HUD: Distance -->
  <rect x="10" y="228" width="70" height="16" rx="5" fill="rgba(0,0,0,0.5)"/>
  <text x="45" y="239" text-anchor="middle" fill="#ff6b35" font-family="system-ui" font-weight="700" font-size="7">🪂 1,847m</text>

  <!-- HUD: Altitude -->
  <rect x="320" y="228" width="70" height="16" rx="5" fill="rgba(0,0,0,0.5)"/>
  <text x="355" y="239" text-anchor="middle" fill="#c0a0b8" font-family="system-ui" font-weight="600" font-size="7">⛰ 420m alt</text>
</svg>
