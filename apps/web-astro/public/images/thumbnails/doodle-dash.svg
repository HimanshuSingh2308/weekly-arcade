<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ddBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="ddCanvas" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8f8f8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#ddBg)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.08">
    <circle cx="40" cy="40" r="2" fill="#f5a623"/>
    <circle cx="80" cy="40" r="2" fill="#f5a623"/>
    <circle cx="120" cy="40" r="2" fill="#f5a623"/>
    <circle cx="160" cy="40" r="2" fill="#f5a623"/>
    <circle cx="200" cy="40" r="2" fill="#f5a623"/>
    <circle cx="240" cy="40" r="2" fill="#f5a623"/>
    <circle cx="280" cy="40" r="2" fill="#f5a623"/>
    <circle cx="320" cy="40" r="2" fill="#f5a623"/>
    <circle cx="360" cy="40" r="2" fill="#f5a623"/>
    <circle cx="40" cy="80" r="2" fill="#f5a623"/>
    <circle cx="80" cy="80" r="2" fill="#f5a623"/>
    <circle cx="120" cy="80" r="2" fill="#f5a623"/>
    <circle cx="280" cy="80" r="2" fill="#f5a623"/>
    <circle cx="320" cy="80" r="2" fill="#f5a623"/>
    <circle cx="360" cy="80" r="2" fill="#f5a623"/>
    <circle cx="40" cy="120" r="2" fill="#f5a623"/>
    <circle cx="360" cy="120" r="2" fill="#f5a623"/>
    <circle cx="40" cy="160" r="2" fill="#f5a623"/>
    <circle cx="360" cy="160" r="2" fill="#f5a623"/>
    <circle cx="40" cy="200" r="2" fill="#f5a623"/>
    <circle cx="80" cy="200" r="2" fill="#f5a623"/>
    <circle cx="320" cy="200" r="2" fill="#f5a623"/>
    <circle cx="360" cy="200" r="2" fill="#f5a623"/>
  </g>

  <!-- Canvas (white drawing area) -->
  <rect x="80" y="30" width="240" height="160" rx="12" fill="url(#ddCanvas)" stroke="#f5a623" stroke-width="2.5" opacity="0.95"/>

  <!-- Doodle: simple star drawing -->
  <polygon points="200,55 212,90 250,90 220,110 230,145 200,125 170,145 180,110 150,90 188,90"
    fill="none" stroke="#f5a623" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Pencil drawing a line -->
  <path d="M135,155 Q160,140 185,150 Q210,158 235,148 Q260,138 280,150"
    fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4,3"/>

  <!-- Big pencil -->
  <g transform="translate(285,138) rotate(-30)">
    <rect x="-6" y="-32" width="12" height="38" rx="2" fill="#f5a623"/>
    <rect x="-6" y="-32" width="12" height="8" rx="2" fill="#e6951a"/>
    <polygon points="-6,6 6,6 0,18" fill="#f0e0b0"/>
    <circle cx="0" cy="16" r="1.5" fill="#333"/>
    <rect x="-6" y="-38" width="12" height="8" rx="1" fill="#ff6b6b"/>
  </g>

  <!-- Chat bubbles (right side) -->
  <rect x="295" y="50" width="80" height="22" rx="8" fill="#16213e" stroke="#333" stroke-width="1"/>
  <rect x="305" y="57" width="40" height="5" rx="2" fill="#555"/>
  <rect x="350" y="57" width="15" height="5" rx="2" fill="#f5a623"/>

  <rect x="295" y="78" width="80" height="22" rx="8" fill="#2d8a4e" opacity="0.8"/>
  <rect x="305" y="85" width="60" height="5" rx="2" fill="#fff" opacity="0.7"/>

  <rect x="295" y="106" width="80" height="22" rx="8" fill="#16213e" stroke="#333" stroke-width="1"/>
  <rect x="305" y="113" width="50" height="5" rx="2" fill="#555"/>

  <!-- Color palette dots -->
  <g transform="translate(110, 205)">
    <circle cx="0" cy="0" r="10" fill="#000000"/>
    <circle cx="26" cy="0" r="10" fill="#ef4444"/>
    <circle cx="52" cy="0" r="10" fill="#3b82f6"/>
    <circle cx="78" cy="0" r="10" fill="#22c55e"/>
    <circle cx="104" cy="0" r="10" fill="#f5a623"/>
    <circle cx="130" cy="0" r="10" fill="#a855f7"/>
    <circle cx="156" cy="0" r="10" fill="#ec4899"/>
    <!-- Active indicator -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- Player avatars (bottom right) -->
  <circle cx="320" cy="205" r="14" fill="#f5a623"/>
  <text x="320" y="210" font-family="system-ui,sans-serif" font-size="12" font-weight="800" fill="#1a1a2e" text-anchor="middle">H</text>
  <circle cx="352" cy="205" r="14" fill="#4ecdc4"/>
  <text x="352" y="210" font-family="system-ui,sans-serif" font-size="12" font-weight="800" fill="#1a1a2e" text-anchor="middle">A</text>

  <!-- Floating emojis (reactions) -->
  <text x="60" y="70" font-size="20" opacity="0.3">🔥</text>
  <text x="340" y="170" font-size="18" opacity="0.25">😂</text>
  <text x="50" y="170" font-size="16" opacity="0.2">⭐</text>
</svg>
