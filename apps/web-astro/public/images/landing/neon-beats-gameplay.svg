<svg width="480" height="300" viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0030"/><stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
    <filter id="ggl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gnc" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#88ffff"/><stop offset="50%" stop-color="#00ffff"/><stop offset="100%" stop-color="#007777"/></linearGradient>
    <linearGradient id="gnm" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff88ff"/><stop offset="50%" stop-color="#ff00ff"/><stop offset="100%" stop-color="#770077"/></linearGradient>
    <linearGradient id="gny" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffff88"/><stop offset="50%" stop-color="#ffff00"/><stop offset="100%" stop-color="#777700"/></linearGradient>
    <linearGradient id="gng" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#88ffbb"/><stop offset="50%" stop-color="#00ff88"/><stop offset="100%" stop-color="#007744"/></linearGradient>
    <!-- Core stripe -->
    <linearGradient id="gcore" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff00"/><stop offset="30%" stop-color="#ffffffcc"/><stop offset="70%" stop-color="#ffffffcc"/><stop offset="100%" stop-color="#ffffff00"/>
    </linearGradient>
  </defs>

  <rect width="480" height="300" fill="url(#gbg)"/>

  <!-- Perspective grid -->
  <g opacity="0.06" stroke="#ff00ff" stroke-width="0.5">
    <line x1="0" y1="200" x2="480" y2="200"/><line x1="0" y1="230" x2="480" y2="230"/>
    <line x1="0" y1="255" x2="480" y2="255"/><line x1="0" y1="275" x2="480" y2="275"/>
    <line x1="180" y1="170" x2="120" y2="300"/><line x1="240" y1="170" x2="240" y2="300"/>
    <line x1="300" y1="170" x2="360" y2="300"/>
  </g>

  <!-- Lane glows -->
  <rect x="60" y="0" width="90" height="240" fill="#00ffff" opacity="0.05"/>
  <rect x="150" y="0" width="90" height="240" fill="#ff00ff" opacity="0.08"/>
  <rect x="240" y="0" width="90" height="240" fill="#ffff00" opacity="0.05"/>
  <rect x="330" y="0" width="90" height="240" fill="#00ff88" opacity="0.05"/>

  <!-- Lane dividers -->
  <line x1="150" y1="0" x2="150" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.08"/>
  <line x1="240" y1="0" x2="240" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.08"/>
  <line x1="330" y1="0" x2="330" y2="240" stroke="#fff" stroke-width="0.5" opacity="0.08"/>

  <!-- Lane flash on lane 2 (magenta) — active hit -->
  <rect x="150" y="0" width="90" height="240" fill="#ff00ff" opacity="0.12"/>

  <!-- Hit zone lines -->
  <line x1="65" y1="220" x2="145" y2="220" stroke="#00ffff" stroke-width="2" opacity="0.5" filter="url(#ggl)"/>
  <line x1="155" y1="220" x2="235" y2="220" stroke="#ff00ff" stroke-width="3" opacity="0.9" filter="url(#ggl)"/>
  <line x1="245" y1="220" x2="325" y2="220" stroke="#ffff00" stroke-width="2" opacity="0.5" filter="url(#ggl)"/>
  <line x1="335" y1="220" x2="415" y2="220" stroke="#00ff88" stroke-width="2" opacity="0.5" filter="url(#ggl)"/>

  <!-- NOTES — multiple per lane, stacked -->
  <!-- Lane 1 (cyan) -->
  <rect x="66" y="35"  width="74" height="38" rx="19" fill="url(#gnc)" filter="url(#ggl)" opacity="0.5"/>
  <rect x="66" y="105" width="74" height="38" rx="19" fill="url(#gnc)" filter="url(#ggl)" opacity="0.7"/>
  <rect x="66" y="175" width="74" height="38" rx="19" fill="url(#gnc)" filter="url(#ggl)" opacity="0.9"/>
  <!-- Core stripes -->
  <rect x="74" y="49" width="58" height="10" rx="5" fill="url(#gcore)" opacity="0.3"/>
  <rect x="74" y="119" width="58" height="10" rx="5" fill="url(#gcore)" opacity="0.5"/>
  <rect x="74" y="189" width="58" height="10" rx="5" fill="url(#gcore)" opacity="0.7"/>

  <!-- Lane 2 (magenta) — hit effect at zone -->
  <rect x="156" y="60"  width="74" height="38" rx="19" fill="url(#gnm)" filter="url(#ggl)" opacity="0.55"/>
  <rect x="156" y="140" width="74" height="38" rx="19" fill="url(#gnm)" filter="url(#ggl)" opacity="0.8"/>
  <rect x="164" y="74" width="58" height="10" rx="5" fill="url(#gcore)" opacity="0.35"/>
  <rect x="164" y="154" width="58" height="10" rx="5" fill="url(#gcore)" opacity="0.55"/>
  <!-- Hit burst particles -->
  <circle cx="193" cy="220" r="3" fill="#ff00ff" filter="url(#ggl)"/><circle cx="180" cy="212" r="2" fill="#ff66ff"/><circle cx="206" cy="214" r="2.5" fill="#ff00ff"/>
  <circle cx="175" cy="225" r="1.5" fill="#ffaaff"/><circle cx="210" cy="222" r="2" fill="#ff88ff"/>
  <!-- PERFECT text -->
  <text x="193" y="206" text-anchor="middle" font-family="system-ui" font-weight="900" font-size="13" fill="#ffd700" filter="url(#ggl)">PERFECT</text>

  <!-- Lane 3 (yellow) -->
  <rect x="246" y="20"  width="74" height="38" rx="19" fill="url(#gny)" filter="url(#ggl)" opacity="0.4"/>
  <rect x="246" y="90"  width="74" height="38" rx="19" fill="url(#gny)" filter="url(#ggl)" opacity="0.6"/>
  <rect x="246" y="160" width="74" height="38" rx="19" fill="url(#gny)" filter="url(#ggl)" opacity="0.85"/>
  <rect x="254" y="34" width="58" height="10" rx="5" fill="url(#gcore)" opacity="0.25"/>
  <rect x="254" y="104" width="58" height="10" rx="5" fill="url(#gcore)" opacity="0.4"/>
  <rect x="254" y="174" width="58" height="10" rx="5" fill="url(#gcore)" opacity="0.6"/>

  <!-- Lane 4 (green) -->
  <rect x="336" y="50"  width="74" height="38" rx="19" fill="url(#gng)" filter="url(#ggl)" opacity="0.5"/>
  <rect x="336" y="130" width="74" height="38" rx="19" fill="url(#gng)" filter="url(#ggl)" opacity="0.75"/>
  <rect x="336" y="195" width="74" height="38" rx="19" fill="url(#gng)" filter="url(#ggl)" opacity="0.95"/>
  <rect x="344" y="64" width="58" height="10" rx="5" fill="url(#gcore)" opacity="0.3"/>
  <rect x="344" y="144" width="58" height="10" rx="5" fill="url(#gcore)" opacity="0.5"/>
  <rect x="344" y="209" width="58" height="10" rx="5" fill="url(#gcore)" opacity="0.7"/>

  <!-- HUD: Score -->
  <text x="70" y="282" font-family="system-ui" font-weight="900" font-size="20" fill="#fff" filter="url(#ggl)">31,200</text>
  <text x="70" y="294" font-family="system-ui" font-size="8" fill="#ffffffaa" letter-spacing="1">SCORE</text>

  <!-- HUD: Combo -->
  <rect x="200" y="268" width="80" height="26" rx="13" fill="#ff00ff22" stroke="#ff00ff55" stroke-width="1"/>
  <text x="240" y="285" text-anchor="middle" font-family="system-ui" font-weight="900" font-size="13" fill="#00ffff" filter="url(#ggl)">52 × 8</text>
  <text x="240" y="264" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="8" fill="#ff00ff">NEON GOD</text>

  <!-- HUD: Accuracy -->
  <text x="380" y="282" text-anchor="end" font-family="system-ui" font-weight="700" font-size="14" fill="#ffffffcc">91.2%</text>
  <text x="380" y="294" text-anchor="end" font-family="system-ui" font-size="8" fill="#ffffffaa" letter-spacing="1">ACCURACY</text>

  <!-- Health bar -->
  <rect x="390" y="276" width="70" height="7" rx="3.5" fill="#ffffff15"/>
  <rect x="390" y="276" width="50" height="7" rx="3.5" fill="#ff00ff" filter="url(#ggl)"/>

  <!-- Key labels -->
  <text x="105" y="240" text-anchor="middle" font-family="monospace" font-weight="700" font-size="13" fill="#00ffff" opacity="0.2">D</text>
  <text x="195" y="240" text-anchor="middle" font-family="monospace" font-weight="700" font-size="13" fill="#ff00ff" opacity="0.2">F</text>
  <text x="285" y="240" text-anchor="middle" font-family="monospace" font-weight="700" font-size="13" fill="#ffff00" opacity="0.2">J</text>
  <text x="375" y="240" text-anchor="middle" font-family="monospace" font-weight="700" font-size="13" fill="#00ff88" opacity="0.2">K</text>
</svg>
