<svg width="480" height="300" viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0E17"/>
      <stop offset="100%" stop-color="#1A1830"/>
    </linearGradient>
    <linearGradient id="aTube" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <radialGradient id="aV" cx="40%" cy="35%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></radialGradient>
    <radialGradient id="aB" cx="40%" cy="35%"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/></radialGradient>
    <radialGradient id="aG" cx="40%" cy="35%"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/></radialGradient>
    <radialGradient id="aA" cx="40%" cy="35%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/></radialGradient>
    <radialGradient id="aO" cx="40%" cy="35%"><stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#ea580c"/></radialGradient>
    <filter id="aGl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="300" fill="url(#aBg)" rx="0"/>

  <!-- Top bar -->
  <text x="20" y="28" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)">← Daily · Easy</text>
  <text x="440" y="28" text-anchor="end" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)">0:42</text>

  <!-- Tube 1: sorted violet -->
  <rect x="50" y="50" width="52" height="200" rx="0" ry="24" fill="url(#aTube)" stroke="#8B5CF6" stroke-width="1.5"/>
  <circle cx="76" cy="225" r="20" fill="url(#aV)"/><circle cx="76" cy="183" r="20" fill="url(#aV)"/>
  <circle cx="76" cy="141" r="20" fill="url(#aV)"/><circle cx="76" cy="99" r="20" fill="url(#aV)"/>
  <path d="M66,62 L72,69 L86,55" stroke="#22c55e" stroke-width="2.5" fill="none"/>

  <!-- Tube 2 -->
  <rect x="114" y="50" width="52" height="200" rx="0" ry="24" fill="url(#aTube)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="140" cy="225" r="20" fill="url(#aB)"/><circle cx="140" cy="183" r="20" fill="url(#aG)"/>
  <circle cx="140" cy="141" r="20" fill="url(#aA)"/>

  <!-- Tube 3: source (ball leaves) -->
  <rect x="178" y="50" width="52" height="200" rx="0" ry="24" fill="url(#aTube)" stroke="rgba(255,255,255,0.15)" stroke-width="1">
    <animate attributeName="stroke" values="rgba(255,255,255,0.15);#8B5CF6;#8B5CF6;rgba(255,255,255,0.15);rgba(255,255,255,0.15);rgba(255,255,255,0.15)" dur="5s" repeatCount="indefinite"/>
  </rect>
  <circle cx="204" cy="225" r="20" fill="url(#aA)"/>
  <circle cx="204" cy="183" r="20" fill="url(#aG)"/>
  <!-- Top ball: disappears when moved -->
  <circle cx="204" cy="141" r="20" fill="url(#aB)">
    <animate attributeName="opacity" values="1;1;0;0;0;1" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Tube 4 -->
  <rect x="242" y="50" width="52" height="200" rx="0" ry="24" fill="url(#aTube)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="268" cy="225" r="20" fill="url(#aG)"/><circle cx="268" cy="183" r="20" fill="url(#aO)"/>
  <circle cx="268" cy="141" r="20" fill="url(#aB)"/>

  <!-- Tube 5: destination -->
  <rect x="306" y="50" width="52" height="200" rx="0" ry="24" fill="url(#aTube)" stroke="rgba(255,255,255,0.15)" stroke-width="1">
    <animate attributeName="stroke" values="rgba(255,255,255,0.15);rgba(255,255,255,0.15);rgba(255,255,255,0.15);#8B5CF6;rgba(255,255,255,0.15);rgba(255,255,255,0.15)" dur="5s" repeatCount="indefinite"/>
  </rect>
  <circle cx="332" cy="225" r="20" fill="url(#aB)"/>
  <!-- Ball appears after placed -->
  <circle cx="332" cy="183" r="20" fill="url(#aB)">
    <animate attributeName="opacity" values="0;0;0;0;1;1" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Tube 6: empty -->
  <rect x="370" y="50" width="52" height="200" rx="0" ry="24" fill="url(#aTube)" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ANIMATED BALL: lifts from tube 3 → arcs → drops into tube 5 -->
  <circle r="20" fill="url(#aB)" filter="url(#aGl)">
    <animate attributeName="opacity" values="0;1;1;1;0;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="204;204;204;332;332;204" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0 0 1 1"/>
    <animate attributeName="cy" values="141;141;30;30;183;141" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1"/>
  </circle>

  <!-- Glow ring follows ball -->
  <circle r="24" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4">
    <animate attributeName="opacity" values="0;0.4;0.4;0.4;0;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="204;204;204;332;332;204" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0 0 1 1"/>
    <animate attributeName="cy" values="141;141;30;30;183;141" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1"/>
  </circle>

  <!-- Action bar -->
  <g transform="translate(80, 262)" opacity="0.6">
    <rect x="0" y="0" width="70" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="35" y="18" text-anchor="middle" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)">↩ Undo</text>
    <rect x="80" y="0" width="70" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="115" y="18" text-anchor="middle" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)">💡 Hint</text>
    <rect x="160" y="0" width="70" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="195" y="18" text-anchor="middle" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)">🧪 Extra</text>
    <rect x="240" y="0" width="70" height="28" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="275" y="18" text-anchor="middle" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)">🔄 Restart</text>
  </g>
</svg>
