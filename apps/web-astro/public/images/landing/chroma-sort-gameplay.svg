<svg width="480" height="300" viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0E17"/>
      <stop offset="100%" stop-color="#1A1830"/>
    </linearGradient>
    <linearGradient id="gTube" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <radialGradient id="bV" cx="40%" cy="35%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></radialGradient>
    <radialGradient id="bB" cx="40%" cy="35%"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/></radialGradient>
    <radialGradient id="bG" cx="40%" cy="35%"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/></radialGradient>
    <radialGradient id="bA" cx="40%" cy="35%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/></radialGradient>
    <radialGradient id="bR" cx="40%" cy="35%"><stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#dc2626"/></radialGradient>
    <radialGradient id="bO" cx="40%" cy="35%"><stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#ea580c"/></radialGradient>
  </defs>

  <rect width="480" height="300" fill="url(#gBg)" rx="0"/>

  <!-- Top bar -->
  <text x="20" y="28" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)">← Daily · Medium</text>
  <text x="350" y="28" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.6)" font-weight="600">⏱ 2:34</text>
  <text x="440" y="28" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.5)">12 moves</text>

  <!-- 8 tubes across (Medium: 6 colors + 2 empty) -->
  <!-- Tube 1: sorted violet -->
  <rect x="22" y="50" width="48" height="200" rx="0" ry="22" fill="url(#gTube)" stroke="#8B5CF6" stroke-width="1.5"/>
  <circle cx="46" cy="225" r="18" fill="url(#bV)"/><circle cx="46" cy="187" r="18" fill="url(#bV)"/>
  <circle cx="46" cy="149" r="18" fill="url(#bV)"/><circle cx="46" cy="111" r="18" fill="url(#bV)"/>
  <path d="M36,62 L42,69 L56,55" stroke="#22c55e" stroke-width="2.5" fill="none"/>

  <!-- Tube 2 -->
  <rect x="80" y="50" width="48" height="200" rx="0" ry="22" fill="url(#gTube)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="104" cy="225" r="18" fill="url(#bB)"/><circle cx="104" cy="187" r="18" fill="url(#bG)"/>
  <circle cx="104" cy="149" r="18" fill="url(#bA)"/><circle cx="104" cy="111" r="18" fill="url(#bO)"/>

  <!-- Tube 3: selected -->
  <rect x="138" y="50" width="48" height="200" rx="0" ry="22" fill="url(#gTube)" stroke="#8B5CF6" stroke-width="2.5"/>
  <circle cx="162" cy="225" r="18" fill="url(#bA)"/><circle cx="162" cy="187" r="18" fill="url(#bR)"/>
  <circle cx="162" cy="149" r="18" fill="url(#bG)"/>

  <!-- Lifted ball -->
  <circle cx="162" cy="30" r="18" fill="url(#bB)"/>
  <circle cx="162" cy="30" r="22" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>

  <!-- Tube 4 -->
  <rect x="196" y="50" width="48" height="200" rx="0" ry="22" fill="url(#gTube)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="220" cy="225" r="18" fill="url(#bR)"/><circle cx="220" cy="187" r="18" fill="url(#bO)"/>
  <circle cx="220" cy="149" r="18" fill="url(#bR)"/><circle cx="220" cy="111" r="18" fill="url(#bG)"/>

  <!-- Tube 5 -->
  <rect x="254" y="50" width="48" height="200" rx="0" ry="22" fill="url(#gTube)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="278" cy="225" r="18" fill="url(#bO)"/><circle cx="278" cy="187" r="18" fill="url(#bA)"/>
  <circle cx="278" cy="149" r="18" fill="url(#bB)"/>

  <!-- Tube 6 -->
  <rect x="312" y="50" width="48" height="200" rx="0" ry="22" fill="url(#gTube)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="336" cy="225" r="18" fill="url(#bG)"/><circle cx="336" cy="187" r="18" fill="url(#bB)"/>

  <!-- Tube 7: empty -->
  <rect x="370" y="50" width="48" height="200" rx="0" ry="22" fill="url(#gTube)" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Tube 8: empty -->
  <rect x="428" y="50" width="48" height="200" rx="0" ry="22" fill="url(#gTube)" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Action bar at bottom -->
  <g transform="translate(60, 262)">
    <rect x="0" y="0" width="70" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="35" y="19" text-anchor="middle" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">↩ Undo</text>

    <rect x="80" y="0" width="70" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="115" y="19" text-anchor="middle" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">💡 Hint</text>

    <rect x="160" y="0" width="70" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="195" y="19" text-anchor="middle" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">🧪 Extra</text>

    <rect x="240" y="0" width="70" height="30" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="275" y="19" text-anchor="middle" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">🔄 Restart</text>
  </g>
</svg>
