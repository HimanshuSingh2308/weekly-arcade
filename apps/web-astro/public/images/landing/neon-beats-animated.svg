<svg width="480" height="300" viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0030"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
    <filter id="agl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="agl2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Note gradients with 3D bevel -->
    <linearGradient id="nc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66ffff"/><stop offset="40%" stop-color="#00ffff"/><stop offset="100%" stop-color="#009999"/>
    </linearGradient>
    <linearGradient id="nm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff66ff"/><stop offset="40%" stop-color="#ff00ff"/><stop offset="100%" stop-color="#990099"/>
    </linearGradient>
    <linearGradient id="ny" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffff66"/><stop offset="40%" stop-color="#ffff00"/><stop offset="100%" stop-color="#999900"/>
    </linearGradient>
    <linearGradient id="ng" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66ffaa"/><stop offset="40%" stop-color="#00ff88"/><stop offset="100%" stop-color="#009955"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="300" fill="url(#abg)"/>

  <!-- Perspective grid -->
  <g opacity="0.08" stroke="#ff00ff" stroke-width="0.5">
    <line x1="0" y1="200" x2="480" y2="200"/>
    <line x1="0" y1="230" x2="480" y2="230"/>
    <line x1="0" y1="255" x2="480" y2="255"/>
    <line x1="0" y1="275" x2="480" y2="275"/>
    <line x1="120" y1="170" x2="0"   y2="300"/>
    <line x1="180" y1="170" x2="120" y2="300"/>
    <line x1="240" y1="170" x2="240" y2="300"/>
    <line x1="300" y1="170" x2="360" y2="300"/>
    <line x1="360" y1="170" x2="480" y2="300"/>
  </g>

  <!-- Lane glow columns -->
  <rect x="60"  y="0" width="90" height="260" fill="#00ffff" opacity="0.04"/>
  <rect x="150" y="0" width="90" height="260" fill="#ff00ff" opacity="0.04"/>
  <rect x="240" y="0" width="90" height="260" fill="#ffff00" opacity="0.04"/>
  <rect x="330" y="0" width="90" height="260" fill="#00ff88" opacity="0.04"/>

  <!-- Lane dividers -->
  <line x1="150" y1="0" x2="150" y2="260" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
  <line x1="240" y1="0" x2="240" y2="260" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
  <line x1="330" y1="0" x2="330" y2="260" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>

  <!-- Hit zone lines -->
  <line x1="65"  y1="230" x2="145" y2="230" stroke="#00ffff" stroke-width="2" opacity="0.6" filter="url(#agl)"/>
  <line x1="155" y1="230" x2="235" y2="230" stroke="#ff00ff" stroke-width="2" opacity="0.6" filter="url(#agl)"/>
  <line x1="245" y1="230" x2="325" y2="230" stroke="#ffff00" stroke-width="2" opacity="0.6" filter="url(#agl)"/>
  <line x1="335" y1="230" x2="415" y2="230" stroke="#00ff88" stroke-width="2" opacity="0.6" filter="url(#agl)"/>

  <!-- ANIMATED FALLING NOTES — each has a fall + fade loop -->

  <!-- Lane 1 (cyan) — 3 notes staggered -->
  <g filter="url(#agl)">
    <rect x="68" width="72" height="36" rx="18" fill="url(#nc)" opacity="0.9">
      <animate attributeName="y" values="-40;240" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.9;0.3" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g filter="url(#agl)">
    <rect x="68" width="72" height="36" rx="18" fill="url(#nc)" opacity="0.7">
      <animate attributeName="y" values="-40;240" dur="2.8s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.7;0.7;0.2" dur="2.8s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g filter="url(#agl)">
    <rect x="68" width="72" height="36" rx="18" fill="url(#nc)" opacity="0.5">
      <animate attributeName="y" values="-40;240" dur="2.8s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.5;0.5;0.15" dur="2.8s" begin="1.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Lane 2 (magenta) — 2 notes -->
  <g filter="url(#agl)">
    <rect x="158" width="72" height="36" rx="18" fill="url(#nm)" opacity="0.9">
      <animate attributeName="y" values="-40;240" dur="3.2s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.9;0.3" dur="3.2s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g filter="url(#agl)">
    <rect x="158" width="72" height="36" rx="18" fill="url(#nm)" opacity="0.6">
      <animate attributeName="y" values="-40;240" dur="3.2s" begin="2.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.6;0.2" dur="3.2s" begin="2.0s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Lane 3 (yellow) — 3 notes -->
  <g filter="url(#agl)">
    <rect x="248" width="72" height="36" rx="18" fill="url(#ny)" opacity="0.9">
      <animate attributeName="y" values="-40;240" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.9;0.3" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g filter="url(#agl)">
    <rect x="248" width="72" height="36" rx="18" fill="url(#ny)" opacity="0.6">
      <animate attributeName="y" values="-40;240" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.6;0.2" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g filter="url(#agl)">
    <rect x="248" width="72" height="36" rx="18" fill="url(#ny)" opacity="0.4">
      <animate attributeName="y" values="-40;240" dur="2.5s" begin="2.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.4;0.4;0.15" dur="2.5s" begin="2.0s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Lane 4 (green) — 2 notes -->
  <g filter="url(#agl)">
    <rect x="338" width="72" height="36" rx="18" fill="url(#ng)" opacity="0.9">
      <animate attributeName="y" values="-40;240" dur="3.0s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.9;0.3" dur="3.0s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g filter="url(#agl)">
    <rect x="338" width="72" height="36" rx="18" fill="url(#ng)" opacity="0.5">
      <animate attributeName="y" values="-40;240" dur="3.0s" begin="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.5;0.5;0.15" dur="3.0s" begin="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Hit flash bursts (pulsing circles at hit zone) -->
  <circle cx="105" cy="230" r="6" fill="#00ffff" opacity="0">
    <animate attributeName="r" values="4;18;4" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="285" cy="230" r="6" fill="#ffff00" opacity="0">
    <animate attributeName="r" values="4;18;4" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
  </circle>

  <!-- HUD -->
  <text x="70" y="20" font-family="system-ui" font-weight="900" font-size="16" fill="#ff00ff" filter="url(#agl)">24,300</text>
  <text x="70" y="32" font-family="system-ui" font-size="9" fill="#ffffffaa" letter-spacing="1">SCORE</text>

  <!-- Combo badge -->
  <rect x="200" y="8" width="80" height="24" rx="12" fill="#ff00ff22" stroke="#ff00ff55" stroke-width="1"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui" font-weight="900" font-size="12" fill="#00ffff">47 × 4</text>

  <!-- Health bar -->
  <rect x="350" y="12" width="80" height="8" rx="4" fill="#ffffff15"/>
  <rect x="350" y="12" width="56" height="8" rx="4" fill="#ff00ff" filter="url(#agl)">
    <animate attributeName="width" values="56;52;56" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="350" y="9" font-family="system-ui" font-size="8" fill="#ffffffaa">HEALTH</text>

  <!-- Key labels -->
  <text x="105" y="252" text-anchor="middle" font-family="monospace" font-weight="700" font-size="14" fill="#00ffff" opacity="0.25">D</text>
  <text x="195" y="252" text-anchor="middle" font-family="monospace" font-weight="700" font-size="14" fill="#ff00ff" opacity="0.25">F</text>
  <text x="285" y="252" text-anchor="middle" font-family="monospace" font-weight="700" font-size="14" fill="#ffff00" opacity="0.25">J</text>
  <text x="375" y="252" text-anchor="middle" font-family="monospace" font-weight="700" font-size="14" fill="#00ff88" opacity="0.25">K</text>

  <!-- Floating judgment text -->
  <text x="105" y="210" text-anchor="middle" font-family="system-ui" font-weight="900" font-size="11" fill="#ffd700" filter="url(#agl)" opacity="0">
    PERFECT
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="218;200" dur="2.8s" repeatCount="indefinite"/>
  </text>
  <text x="285" y="210" text-anchor="middle" font-family="system-ui" font-weight="900" font-size="11" fill="#ffd700" filter="url(#agl)" opacity="0">
    +400
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="218;200" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
  </text>

  <!-- Scanline overlay -->
  <rect width="480" height="300" fill="url(#abg)" opacity="0">
    <animate attributeName="opacity" values="0;0.03;0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
