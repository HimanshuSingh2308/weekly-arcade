<svg width="320" height="560" viewBox="0 0 320 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0E17"/>
      <stop offset="100%" stop-color="#1A1830"/>
    </linearGradient>
    <linearGradient id="hCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="560" fill="url(#hBg)" rx="20"/>

  <!-- Emoji icon -->
  <text x="160" y="100" text-anchor="middle" font-size="48">🍡</text>

  <!-- Title -->
  <text x="160" y="145" text-anchor="middle" font-family="system-ui" font-size="26" font-weight="900" fill="#fff">Chroma Sort</text>
  <text x="160" y="168" text-anchor="middle" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.6)">Sort the chaos. Own the day.</text>

  <!-- Stats chips -->
  <rect x="55" y="185" width="90" height="24" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="100" y="201" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#E8E6F0">🔥 3 day streak</text>
  <rect x="155" y="185" width="70" height="24" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="190" y="201" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#E8E6F0">⭐ 21</text>

  <!-- Section label -->
  <text x="28" y="235" font-family="system-ui" font-size="9" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="1">📅 DAILY CHALLENGE — APR 13, 2026</text>

  <!-- Daily card -->
  <rect x="20" y="248" width="280" height="100" rx="14" fill="url(#hCard)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Easy button -->
  <rect x="32" y="260" width="80" height="76" rx="10" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="2"/>
  <text x="72" y="288" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#fff">Easy</text>
  <text x="72" y="304" text-anchor="middle" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.5)">4 colors · 6 tubes</text>
  <text x="72" y="322" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="700" fill="#10B981">▶ Play</text>

  <!-- Medium button -->
  <rect x="120" y="260" width="80" height="76" rx="10" fill="rgba(245,158,11,0.08)" stroke="#F59E0B" stroke-width="2"/>
  <text x="160" y="288" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#fff">Medium</text>
  <text x="160" y="304" text-anchor="middle" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.5)">6 colors · 8 tubes</text>
  <text x="160" y="322" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="700" fill="#F59E0B">▶ Play</text>

  <!-- Hard button -->
  <rect x="208" y="260" width="80" height="76" rx="10" fill="rgba(239,68,68,0.08)" stroke="#EF4444" stroke-width="2"/>
  <text x="248" y="288" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#fff">Hard</text>
  <text x="248" y="304" text-anchor="middle" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.5)">8 colors · 11 tubes</text>
  <text x="248" y="322" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="700" fill="#EF4444">▶ Play</text>

  <!-- Endless section -->
  <text x="28" y="375" font-family="system-ui" font-size="9" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="1">♾️ ENDLESS MODE</text>

  <rect x="20" y="388" width="280" height="60" rx="14" fill="rgba(108,61,232,0.08)" stroke="#6C3DE8" stroke-width="2"/>
  <text x="36" y="415" font-family="system-ui" font-size="14" font-weight="700" fill="#fff">Continue Level 8</text>
  <text x="36" y="433" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">Progressive difficulty · No time limit</text>
  <text x="280" y="422" text-anchor="middle" font-size="18" fill="#8B5CF6">▶</text>

  <!-- Color blind button -->
  <rect x="20" y="465" width="280" height="40" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="160" y="490" text-anchor="middle" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.6)">⭕ Color Blind Mode</text>
</svg>
