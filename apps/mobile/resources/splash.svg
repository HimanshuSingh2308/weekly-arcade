<svg width="2732" height="2732" viewBox="0 0 2732 2732" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0E17"/>
      <stop offset="100%" stop-color="#1A1830"/>
    </linearGradient>
    <radialGradient id="sV" cx="40%" cy="35%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></radialGradient>
    <radialGradient id="sB" cx="40%" cy="35%"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/></radialGradient>
    <radialGradient id="sG" cx="40%" cy="35%"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/></radialGradient>
    <radialGradient id="sA" cx="40%" cy="35%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/></radialGradient>
  </defs>

  <!-- Background -->
  <rect width="2732" height="2732" fill="url(#sBg)"/>

  <!-- Centered tube with 4 balls -->
  <g transform="translate(1246, 1050)">
    <!-- Tube -->
    <rect x="0" y="0" width="240" height="700" rx="0" ry="100" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>
    <!-- Glass highlight -->
    <rect x="16" y="20" width="16" height="640" rx="8" fill="rgba(255,255,255,0.05)"/>
    <!-- Balls -->
    <circle cx="120" cy="600" r="80" fill="url(#sV)"/>
    <circle cx="120" cy="430" r="80" fill="url(#sB)"/>
    <circle cx="120" cy="260" r="80" fill="url(#sG)"/>
    <circle cx="120" cy="90" r="80" fill="url(#sA)"/>
  </g>

  <!-- Title -->
  <text x="1366" y="920" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="900" fill="#FFFFFF">Weekly Arcade</text>
  <text x="1366" y="980" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" fill="rgba(255,255,255,0.5)">New games every week</text>

  <!-- Emoji -->
  <text x="1366" y="850" text-anchor="middle" font-size="160">🎮</text>

  <!-- Progress bar placeholder -->
  <rect x="1166" y="1820" width="400" height="12" rx="6" fill="rgba(255,255,255,0.08)"/>
  <rect x="1166" y="1820" width="280" height="12" rx="6" fill="url(#sV)" opacity="0.6"/>
</svg>
