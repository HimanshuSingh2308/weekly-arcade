<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 1: Neon controller on dark gradient -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg1)"/>

  <!-- Glow circle -->
  <circle cx="512" cy="480" r="200" fill="#e94560" opacity="0.1"/>

  <!-- Controller body -->
  <g transform="translate(512, 470)" filter="url(#glow1)">
    <!-- Main body -->
    <rect x="-200" y="-80" width="400" height="160" rx="80" fill="url(#accent1)"/>
    <!-- Left grip -->
    <rect x="-220" y="-30" width="80" height="120" rx="30" fill="url(#accent1)"/>
    <!-- Right grip -->
    <rect x="140" y="-30" width="80" height="120" rx="30" fill="url(#accent1)"/>
    <!-- D-pad -->
    <rect x="-130" y="-20" width="14" height="44" rx="4" fill="#fff" opacity="0.9"/>
    <rect x="-145" y="-5" width="44" height="14" rx="4" fill="#fff" opacity="0.9"/>
    <!-- Buttons -->
    <circle cx="100" cy="-20" r="12" fill="#fff" opacity="0.9"/>
    <circle cx="130" cy="5" r="12" fill="#fff" opacity="0.9"/>
    <circle cx="70" cy="5" r="12" fill="#fff" opacity="0.9"/>
    <circle cx="100" cy="30" r="12" fill="#fff" opacity="0.9"/>
    <!-- Screen/window -->
    <rect x="-40" y="-35" width="80" height="50" rx="8" fill="#fff" opacity="0.15"/>
  </g>

  <!-- "WA" text -->
  <text x="512" y="680" text-anchor="middle" font-family="system-ui" font-size="72" font-weight="900" fill="#fff" letter-spacing="8">WEEKLY</text>
  <text x="512" y="750" text-anchor="middle" font-family="system-ui" font-size="56" font-weight="700" fill="#e94560" letter-spacing="12">ARCADE</text>
</svg>
