<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 1D: Abstract/stylized controller — avoids specific console design trademarks.
       Uses a generic rounded pill shape with abstract dots/cross pattern.
       Does NOT resemble Nintendo Switch, PlayStation, Xbox, or any specific controller. -->
  <defs>
    <linearGradient id="bg1d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="ctrl1d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c73550"/>
    </linearGradient>
    <filter id="g1d" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg1d)"/>
  <circle cx="512" cy="450" r="200" fill="#e94560" opacity="0.06"/>

  <!-- Abstract controller: rounded pill with bumps, NOT a specific console design -->
  <g transform="translate(512, 440)" filter="url(#g1d)">
    <!-- Pill body (wider, no grips — avoids Switch/PS likeness) -->
    <rect x="-210" y="-70" width="420" height="140" rx="70" fill="url(#ctrl1d)"/>

    <!-- Abstract left pattern: plus/cross shape (generic, not a d-pad) -->
    <rect x="-125" y="-8" width="36" height="10" rx="5" fill="#fff" opacity="0.85"/>
    <rect x="-112" y="-21" width="10" height="36" rx="5" fill="#fff" opacity="0.85"/>

    <!-- Abstract right pattern: 4 dots in diamond (generic, not ABXY/shapes) -->
    <circle cx="100" cy="-18" r="10" fill="#fff" opacity="0.85"/>
    <circle cx="120" cy="0" r="10" fill="#fff" opacity="0.85"/>
    <circle cx="80" cy="0" r="10" fill="#fff" opacity="0.85"/>
    <circle cx="100" cy="18" r="10" fill="#fff" opacity="0.85"/>

    <!-- Center line (abstract divider) -->
    <rect x="-2" y="-25" width="4" height="50" rx="2" fill="#fff" opacity="0.1"/>
  </g>

  <text x="512" y="650" text-anchor="middle" font-family="system-ui" font-size="68" font-weight="900" fill="#fff" letter-spacing="5">WEEKLY</text>
  <text x="512" y="720" text-anchor="middle" font-family="system-ui" font-size="52" font-weight="700" fill="#e94560" letter-spacing="12">ARCADE</text>
</svg>
