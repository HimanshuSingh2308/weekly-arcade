<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 1B: Red-to-purple gradient controller, no text, icon-only -->
  <defs>
    <linearGradient id="bg1b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1830"/>
    </linearGradient>
    <linearGradient id="ctrl1b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="g1b" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg1b)"/>

  <!-- Ambient glow -->
  <ellipse cx="440" cy="500" rx="180" ry="140" fill="#e94560" opacity="0.06"/>
  <ellipse cx="584" cy="500" rx="180" ry="140" fill="#8B5CF6" opacity="0.06"/>

  <g transform="translate(512, 480) scale(1.3)" filter="url(#g1b)">
    <rect x="-200" y="-80" width="400" height="160" rx="80" fill="url(#ctrl1b)"/>
    <rect x="-230" y="-25" width="85" height="115" rx="32" fill="url(#ctrl1b)"/>
    <rect x="145" y="-25" width="85" height="115" rx="32" fill="url(#ctrl1b)"/>
    <!-- D-pad -->
    <rect x="-130" y="-18" width="14" height="40" rx="4" fill="#fff" opacity="0.85"/>
    <rect x="-143" y="-5" width="40" height="14" rx="4" fill="#fff" opacity="0.85"/>
    <!-- Buttons -->
    <circle cx="95" cy="-22" r="14" fill="#fff" opacity="0.85"/>
    <circle cx="128" cy="4" r="14" fill="#fff" opacity="0.85"/>
    <circle cx="62" cy="4" r="14" fill="#fff" opacity="0.85"/>
    <circle cx="95" cy="30" r="14" fill="#fff" opacity="0.85"/>
    <!-- Center -->
    <rect x="-35" y="-28" width="70" height="40" rx="8" fill="#fff" opacity="0.1"/>
  </g>
</svg>
