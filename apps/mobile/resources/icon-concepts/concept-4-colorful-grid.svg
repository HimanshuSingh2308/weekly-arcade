<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 4: Colorful 2x2 game grid with "WA" monogram -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg4)"/>

  <!-- 2x2 game tiles -->
  <rect x="180" y="180" width="300" height="300" rx="40" fill="#e94560" opacity="0.9"/>
  <rect x="544" y="180" width="300" height="300" rx="40" fill="#8B5CF6" opacity="0.9"/>
  <rect x="180" y="544" width="300" height="300" rx="40" fill="#10B981" opacity="0.9"/>
  <rect x="544" y="544" width="300" height="300" rx="40" fill="#F59E0B" opacity="0.9"/>

  <!-- Game icons in each tile -->
  <text x="330" y="370" text-anchor="middle" font-size="120">🎯</text>
  <text x="694" y="370" text-anchor="middle" font-size="120">🧩</text>
  <text x="330" y="734" text-anchor="middle" font-size="120">🏎️</text>
  <text x="694" y="734" text-anchor="middle" font-size="120">🍡</text>

  <!-- Central "WA" monogram overlaid -->
  <circle cx="512" cy="512" r="120" fill="#0f0f1a" stroke="#fff" stroke-width="6"/>
  <text x="512" y="535" text-anchor="middle" font-family="system-ui" font-size="100" font-weight="900" fill="#fff">W</text>
</svg>
