<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 1C: Outline/wireframe controller with neon glow — sleek modern look -->
  <defs>
    <linearGradient id="bg1c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="stroke1c" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="g1c" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg1c)"/>

  <g transform="translate(512, 450) scale(1.2)" filter="url(#g1c)">
    <!-- Controller outline -->
    <rect x="-200" y="-80" width="400" height="160" rx="80" fill="none" stroke="url(#stroke1c)" stroke-width="8"/>
    <rect x="-230" y="-25" width="85" height="115" rx="32" fill="none" stroke="url(#stroke1c)" stroke-width="8"/>
    <rect x="145" y="-25" width="85" height="115" rx="32" fill="none" stroke="url(#stroke1c)" stroke-width="8"/>
    <!-- D-pad outline -->
    <rect x="-130" y="-18" width="14" height="40" rx="3" fill="url(#stroke1c)" opacity="0.8"/>
    <rect x="-143" y="-5" width="40" height="14" rx="3" fill="url(#stroke1c)" opacity="0.8"/>
    <!-- Button outlines -->
    <circle cx="95" cy="-22" r="13" fill="none" stroke="url(#stroke1c)" stroke-width="5"/>
    <circle cx="128" cy="4" r="13" fill="none" stroke="url(#stroke1c)" stroke-width="5"/>
    <circle cx="62" cy="4" r="13" fill="none" stroke="url(#stroke1c)" stroke-width="5"/>
    <circle cx="95" cy="30" r="13" fill="none" stroke="url(#stroke1c)" stroke-width="5"/>
    <!-- Center screen -->
    <rect x="-30" y="-25" width="60" height="36" rx="6" fill="none" stroke="url(#stroke1c)" stroke-width="4" opacity="0.5"/>
  </g>

  <text x="512" y="670" text-anchor="middle" font-family="system-ui" font-size="64" font-weight="900" fill="#fff" letter-spacing="6">WEEKLY</text>
  <text x="512" y="738" text-anchor="middle" font-family="system-ui" font-size="48" font-weight="700" fill="url(#stroke1c)" letter-spacing="14">ARCADE</text>
</svg>
