<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 1A: Purple neon controller — purple glow instead of red -->
  <defs>
    <linearGradient id="bg1a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="ctrl1a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6C3DE8"/>
    </linearGradient>
    <filter id="g1a" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg1a)"/>
  <circle cx="512" cy="460" r="220" fill="#8B5CF6" opacity="0.08"/>

  <g transform="translate(512, 450)" filter="url(#g1a)">
    <rect x="-200" y="-80" width="400" height="160" rx="80" fill="url(#ctrl1a)"/>
    <rect x="-230" y="-25" width="85" height="115" rx="32" fill="url(#ctrl1a)"/>
    <rect x="145" y="-25" width="85" height="115" rx="32" fill="url(#ctrl1a)"/>
    <!-- D-pad -->
    <rect x="-130" y="-18" width="14" height="40" rx="4" fill="#fff" opacity="0.9"/>
    <rect x="-143" y="-5" width="40" height="14" rx="4" fill="#fff" opacity="0.9"/>
    <!-- Buttons — colored -->
    <circle cx="95" cy="-22" r="13" fill="#10B981"/>
    <circle cx="128" cy="4" r="13" fill="#3B82F6"/>
    <circle cx="62" cy="4" r="13" fill="#F59E0B"/>
    <circle cx="95" cy="30" r="13" fill="#EF4444"/>
    <!-- Center screen -->
    <rect x="-35" y="-30" width="70" height="42" rx="8" fill="#fff" opacity="0.12"/>
    <rect x="-25" y="-22" width="50" height="26" rx="4" fill="#fff" opacity="0.06"/>
  </g>

  <text x="512" y="660" text-anchor="middle" font-family="system-ui" font-size="68" font-weight="900" fill="#fff" letter-spacing="6">WEEKLY</text>
  <text x="512" y="730" text-anchor="middle" font-family="system-ui" font-size="52" font-weight="700" fill="#8B5CF6" letter-spacing="14">ARCADE</text>
</svg>
