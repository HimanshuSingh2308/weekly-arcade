<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 1E: Top-down view of a generic handheld screen device, NOT a controller.
       Shows a "game screen" with colored balls — represents the actual product (browser games). -->
  <defs>
    <linearGradient id="bg1e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1830"/>
    </linearGradient>
    <linearGradient id="frame1e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="bV1e" cx="40%" cy="35%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></radialGradient>
    <radialGradient id="bB1e" cx="40%" cy="35%"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#2563eb"/></radialGradient>
    <radialGradient id="bG1e" cx="40%" cy="35%"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/></radialGradient>
    <radialGradient id="bA1e" cx="40%" cy="35%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/></radialGradient>
    <radialGradient id="bR1e" cx="40%" cy="35%"><stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#dc2626"/></radialGradient>
    <filter id="g1e" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg1e)"/>

  <!-- Device frame -->
  <rect x="232" y="180" width="560" height="460" rx="40" fill="none" stroke="url(#frame1e)" stroke-width="8" filter="url(#g1e)"/>

  <!-- Screen background -->
  <rect x="252" y="200" width="520" height="420" rx="28" fill="rgba(255,255,255,0.03)"/>

  <!-- Game tubes with balls inside screen -->
  <g transform="translate(295, 230)">
    <!-- Tube 1 -->
    <rect x="0" y="0" width="44" height="360" rx="0" ry="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <circle cx="22" cy="330" r="17" fill="url(#bV1e)"/><circle cx="22" cy="294" r="17" fill="url(#bV1e)"/>
    <circle cx="22" cy="258" r="17" fill="url(#bV1e)"/><circle cx="22" cy="222" r="17" fill="url(#bV1e)"/>

    <!-- Tube 2 -->
    <rect x="56" y="0" width="44" height="360" rx="0" ry="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <circle cx="78" cy="330" r="17" fill="url(#bB1e)"/><circle cx="78" cy="294" r="17" fill="url(#bG1e)"/>
    <circle cx="78" cy="258" r="17" fill="url(#bA1e)"/>

    <!-- Tube 3 -->
    <rect x="112" y="0" width="44" height="360" rx="0" ry="20" fill="rgba(255,255,255,0.06)" stroke="#8B5CF6" stroke-width="3"/>
    <circle cx="134" cy="330" r="17" fill="url(#bR1e)"/><circle cx="134" cy="294" r="17" fill="url(#bG1e)"/>

    <!-- Tube 4 -->
    <rect x="168" y="0" width="44" height="360" rx="0" ry="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <circle cx="190" cy="330" r="17" fill="url(#bA1e)"/><circle cx="190" cy="294" r="17" fill="url(#bR1e)"/>
    <circle cx="190" cy="258" r="17" fill="url(#bB1e)"/><circle cx="190" cy="222" r="17" fill="url(#bG1e)"/>

    <!-- Tube 5 -->
    <rect x="224" y="0" width="44" height="360" rx="0" ry="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <circle cx="246" cy="330" r="17" fill="url(#bB1e)"/>

    <!-- Tube 6: empty -->
    <rect x="280" y="0" width="44" height="360" rx="0" ry="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Floating ball -->
    <circle cx="134" cy="-20" r="17" fill="url(#bA1e)" filter="url(#g1e)"/>
  </g>

  <!-- Text -->
  <text x="512" y="740" text-anchor="middle" font-family="system-ui" font-size="64" font-weight="900" fill="#fff" letter-spacing="4">WEEKLY</text>
  <text x="512" y="810" text-anchor="middle" font-family="system-ui" font-size="48" font-weight="700" fill="#e94560" letter-spacing="12">ARCADE</text>
</svg>
