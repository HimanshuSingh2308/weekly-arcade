name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx run-many --target=lint --all --parallel=3

      - name: Build shared packages
        run: npx nx build shared

      - name: Build API
        run: npx nx build api

      - name: Run tests
        run: npx nx run-many --target=test --all --parallel=3 --passWithNoTests
