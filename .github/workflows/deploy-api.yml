name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-api.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npx nx build api

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Cloud Function source
        run: |
          mkdir -p deploy-api
          cp -r apps/api/dist/* deploy-api/
          echo '{"name":"weekly-arcade-api","version":"1.0.0","main":"main.js","engines":{"node":">=20"},"dependencies":{"@nestjs/common":"^10.0.0","@nestjs/core":"^10.0.0","@nestjs/platform-express":"^10.0.0","express":"^4.18.2","firebase-admin":"^12.0.0","reflect-metadata":"^0.1.13","rxjs":"^7.8.1","class-validator":"^0.14.0","class-transformer":"^0.5.1"}}' > deploy-api/package.json

      - name: Deploy to Cloud Functions
        run: |
          gcloud functions deploy weekly-arcade-api \
            --gen2 \
            --runtime=nodejs20 \
            --region=us-central1 \
            --source=deploy-api \
            --entry-point=api \
            --trigger-http \
            --allow-unauthenticated \
            --memory=256MB \
            --timeout=60s \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="NODE_ENV=production,FIREBASE_PROJECT_ID=loyal-curve-425715-h6"

      - name: Output Function URL
        run: |
          echo "Function deployed to:"
          gcloud functions describe weekly-arcade-api --region=us-central1 --format='value(serviceConfig.uri)'
