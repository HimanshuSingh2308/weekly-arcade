name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-api.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx nx build shared

      - name: Build API
        run: npx nx build api

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Cloud Run source
        run: |
          mkdir -p deploy-api
          cp -r apps/api/dist/* deploy-api/

          # Copy shared package to node_modules
          mkdir -p deploy-api/node_modules/@weekly-arcade/shared
          cp -r packages/shared/dist/* deploy-api/node_modules/@weekly-arcade/shared/
          cp packages/shared/package.json deploy-api/node_modules/@weekly-arcade/shared/

          cat > deploy-api/package.json << 'PKGJSON'
          {
            "name": "weekly-arcade-api",
            "version": "1.0.0",
            "main": "main.js",
            "scripts": {
              "start": "node main.js"
            },
            "engines": {
              "node": ">=20"
            },
            "dependencies": {
              "@nestjs/common": "^10.0.0",
              "@nestjs/core": "^10.0.0",
              "@nestjs/platform-express": "^10.0.0",
              "express": "^4.18.2",
              "firebase-admin": "^12.0.0",
              "reflect-metadata": "^0.1.13",
              "rxjs": "^7.8.1",
              "class-validator": "^0.14.0",
              "class-transformer": "^0.5.1",
              "tslib": "^2.3.0"
            }
          }
          PKGJSON

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy weekly-arcade-api \
            --source=deploy-api \
            --region=us-central1 \
            --allow-unauthenticated \
            --memory=256Mi \
            --timeout=60s \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="NODE_ENV=production,FIREBASE_PROJECT_ID=loyal-curve-425715-h6"

      - name: Output Service URL
        run: |
          echo "Service deployed to:"
          gcloud run services describe weekly-arcade-api --region=us-central1 --format='value(status.url)'
