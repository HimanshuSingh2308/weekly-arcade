name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-astro/**'
      - 'package-lock.json'
      - '.github/workflows/deploy-web.yml'

  workflow_dispatch:
    inputs:
      new_game_id:
        description: 'New game slug (triggers push notification to all users)'
        required: false
        type: string
      new_game_name:
        description: 'New game display name for notification'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: cd apps/web-astro && npx astro build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: weekly-arcade

      - name: Send new game notification
        if: ${{ github.event.inputs.new_game_id != '' && github.event.inputs.new_game_name != '' }}
        run: |
          curl -s -X POST \
            https://weekly-arcade-api-5171085645.us-central1.run.app/api/notifications/new-game \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${{ secrets.NOTIFICATIONS_API_KEY }}" \
            -d "{\"gameId\": \"${{ github.event.inputs.new_game_id }}\", \"gameName\": \"${{ github.event.inputs.new_game_name }}\"}"
